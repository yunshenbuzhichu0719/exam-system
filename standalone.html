<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>湖南绿盾卫士检测技术有限公司 - 在线考试系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a3a6b;--primary-light:#2a5aaa;--primary-dark:#0d2247;
  --accent:#c9a84c;--accent-light:#f0d080;--accent-dark:#a07830;
  --bg:#e8edf4;--card:#fff;--text:#1a1a2e;--text-light:#5a6a7a;
  --border:#d0d8e4;--success:#1a8a4a;--danger:#c0392b;--warn:#e67e22;
}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== 顶部导航 ===== */
.topbar{
  background:linear-gradient(135deg,#1a3a6b 0%,#0d2247 100%);color:#fff;
  padding:0 40px;height:64px;display:flex;align-items:center;
  box-shadow:0 2px 16px rgba(10,30,70,.35);position:sticky;top:0;z-index:100;
}
.topbar-logo{display:flex;align-items:center;gap:12px;flex:1}
.topbar-logo .shield{width:40px;height:40px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.topbar-logo .name{font-size:17px;font-weight:700;letter-spacing:.5px}
.topbar-logo .sub{font-size:11px;opacity:.7;letter-spacing:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-right .user-icon{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer}
.topbar-right .btn-bar{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);color:var(--accent-light);padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:background .2s}
.topbar-right .btn-bar:hover{background:rgba(201,168,76,.35)}

/* ===== 通用 ===== */
.page{padding:40px 20px;max-width:1200px;margin:0 auto;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:16px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:24px}
.card-title{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title::before{content:'';width:4px;height:22px;background:var(--accent);border-radius:2px}

/* ===== 通用组件 ===== */
.btn{border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 3px 12px rgba(26,58,107,.3)}
.btn-accent{background:linear-gradient(135deg,#c9a84c,#e0bc5a);color:#fff;box-shadow:0 3px 12px rgba(201,168,76,.35)}
.btn-ghost{background:#f1f4f8;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:#e8edf4}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
.btn-sm-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-sm-primary{background:#eef2ff;color:var(--primary-light);border:1px solid #c7d2fe}
.btn-sm-accent{background:#fff8e8;color:#b06000;border:1px solid #f0c040}
.footer{text-align:center;padding:28px 20px;font-size:12px;color:var(--text-light)}

/* ===== Toast ===== */
.toast{position:fixed;top:80px;right:20px;background:#fff;border-radius:12px;padding:14px 20px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:300;font-size:14px;display:none;animation:fadeUp .2s ease;min-width:200px}
.toast.show{display:block}
.toast.success{border-left:4px solid var(--success)}
.toast.error{border-left:4px solid var(--danger)}
.toast.info{border-left:4px solid var(--primary)}

/* ===== 模态弹窗 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:20px;padding:40px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;animation:fadeUp .25s ease}
.modal-box h3{font-size:20px;color:var(--primary);margin-bottom:6px}
.modal-box .modal-sub{font-size:13px;color:var(--text-light);margin-bottom:24px;line-height:1.6}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light);line-height:1}
.modal-close:hover{color:var(--text)}
.modal-actions{display:flex;gap:10px;justify-content:center;margin-top:20px}
.modal-row{display:flex;flex-direction:column;gap:16px}

/* ===== 表单字段 ===== */
.field{width:100%}
.field label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:block}
.field input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--primary-light)}
.field .hint{font-size:11px;color:var(--text-light);margin-top:4px}

/* ===== 验证码 ===== */
.captcha-row{display:flex;gap:10px;align-items:flex-end}
.captcha-row .field{flex:1}
.captcha-canvas{border-radius:10px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;height:46px;transition:border-color .2s}
.captcha-canvas:hover{border-color:var(--primary-light)}

/* ===== 登录页 ===== */
/* ===== 认证页（政府事业单位风格） ===== */
.auth-page-wrap{min-height:calc(100vh - 64px);display:flex;flex-direction:column}

/* 顶部机构栏 */
.auth-page-footer{text-align:center;font-size:12px;color:var(--text-light);padding:18px 20px;letter-spacing:.5px;border-top:1px solid var(--border);background:#fff}
/* 主内容 */
.auth-main{display:flex;flex:1;max-width:1200px;width:100%;margin:0 auto;padding:40px;gap:60px;align-items:stretch}

/* 左侧品牌区 */
.auth-brand{flex:1;display:flex;align-items:center;background:linear-gradient(160deg,#1a3a6b 0%,#0d2247 60%,#1a3a8a 100%);border-radius:20px;padding:44px;position:relative;overflow:hidden;min-height:460px}
.auth-brand::before{content:'';position:absolute;right:-40px;bottom:-40px;width:200px;height:200px;background:rgba(201,168,76,.1);border-radius:50%}
.auth-brand::after{content:'';position:absolute;left:-30px;top:-30px;width:160px;height:160px;background:rgba(201,168,76,.07);border-radius:50%}
.auth-brand-inner{position:relative;z-index:1}
.auth-brand-logo{font-size:52px;margin-bottom:20px}
.auth-brand-title{font-size:26px;font-weight:900;color:#fff;line-height:1.35;margin-bottom:16px;letter-spacing:1px}
.auth-brand-desc{font-size:14px;color:rgba(255,255,255,.7);line-height:1.8;margin-bottom:32px}
.auth-brand-features{display:flex;flex-direction:column;gap:14px}
.auth-brand-feat{display:flex;align-items:flex-start;gap:14px;background:rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;border:1px solid rgba(255,255,255,.1)}
.auth-brand-feat-icon{font-size:24px;flex-shrink:0}
.auth-brand-feat-t{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.auth-brand-feat-d{font-size:12px;color:rgba(255,255,255,.6);line-height:1.5}

/* 右侧表单区 */
.auth-form-area{flex:1;max-width:420px;display:flex;flex-direction:column}
.auth-form-tabs{display:flex;margin-bottom:0;align-items:flex-end;padding:0}
.auth-form-tab{position:relative;flex:1;text-align:center;padding:14px 20px;font-size:15px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;letter-spacing:.5px;background:transparent}
.auth-form-tab.active{
  color:#fff;
  font-size:16px;
  font-weight:700;
  letter-spacing:2px;
  padding:16px 28px 18px;
  margin-bottom:-4px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 60%,var(--accent) 100%);
  border-bottom:none;
  clip-path:polygon(0 0, calc(100% - 22px) 0, 100% 100%, 0 100%);
  box-shadow:0 6px 20px rgba(26,58,107,0.4),0 2px 6px rgba(26,58,107,0.2),inset 0 1px 0 rgba(255,255,255,0.25);
  filter:drop-shadow(0 4px 10px rgba(26,58,107,0.35));
  z-index:1;
}
.auth-form-tab.active::before{
  content:"";
  position:absolute;
  bottom:0;left:0;right:22px;height:3px;
  background:linear-gradient(90deg,rgba(255,255,255,0.5),rgba(255,255,255,0.1));
  border-radius:2px 2px 0 0;
}
.auth-form-tab.active::after{
  content:"";
  position:absolute;
  top:2px;right:26px;
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.7);
  box-shadow:0 0 6px rgba(255,255,255,0.8);
}
.auth-form-tab:hover:not(.active){color:var(--text)}
.auth-form-wrap{background:var(--card);border-radius:0 0 20px 20px;padding:30px 34px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.07);flex:1}

.auth-form{display:none;flex-direction:column;gap:14px}
.auth-form.active{display:flex}

/* 表单行 */
.af-row{display:flex;align-items:flex-start;gap:0}
.af-icon{width:36px;height:36px;background:#f0f4ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:26px;border:1px solid #dde4ff}
.af-field{flex:1;padding-left:12px}
.af-label{font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:6px;padding-left:4px;letter-spacing:.5px}
.af-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;background:#fff}
.af-input:focus{border-color:var(--primary-light);background:#f8faff}
.af-pw-wrap{position:relative}
.af-pw-wrap .af-input{padding-right:42px}
.af-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-light);padding:4px}
.af-captcha-row{display:flex;gap:8px;align-items:flex-end}
.af-cap-in{flex:1}
.af-canvas{border-radius:8px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;height:44px;background:#f8faff;transition:border-color .2s}
.af-canvas:hover{border-color:var(--primary-light)}
.af-sms-btn{background:#fff;border:1.5px solid var(--primary);color:var(--primary);padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.af-sms-btn:hover{background:var(--primary);color:#fff}
.af-hint{font-size:11px;color:var(--text-light);margin-top:5px;line-height:1.5}
.af-submit-btn{width:100%;padding:13px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,#1a3a6b,#1a5a9a);border:none;border-radius:10px;cursor:pointer;letter-spacing:2px;margin-top:4px;transition:opacity .2s,transform .15s;box-shadow:0 4px 14px rgba(26,58,107,.3)}
.af-submit-btn:hover{opacity:.88;transform:translateY(-1px)}
.af-reg-btn{background:linear-gradient(135deg,#c9a84c,#e0bc5a);box-shadow:0 4px 14px rgba(201,168,76,.3)}
.af-links{text-align:center;margin-top:10px;display:flex;justify-content:center;gap:8px;align-items:center}
.af-link-sep{color:var(--border);font-size:12px}
.af-link-primary{font-size:13px;color:var(--primary);font-weight:600;text-decoration:none;cursor:pointer}
.af-link-primary:hover{text-decoration:underline}
.af-link-ghost{font-size:13px;color:var(--text-light);text-decoration:none;cursor:pointer}
.af-link-ghost:hover{color:var(--text)}

@media(max-width:900px){
  .auth-brand{display:none}
  .auth-main{padding:20px 16px;gap:0}
  .auth-form-area{max-width:100%;width:100%}
}
@media(max-width:480px){
  .auth-form-wrap{padding:24px 20px}
}

/* ===== 首页 Hero ===== */
.hero{background:linear-gradient(135deg,#1a3a6b 0%,#1a5a9a 50%,#0d2247 100%);border-radius:20px;padding:56px 50px;margin-bottom:36px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;background:rgba(201,168,76,.12);border-radius:50%}
.hero-text{position:relative;z-index:1}
.hero-text h1{font-size:30px;font-weight:700;color:#fff;margin-bottom:10px}
.hero-text p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.7;max-width:480px}
.hero-badge{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);border-radius:16px;padding:16px 24px;text-align:center;color:var(--accent-light);position:relative;z-index:1}
.hero-badge .num{font-size:36px;font-weight:800;display:block;color:#fff}

/* ===== 试卷选择 ===== */
.paper-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.paper-card{border:2px solid var(--border);border-radius:16px;padding:22px;transition:all .2s;cursor:pointer;background:var(--card)}
.paper-card:hover{border-color:var(--primary-light);box-shadow:0 6px 24px rgba(26,58,107,.12);transform:translateY(-2px)}
.paper-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.paper-title{font-size:15px;font-weight:700;line-height:1.4}
.paper-tag{background:#eef2ff;color:var(--primary-light);border-radius:8px;padding:3px 10px;font-size:12px;flex-shrink:0;margin-left:10px}
.paper-desc{font-size:13px;color:var(--text-light);line-height:1.5;margin-bottom:14px}
.paper-meta{display:flex;gap:14px;font-size:12px;color:var(--text-light);margin-bottom:18px;flex-wrap:wrap}
.paper-meta span{display:flex;align-items:center;gap:4px}
.paper-meta .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0}
.paper-btn{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:10px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.paper-btn:hover{opacity:.88}

/* ===== 考试页面 ===== */
.page-exam{display:flex;gap:22px;max-width:1280px;margin:0 auto;padding:24px 20px;align-items:flex-start}
.sidebar{width:210px;flex-shrink:0;position:sticky;top:80px}
.sidebar .card{padding:18px}
.sidebar-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:14px}
.q-nav{display:flex;flex-direction:column;gap:14px;margin-bottom:14px}
.q-group-title{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px}
.q-group-title .q-badge{display:inline-block;width:3px;height:13px;border-radius:2px;background:var(--primary-light)}
.q-group-range{margin-left:6px;font-weight:500;font-size:11px;color:#9aa6b4}
.q-group-dots{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.q-dot{width:34px;height:34px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-light);cursor:pointer;transition:all .15s}
.q-dot.answered{border-color:var(--primary-light);background:#eef2ff;color:var(--primary-light)}
.q-dot.current{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,168,76,.4)}
.q-legend{display:flex;flex-direction:column;gap:7px;font-size:11px;color:var(--text-light)}
.timer-box{background:#fff8e8;border:1px solid #e8d090;border-radius:12px;padding:12px;margin-top:14px;text-align:center}
.timer-label{font-size:11px;color:var(--warn);font-weight:600;margin-bottom:3px}
.timer-num{font-size:26px;font-weight:800;color:var(--warn);font-variant-numeric:tabular-nums}
.exam-main{flex:1;min-width:0}
.exam-header{background:var(--card);border-radius:16px;padding:22px 26px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.exam-header h2{font-size:17px;color:var(--primary)}
.exam-info{display:flex;gap:18px;font-size:13px;color:var(--text-light)}
.exam-info strong{color:var(--text)}
.progress-bar{width:100%;height:5px;background:#e8edf4;border-radius:3px;overflow:hidden;margin-top:3px}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary-light));border-radius:3px;transition:width .4s}
.question-card{background:var(--card);border-radius:16px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px}
.q-type{display:inline-block;border-radius:6px;padding:3px 12px;font-size:12px;font-weight:700;margin-bottom:14px;letter-spacing:.5px}
.q-stem{font-size:15px;line-height:1.7;font-weight:600;margin-bottom:18px}
.options{list-style:none;display:flex;flex-direction:column;gap:9px}
.option-item{display:flex;align-items:center;gap:13px;padding:12px 16px;border:2px solid var(--border);border-radius:11px;cursor:pointer;transition:border-color .15s,background .15s}
.option-item:hover{border-color:var(--primary-light);background:#f5f7ff}
.option-item.selected{border-color:var(--primary);background:#eef2ff}
.opt-letter{width:30px;height:30px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s}
.opt-text{flex:1;font-size:14px;line-height:1.4}
.short-area textarea{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:11px;font-size:14px;line-height:1.6;resize:vertical;min-height:110px;font-family:inherit;outline:none;transition:border-color .2s}
.short-area textarea:focus{border-color:var(--primary-light)}
.q-nav-bottom{display:flex;gap:10px;flex-wrap:wrap}
.unanswered-alert{background:#fef3cd;border:1px solid #f0c040;color:#7a5000;border-radius:11px;padding:14px 18px;margin-bottom:16px;font-size:13px}

/* ===== 结果页 ===== */
.page-result{max-width:960px;margin:0 auto;padding:40px 20px}
.result-hero{text-align:center;padding:56px 40px;background:linear-gradient(135deg,#1a3a6b,#0d2247);border-radius:24px;margin-bottom:36px;position:relative;overflow:hidden}
.result-hero::before{content:'✓';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:200px;color:rgba(201,168,76,.08);line-height:1}
.result-icon{width:76px;height:76px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px;position:relative}
.result-hero h1{font-size:34px;color:#fff;margin-bottom:10px;position:relative}
.result-score{font-size:68px;font-weight:900;color:var(--accent-light);margin-bottom:6px;position:relative}
.result-sub{font-size:15px;color:rgba(255,255,255,.65);position:relative}
.cert-box{background:var(--card);border-radius:20px;border:2px solid var(--accent);padding:44px 56px;text-align:center;margin-bottom:30px;position:relative}
.cert-box::before,.cert-box::after{content:'★';position:absolute;top:18px;font-size:18px;color:var(--accent)}
.cert-box::before{left:28px}.cert-box::after{right:28px}
.cert-title{font-size:12px;letter-spacing:7px;color:var(--text-light);margin-bottom:6px}
.cert-company{font-size:22px;font-weight:900;color:var(--primary);margin-bottom:22px;letter-spacing:2px}
.cert-line{border-top:1px dashed var(--border);margin:22px 0}
.cert-name{font-size:20px;font-weight:700;margin:14px 0;letter-spacing:4px}
.cert-score{font-size:44px;font-weight:900;color:var(--accent);margin:14px 0}
.cert-status{display:inline-block;font-size:18px;font-weight:800;padding:7px 28px;border-radius:30px;margin-top:10px}
.cert-status.pass{background:#f0fdf4;color:var(--success);border:2px solid var(--success)}
.cert-status.fail{background:#fef2f2;color:var(--danger);border:2px solid var(--danger)}
.cert-date{font-size:13px;color:var(--text-light);margin-top:18px}
.cert-id{font-size:12px;color:#b0bec5;margin-top:5px;font-family:monospace}
.result-detail{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:30px}
.result-detail-header{background:#f5f7ff;padding:18px 26px;font-size:15px;font-weight:700;color:var(--primary);border-bottom:1px solid var(--border)}
.result-detail-body{padding:22px 26px}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}

.print-area .page-break{page-break-after:always}

/* 密码强度指示器 */

  {id:6,qtype:"single",stem:"空气细菌总数\"自然沉降法\"是指？",options:["A. 用机器把空气吹到平皿上","B. 把平皿打开让菌自然落下","C. 用拭子擦空气","D. 过滤空气"],answer:"B",score:2,explanation:"平皿暴露让微生物自然沉降。"},
  {id:7,qtype:"single",stem:"公共用品用具微生物采样，一件毛巾应？",options:["A. 用一支拭子擦所有毛巾","B. 一件用品用一支拭子，固定面积涂抹","C. 直接剪碎培养","D. 用嘴吹一下"],answer:"B",score:2,explanation:"一件一拭子，防止交叉污染。"},
  {id:8,qtype:"single",stem:"集中空调冷却水中需在生物安全柜操作的致病微生物是？",options:["A. 大肠杆菌","B. 金黄色葡萄球菌","C. 嗜肺军团菌","D. 真菌"],answer:"C",score:2,explanation:"军团菌致病且存在气溶胶风险，需生物安全柜操作。"},
  {id:9,qtype:"single",stem:"根据监测技术规范，布点一般按？",options:["A. 只在门口布点","B. 每 50~100 m² 设 1 个点，均匀布设","C. 随机 1 个点","D. 只在污染源旁"],answer:"B",score:2,explanation:"按面积均匀布点，保证代表性。"},
  {id:10,qtype:"single",stem:"质控\"现场空白\"的作用是证明？",options:["A. 采样员手不抖","B. 吸收液/滤膜本身没被污染","C. 仪器很准","D. 数据好看"],answer:"B",score:2,explanation:"现场空白证\"锅干净\"。"},

  {id:12,qtype:"multi",stem:"化学性指标采样时，下列哪些做法正确？",options:["A. 甲醛样品避光、24h内分析","B. 臭氧样品全程避光、即采即测","C. 苯系物活性炭管进气方向接反无所谓","D. 采样流量和体积要准确记录","E. 滤膜用手直接拿取"],answer:"A,B,D",score:3},
  {id:13,qtype:"multi",stem:"空气微生物采样质控应包括？",options:["A. 培养基空白","B. 平行采样取平均","C. 开盖时间越长越好","D. 无菌操作"],answer:"A,B,D",score:3},

  {id:16,qtype:"judge",stem:"GB/T 18204.2 是空气微生物指标的测定方法。",options:["对","错"],answer:"错",score:2,explanation:"第2部分是化学性指标；空气微生物是第3部分。"},
  {id:17,qtype:"judge",stem:"测照度前，探头应遮光清零，且人不要挡住光路。",options:["对","错"],answer:"对",score:2},

  {id:22,qtype:"judge",stem:"公共用品采样时，一支棉拭子可以连续擦拭多件不同用品以提高效率。",options:["对","错"],answer:"错",score:2},

  {id:26,qtype:"short",stem:"简述室内空气\"新风量\"的采样原理和关键注意事项。",options:[],answer:"原理：用示踪气体（如CO₂）在密闭有人房间测浓度衰减/释放，结合房间体积与人数算新风量。注意：在正常使用、门窗正常关闭状态测；房间先密闭平衡；记录体积、人数、门窗状态；重复2~3次取平均。",score:6,keyword:"示踪气体；密闭平衡；记录体积人数"},

  {id:28,qtype:"short",stem:"什么是\"空气细菌总数\"的撞击法和自然沉降法？各适用于什么场景？",options:[],answer:"撞击法：用采样器将空气高速撞击到培养皿上捕菌，速度快、定量好，适合精确监测。自然沉降法：平皿打开暴露一定时间，靠重力落菌，操作简便，适合快速筛查。",score:6,keyword:"撞击法定量精确；沉降法简便筛查"},
  {id:29,qtype:"short",stem:"公共用品用具微生物采样\"涂抹法\"的操作要点是什么？",options:[],answer:"无菌生理盐水湿润棉拭子；在用品表面固定面积（如5×5cm²）内来回均匀涂抹；剪去手触部分放入采样液；一件一拭子、标记清楚；尽快4℃冷藏送检。",score:6,keyword:"无菌；固定面积；一件一拭子；标记；冷藏"},
  {id:30,qtype:"short",stem:"集中空调通风系统卫生监测包含哪几类主要检测内容？为什么军团菌检测要特别小心？",options:[],answer:"内容：送风中细菌/真菌总数、送风中PM10、风管内表面积尘量、风管内表面微生物、冷却水嗜肺军团菌。原因：军团菌致病、可随气溶胶吸入，且操作有生物危害，须生物安全柜防护。",score:6,keyword:"送风微生物；PM10；积尘；军团菌；生物安全柜"},
  {id:31,qtype:"scenario",stem:"【场景】某检测员在商场测风速，站在风速计正前方读数，得到 0.05 m/s。请指出问题，并说明正确做法和可能造成的后果。",options:[],answer:"问题：人站在正前方会遮挡风流、制造乱流，测得的是\"人的影子\"而非真实风速。正确：采样员退到仪器下风向0.5m外，探头迎风。后果：读数偏低，数据不可靠。",score:5,keyword:"遮挡风流；退到下风向0.5m外"},
  {id:32,qtype:"scenario",stem:"【场景】某宾馆杯具监测，采样员用同一支无菌棉拭子依次擦拭了 8 个茶杯内侧，混合后送检。请评价该操作，并给出规范做法。",options:[],answer:"问题：一支拭子擦多件用品会造成交叉污染，且无法定位哪件不合格。规范：一件用品一支无菌拭子，固定面积涂抹，分别标记、分别培养。",score:5,keyword:"交叉污染；一件一拭子；分别标记培养"},
  {id:33,qtype:"scenario",stem:"【场景】测新装修办公室甲醛，采样时门窗大开、空调全开，实验室报出\"甲醛合格\"。请分析该结果是否可靠，并说明正确采样条件。",options:[],answer:"不可靠。甲醛采样应在房间密闭（关闭门窗一定时段、停止通风）状态下进行；门窗大开、空调全开会稀释甲醛，导致\"假合格\"。正确：采样前按标准要求密闭房间、关闭新风/空调，达到平衡后再采样。",score:5,keyword:"不可靠；应密闭；假合格"},
  {id:34,qtype:"single",stem:"根据《公共场所卫生检验方法》，教室室内空气温度的检测应采用什么仪器？",options:["热电偶温度计","水银温度计","红外线测温仪","酒精温度计"],answer:"A",score:2,explanation:"热电偶温度计响应快、精度高，符合GB/T 18204.13要求。水银和酒精温度计因安全性和响应速度问题不适用于公共场所快速检测。"},
  {id:35,qtype:"single",stem:"测量室内空气温度时，采样点距离地面高度应为多少？",options:["0.5m","1.0m","1.2～1.5m（呼吸带高度）","2.0m"],answer:"C",score:2,explanation:"呼吸带高度1.2～1.5m是人体呼吸的区域，检测此高度的空气温度最具卫生学意义。"},
  {id:36,qtype:"single",stem:"室内空气温度检测时，测量前需关闭门窗至少多少时间？",options:["5分钟","10分钟","30分钟","1小时"],answer:"C",score:2,explanation:"关闭门窗30分钟以上使室内温度达到稳定状态，检测结果才具有代表性。"},
  {id:37,qtype:"single",stem:"以下哪项不是影响室内空气温度检测结果准确性的因素？",options:["太阳辐射","人员活动","仪器检定状态","检测日期"],answer:"D",score:2,explanation:"检测日期不影响结果准确性，而太阳辐射、人员活动和未检定的仪器会影响检测精度。"},
  {id:38,qtype:"single",stem:"测量室内空气温度时，每个测点应测量几次取平均值？",options:["1次","2次","3次","5次"],answer:"B",score:2,explanation:"每个测点测量不少于2次，取平均值作为该点的检测结果，以减少随机误差。"},
  {id:39,qtype:"single",stem:"在冬季和夏季进行室内温度检测时，室内外温差较大，检测前应注意什么？",options:["保持通风","关闭热源或冷源30分钟","开启空调调节","无需特别注意"],answer:"B",score:2,explanation:"温差大时需关闭热/冷源30分钟，使室内温度趋于稳定后再测量，避免设备干扰。"},
  {id:40,qtype:"single",stem:"教室室内温度检测的卫生学意义是什么？",options:["仅反映舒适度","反映人体热平衡和健康状况","仅与能耗相关","与水质相关"],answer:"B",score:2,explanation:"室内温度直接影响人体热平衡，过高或过低都会导致热应激反应，影响工作效率和健康，是公共场所卫生评价的重要指标。"},
  {id:41,qtype:"multi",stem:"夏季空调房间室内温度过高的主要原因包括（ ）。",options:["制冷量不足","新风量过大","围护结构隔热差","人员密度低"],answer:"A,C",score:2,explanation:"制冷量不足直接导致室温过高；新风量过大增加热负荷；围护结构隔热差引入更多室外热量；人员密度低反而减少发热量。"},
  {id:42,qtype:"multi",stem:"室内温度与人体健康的关系，正确的说法是（ ）。",options:["室温过高会导致中暑","室温过低会引起感冒","温差骤变易诱发心脑血管疾病","室温与健康无关"],answer:"A,B,C",score:2,explanation:"适宜的室内温度对健康至关重要。室温过高易中暑，过低易感冒，温差大时人体血管收缩扩张频繁，诱发心脑血管疾病。"},
  {id:43,qtype:"single",stem:"根据GB/T 18204.13，室内相对湿度的检测方法为（ ）。",options:["干湿球法","阿斯曼通风干湿表法","露点法","以上方法均可采用"],answer:"D",score:2,explanation:"干湿球法、阿斯曼通风干湿表法和电子湿度计法均可用于公共场所室内相对湿度检测，应根据现场条件选择。"},
  {id:44,qtype:"multi",stem:"室内相对湿度过低（干燥）对人体的影响包括（ ）。",options:["皮肤干燥瘙痒","呼吸道黏膜干燥","易产生静电","流感传播加快"],answer:"A,B,C",score:2,explanation:"干燥环境使皮肤和呼吸道黏膜失水，导致不适；静电增加；流感病毒在干燥空气中存活更久，传播更快。"},
  {id:45,qtype:"single",stem:"室内相对湿度适宜范围为多少？",options:["10%～20%","30%～60%","40%～70%","60%～90%"],answer:"C",score:2,explanation:"根据公共场所卫生标准，室内相对湿度以40%～70%为宜，过低干燥过高潮湿均不利于健康。"},
  {id:46,qtype:"single",stem:"为什么公共场所需要检测相对湿度？",options:["湿度影响人体热调节","高湿环境促进霉菌和尘螨生长","低湿环境使呼吸道疾病易发","以上均正确"],answer:"D",score:2,explanation:"湿度直接影响热舒适、呼吸道健康和室内微生物滋生，是综合评价公共场所空气卫生质量的重要指标。"},
  {id:47,qtype:"single",stem:"测量室内风速时，检测仪器应距离墙壁或其他障碍物至少多少厘米？",options:["5cm","10cm","20cm","50cm"],answer:"C",score:2,explanation:"墙壁附近存在边界效应，风速分布不均匀，测点应距墙壁20cm以上以获得代表性数据。"},
  {id:48,qtype:"single",stem:"测量室内风速时，采样时间每个测点不少于多少秒？",options:["5秒","10秒","30秒","60秒"],answer:"C",score:2,explanation:"室内风速存在波动，每个测点采样时间不少于30秒，取平均值以减少读数波动的影响。"},
  {id:49,qtype:"single",stem:"室内风速过大可能导致的卫生问题是（ ）。",options:["人体产生吹风感不适","加速呼吸道疾病传播","加速室内甲醛释放","以上均是"],answer:"D",score:2,explanation:"风速过大引起不舒适吹风感；加速飞沫核扩散促进呼吸道疾病传播；加快室内污染物释放和扩散。"},
  {id:50,qtype:"single",stem:"室内风速检测的主要目的是什么？",options:["评价空调制冷效果","评价室内空气流动性和舒适性","评价建筑节能效果","评价噪声水平"],answer:"B",score:2,explanation:"室内风速影响人体热舒适、空气交换效率和污染物扩散，过大或过小均不利于健康和空气质量。"},
  {id:51,qtype:"single",stem:"根据GB/T 18204.1，公共场所噪声检测应使用什么类型的声级计？",options:["0型声级计","1型声级计","2型或2型以上声级计","3型声级计"],answer:"C",score:2,explanation:"公共场所噪声检测应使用2型或2型以上声级计，精度满足卫生监测要求。"},
  {id:52,qtype:"single",stem:"室内噪声测量时，测量位置应距离墙壁或其他反射面至少多少米？",options:["0.5m","1.0m","1.5m","2.0m"],answer:"C",score:2,explanation:"墙壁反射会影响噪声测量准确性，测点应距墙壁1.5m以上，减少反射声干扰。"},
  {id:53,qtype:"single",stem:"学校教室噪声检测的主要卫生学意义是（ ）。",options:["噪声影响学生听课注意力","噪声影响教师健康","噪声影响教学设备寿命","与健康无关"],answer:"A",score:2,explanation:"教室噪声过高（>50dB）严重影响学生注意力和学习效率，是学校卫生的重要评价指标，也关系到教师职业健康。"},
  {id:54,qtype:"single",stem:"以下哪些属于室内噪声的主要来源（ ）。",options:["空调通风系统","人员活动","室外交通噪声","以上均是"],answer:"D",score:2,explanation:"室内噪声来源于空调风机噪声、人员交谈和走动、室外交通噪声传入等多个方面。"},
  {id:55,qtype:"single",stem:"根据GB 7793-2010《中小学教室采光和照明卫生标准》，教室课桌面维持平均照度不低于多少勒克斯？",options:["150 lx","300 lx","500 lx","750 lx"],answer:"B",score:2,explanation:"依据GB 7793-2010，教室课桌面维持平均照度不低于300lx，黑板面不低于500lx。"},
  {id:56,qtype:"single",stem:"照度检测时，测量高度（课桌面）为多少米？",options:["0.5m","0.75m","1.0m","1.2m"],answer:"B",score:2,explanation:"课桌面照度测量高度为距地面0.75m（学生就座时眼睛到桌面的高度差对应的课桌高度）。"},
  {id:57,qtype:"single",stem:"照度计在使用前应进行什么处理？",options:["充电","校准（用标准光源）","预热30分钟","清洗探头"],answer:"B",score:2,explanation:"照度计属于精密光学仪器，使用前必须用标准光源进行校准，确保测量准确性。"},
  {id:58,qtype:"single",stem:"教室照度不足可能导致什么后果？",options:["学生近视发生率增加","教师职业病","教室能耗增加","无不良影响"],answer:"A",score:2,explanation:"照度不足是学生近视发生发展的重要环境因素，长期在低照度环境下学习会加重视力疲劳，促进近视发展。"},
  {id:59,qtype:"single",stem:"教室采光系数不应低于多少？",options:["0.5%","1.0%","1.5%","2.0%"],answer:"C",score:2,explanation:"根据GB 7793-2010，教室采光系数不应低于1.5%，以保证足够的自然采光。"},
  {id:60,qtype:"single",stem:"照度均匀度是指什么？",options:["最大值与最小值之比","最小照度与平均照度之比","平均照度与标准照度之比","照度计读数一致性"],answer:"B",score:2,explanation:"照度均匀度＝课桌面最小照度值/平均照度值，不应低于0.7，保证整个课桌面的照度分布均匀。"},
  {id:61,qtype:"single",stem:"为什么教室需要检测照度和采光？",options:["影响学生视力健康和学习效率","影响建筑能耗","影响教室美观","与健康无关"],answer:"A",score:2,explanation:"照度不足是学生近视的重要环境因素；自然采光不足影响学生情绪和学习状态；照度均匀度差造成视觉疲劳。"},
  {id:62,qtype:"single",stem:"测量教室照度时，测点布置应采用什么方法？",options:["梅花桩法（5点法）","对角线法","网格法或均匀布点法","随机布点法"],answer:"C",score:2,explanation:"教室照度测量一般采用网格法，将课桌面划分为均匀网格，在各网格中心测量取平均值。"},
  {id:63,qtype:"single",stem:"黑板照度的检测要求包括（ ）。",options:["测量高度距地面1.0m","取各测点平均值","照度均匀度不低于0.8","以上均是"],answer:"D",score:2,explanation:"黑板照度测量高度1.0m，取各点平均值，且照度均匀度不应低于0.8，保证黑板字迹清晰可辨。"},
  {id:64,qtype:"single",stem:"学校教室物理环境检测包括以下哪些参数（ ）。",options:["温度、湿度、风速","噪声、照度、采光系数","电磁辐射","温度、湿度、风速、噪声、照度"],answer:"D",score:2,explanation:"教室物理因素检测包括温度、相对湿度、风速、噪声、照度五项指标，采光系数属采光指标一并评价。"},
  {id:65,qtype:"single",stem:"物理因素检测的质量控制要点包括（ ）。",options:["仪器经检定并在有效期内","检测人员持证上岗","记录环境条件","以上均是"],answer:"D",score:2,explanation:"物理因素检测质控包括：仪器检定、人员资质、规范操作、同步记录环境参数，确保结果准确可溯源。"},
  {id:66,qtype:"short",stem:"简答题：学校教室为什么要同时检测温度、湿度、风速、噪声和照度这些物理因素？",options:[],answer:"",score:5,explanation:"参考答案要点：①温度、湿度、风速构成热舒适环境，影响人体热平衡和疾病传播；②噪声影响学习注意力和师生健康；③照度影响学生视力和学习效率；④各指标相互关联，共同决定教室环境质量；⑤国家卫生标准明确规定了各项指标的限值要求，是学校卫生监督的重要依据。"},
  {id:67,qtype:"scenario",stem:"案例分析：某县疾控中心对一所新建小学教室进行卫生监测。现场检测结果：温度28℃（标准≤26℃），相对湿度85%（标准30%~60%），照度120lx（标准≥300lx），噪声55dB（标准≤50dB）。请分析该教室存在的主要卫生问题，并说明改善建议。",options:[],answer:"",score:5,explanation:"参考答案要点：①温度偏高：教室通风不良或制冷量不足，建议增加空调能力或自然通风；②湿度严重超标：易滋生霉菌，建议除湿或增强通风；③照度严重不足：影响学生视力，建议更换或增加照明灯具，确保达到300lx以上；④噪声超标：影响教学环境，建议加强隔音或调整教室布局远离噪声源；⑤综合判定：该教室物理环境质量不达标，应整改后复检，复检合格后方可投入使用；⑥检测意义：教室物理环境质量直接影响学生健康和学习效率，不合格环境可导致近视、呼吸道疾病等问题。"},
  {id:68,qtype:"single",stem:"根据GB/T 18204.2，一氧化碳检测方法为（ ）。",options:["不分光红外线法","电化学法","气相色谱法","以上均可"],answer:"D",score:2,explanation:"一氧化碳检测可采用不分光红外线法（基准法）、电化学法（快速法）和气相色谱法（仲裁法），根据精度要求选用。"},
  {id:69,qtype:"single",stem:"一氧化碳慢性长期暴露对人体的影响是（ ）。",options:["急性中毒","贫血和神经系统损伤","皮肤过敏","牙齿松动"],answer:"B",score:2,explanation:"低浓度CO长期吸入导致血液携氧能力下降，引起慢性缺氧，表现为头晕、记忆力减退、贫血等，神经系统可出现不可逆损伤。"},
  {id:70,qtype:"single",stem:"检测室内一氧化碳的卫生学意义是什么？",options:["评价室内通风效果","评价燃烧设备运行状态","预防CO中毒","以上均是"],answer:"D",score:2,explanation:"CO是燃烧产物（燃气热水器、炉灶等），室内CO浓度升高提示通风不良或燃烧设备故障，高浓度可致急性中毒死亡。"},
  {id:71,qtype:"single",stem:"室内一氧化碳来源主要包括（ ）。",options:["燃气热水器","吸烟","汽车尾气（来自停车场）","以上均是"],answer:"D",score:2,explanation:"燃气热水器/灶具不完全燃烧、烟草烟雾、汽车库排气等均可向室内释放CO，导致室内浓度升高。"},
  {id:72,qtype:"single",stem:"为什么禁止在教室内使用炭火取暖或烧烤？",options:["产生大量一氧化碳","产生二氧化碳","产生PM2.5","以上均是"],answer:"D",score:2,explanation:"含碳燃料不完全燃烧产生大量CO，同时产生CO2和颗粒物，在密闭或半密闭空间极易引发CO中毒，曾发生多起集体中毒事故。"},
  {id:73,qtype:"single",stem:"根据GB/T 18204.2，公共场所室内二氧化碳检测的首选方法是（ ）。",options:["化学滴定法","不分光红外线气体分析法","电化学法","气相色谱法"],answer:"B",score:2,explanation:"不分光红外线气体分析法（NDIR）是CO2检测的基准方法，精度高、操作简便，是公共场所卫生检验的首选方法。"},
  {id:74,qtype:"single",stem:"公共场所室内二氧化碳浓度卫生标准限值为多少？",options:["0.05%（500ppm）","0.10%（1000ppm）","0.15%（1500ppm）","0.20%（2000ppm）"],answer:"C",score:2,explanation:"根据GB 9663-1996等公共场所卫生标准，室内CO2浓度不应超过0.15%（1500ppm），电影院、音乐厅等应≤0.15%，其他公共场所≤0.15%。"},
  {id:75,qtype:"single",stem:"室内二氧化碳浓度升高主要反映什么问题？",options:["室内人员密度过高","通风换气不足","人体代谢产物积累","以上均是"],answer:"D",score:2,explanation:"CO2由人体呼出，室内浓度升高直接反映人员密度高且通风不足，是评价室内通风效果和拥挤程度的综合指标。"},
  {id:76,qtype:"single",stem:"使用不分光红外线法检测CO2时，采样前需对仪器进行什么操作？",options:["充电","校准（通入清洁空气调零）","清洗采样管","预热30分钟以上"],answer:"D",score:2,explanation:"红外线分析仪需预热30分钟以上使光源和检测器稳定，再用清洁空气调零，方可进行测量。"},
  {id:77,qtype:"single",stem:"某教室课间后二氧化碳浓度明显升高，主要原因是（ ）。",options:["学生呼出CO2积累","黑板粉尘增加","照明增强","课桌椅挥发物"],answer:"A",score:2,explanation:"人体代谢产生CO2，课间教室人数不变、门窗关闭时，CO2浓度会随时间积累升高，反映了通风换气的重要性。"},
  {id:78,qtype:"single",stem:"二氧化碳检测在公共场所卫生监测中的意义是（ ）。",options:["反映室内通风换气状况","反映室内人员拥挤程度","间接反映呼吸道疾病传播风险","以上均是"],answer:"D",score:2,explanation:"CO2浓度是评价室内空气质量的综合指标，浓度升高反映通风不足、人员密集，不仅影响舒适度，也增加呼吸道疾病传播风险。"},
  {id:79,qtype:"single",stem:"为什么课间需要开窗通风？",options:["降低室内CO2浓度","降低室温","降低甲醛浓度","以上均是"],answer:"D",score:2,explanation:"开窗通风可同时降低CO2浓度（减少呼吸道传播风险）、室温、甲醛等污染物浓度，改善室内空气品质，是最简便有效的卫生措施。"},
  {id:80,qtype:"single",stem:"关于CO2检测的采样要求，以下说法正确的是（ ）。",options:["采样高度为1.2～1.5m","每次测量读数稳定后记录","取多次读数的平均值","以上均正确"],answer:"D",score:2,explanation:"CO2采样应在呼吸带高度1.2～1.5m处，读数稳定后记录，重复测量不少于3次取平均值，确保结果准确。"},
  {id:81,qtype:"single",stem:"根据GB/T 18204.2，公共场所甲醛检测的基准方法是（ ）。",options:["酚试剂分光光度法","电化学传感器法","气相色谱法","高效液相色谱法"],answer:"A",score:2,explanation:"酚试剂分光光度法是甲醛检测的基准方法（仲裁法），灵敏度高、特异性好，适用于低浓度甲醛检测。"},
  {id:82,qtype:"single",stem:"酚试剂分光光度法检测甲醛的原理是什么？",options:["甲醛与酚试剂在高铁离子存在下反应生成蓝绿色化合物","甲醛与次氯酸盐反应","甲醛直接吸收特定波长光","甲醛使指示剂变色"],answer:"A",score:2,explanation:"甲醛与酚试剂（AHMT）在碱性条件下被高锰酸钾氧化，生成蓝绿色化合物，颜色深浅与甲醛浓度成正比，用分光光度计于630nm处测定吸光度。"},
  {id:83,qtype:"single",stem:"甲醛检测采样时，应使用什么材质的采样管？",options:["活性炭管","硅胶管","大型气泡吸收管或多孔玻板吸收管","石英纤维滤膜"],answer:"C",score:2,explanation:"甲醛采样使用大型气泡吸收管（盛装酚试剂吸收液）或多孔玻板吸收管，使空气以一定流量通过吸收液，甲醛被选择性吸收。"},
  {id:84,qtype:"single",stem:"室内甲醛的主要来源包括（ ）。",options:["人造板材（胶合板、密度板）","油漆和涂料","新家具","以上均是"],answer:"D",score:2,explanation:"甲醛主要来自人造板材中的脲醛树脂胶、油漆涂料中的溶剂、新家具释放等，装修后前3年释放量最大，是室内主要装修污染物。"},
  {id:85,qtype:"single",stem:"甲醛对人体健康的影响包括（ ）。",options:["刺激眼睛和呼吸道黏膜","引起过敏性鼻炎和哮喘","长期暴露可能致癌","以上均是"],answer:"D",score:2,explanation:"甲醛是明确的眼刺激物和致敏原，可引起呼吸道炎症、过敏性疾病，国际癌症研究机构(IARC)将甲醛列为1类致癌物。"},
  {id:86,qtype:"single",stem:"装修后多久入住比较安全？",options:["1周","1个月","至少通风放置3个月，最好1年以上","只要闻不到气味即可入住"],answer:"C",score:2,explanation:"甲醛释放周期长达3-15年，装修后前3个月释放量最高，建议充分通风3个月以上再入住，选用环保材料可缩短安全周期。"},
  {id:87,qtype:"single",stem:"酚试剂分光光度法检测甲醛时，采样后样品保存条件是（ ）。",options:["常温保存即可","置于4℃冰箱中保存","现场立即测定","冷冻保存"],answer:"B",score:2,explanation:"采样后吸收液应置于4℃冰箱中冷藏保存，24小时内送实验室分析，否则甲醛会氧化降解导致结果偏低。"},
  {id:88,qtype:"single",stem:"为什么学校教室在装修后需要进行甲醛检测？",options:["甲醛影响学生呼吸道健康","甲醛影响儿童生长发育","甲醛是一类致癌物","以上均是"],answer:"D",score:2,explanation:"儿童呼吸频率高，单位体重的甲醛吸入量高于成人，且免疫系统发育不完善，更易受甲醛危害，学校教室是儿童长期停留场所，装修后甲醛检测是保护学生健康的重要措施。"},
  {id:89,qtype:"single",stem:"酚试剂分光光度法检测甲醛时，影响结果准确性的关键因素包括（ ）。",options:["采样流量和时间","吸收液配制方法","显色反应时间和温度","以上均是"],answer:"D",score:2,explanation:"采样流量影响吸收效率；吸收液浓度和配制方法影响反应灵敏度；显色时间（20±2℃放置15min）和温度影响颜色深浅，三者均需严格控制。"},
  {id:90,qtype:"single",stem:"根据GB/T 18204.2，公共场所可吸入颗粒物PM10的检测方法是（ ）。",options:["重量法（采样滤膜称重）","光散射法（数字粉尘仪）","β射线吸收法","以上均可采用"],answer:"D",score:2,explanation:"PM10检测可采用重量法（基准法）、光散射法（快速筛查）和β射线吸收法（在线监测），现场快速检测多用光散射法。"},
  {id:91,qtype:"single",stem:"可吸入颗粒物PM10是指空气动力学直径小于等于多少微米的颗粒物？",options:["2.5μm","5μm","10μm","25μm"],answer:"C",score:2,explanation:"PM10指空气动力学直径≤10μm的颗粒物，能进入上呼吸道，其中PM2.5可到达肺泡，是卫生学评价的重要指标。"},
  {id:92,qtype:"single",stem:"室内PM10的主要来源包括（ ）。",options:["清扫活动产生的扬尘","人员走动带起的尘埃","空调系统二次污染","以上均是"],answer:"D",score:2,explanation:"室内PM10来自清扫扬尘、人活动带尘、空调过滤网积尘再飞扬、打印机粉尘等，浓度与室内清洁程度密切相关。"},
  {id:93,qtype:"single",stem:"PM10浓度过高对人体健康的影响是（ ）。",options:["加重哮喘和慢性支气管炎","增加心血管疾病风险","携带病原微生物传播疾病","以上均是"],answer:"D",score:2,explanation:"PM10可携带重金属、病毒、细菌等有害物质，沉积在呼吸道各部位，引起炎症反应，增加心肺疾病发病率和死亡率。"},
  {id:94,qtype:"single",stem:"根据GB/T 18204.2，公共场所室内氨气的检测方法是（ ）。",options:["靛酚蓝分光光度法","次氯酸钠-水杨酸分光光度法","纳氏试剂分光光度法","酚试剂法"],answer:"C",score:2,explanation:"氨的检测常用纳氏试剂分光光度法（灵敏度高、操作简便），次氯酸钠-水杨酸分光光度法也常用，原理均为氨与试剂反应生成有色化合物。"},
  {id:95,qtype:"single",stem:"室内氨气的主要来源是（ ）。",options:["混凝土防冻剂（北方冬季施工）","装修材料","人体代谢产物","以上均是"],answer:"D",score:2,explanation:"氨来源于建筑材料（防冻剂中的铵盐）、装修涂料、人体汗液和尿液分解（卫生间、游泳馆等），是室内常见刺激性气体。"},
  {id:96,qtype:"single",stem:"氨气对人体的危害主要是（ ）。",options:["刺激性：引起流泪、咽痛、咳嗽","吸入过多导致肺水肿","长期低浓度暴露引起慢性呼吸道炎症","以上均是"],answer:"D",score:2,explanation:"氨是强刺激性气体，低浓度引起眼鼻刺激，高浓度可致化学性肺炎和肺水肿，长期低浓度暴露导致慢性呼吸道炎症，是公共场所重点监测的刺激性气体。"},
  {id:97,qtype:"single",stem:"游泳池空气氨浓度检测的目的是什么？",options:["反映池水尿素分解程度","反映更衣室清洁状况","反映通风换气状况","与健康无关"],answer:"A",score:2,explanation:"游泳池空气中氨主要来自游泳者汗液和尿液中的尿素被含氯消毒剂分解产生，氨浓度升高反映池水尿素超标或强制淋浴执行不到位。"},
  {id:98,qtype:"single",stem:"公共场所空气中硫化氢的检测方法是（ ）。",options:["亚甲蓝分光光度法","硝酸银容量法","电化学法","以上均可"],answer:"D",score:2,explanation:"硫化氢检测方法包括亚甲蓝分光光度法（基准法）、硝酸银容量法（仲裁法）和电化学传感器法（快速法），公共场所快速检测多用亚甲蓝法。"},
  {id:99,qtype:"single",stem:"硫化氢的主要来源是（ ）。",options:["卫生间下水道","垃圾处理场所","温泉","以上均是"],answer:"D",score:2,explanation:"硫化氢来自含硫有机物厌氧分解，卫生间下水道、垃圾中转站、温泉等场所常见，是公共场所重点监测的恶臭和有毒气体。"},
  {id:100,qtype:"single",stem:"硫化氢对健康的主要危害是（ ）。",options:["低浓度：刺激性恶臭","高浓度：麻痹呼吸中枢，可致猝死","浓度超过1000mg/m³可电击样死亡","以上均是"],answer:"D",score:2,explanation:"H2S是剧毒气体，低浓度（<10mg/m³）有恶臭（臭鸡蛋味），10-50mg/m³引起眼和呼吸道刺激，高浓度（>500mg/m³）麻痹呼吸中枢，瞬间可致死，公共场所不可忽视。"},
  {id:101,qtype:"short",stem:"简答题：某游泳馆更衣室空气中氨浓度检测结果为1.5mg/m³（标准≤0.5mg/m³），请分析原因并提出改进措施。",options:[],answer:"",score:5,explanation:"参考答案：①原因分析：更衣室氨浓度超标可能原因：a.游泳者未充分淋浴，身体汗液和尿液带入池水区；b.池水尿素超标导致加氯消毒后产生氨气反冲；c.更衣室通风不良，氨气蓄积；d.清洁剂（含氨消毒剂）使用不当。②改进措施：a.在更衣室入口设置强制淋浴流程，督促游泳者充分冲洗；b.加强池水尿素检测，增加换水频率；c.增加更衣室机械通风换气量；d.规范清洁剂使用，避免含氨消毒剂与含氯消毒剂混用；e.复检合格后方可营业。"},
  {id:102,qtype:"single",stem:"根据GB/T 18204.3，公共场所空气细菌总数的检测方法是（ ）。",options:["沉降法","撞击法","过滤法","以上均可采用"],answer:"D",score:2,explanation:"空气细菌总数检测可采用沉降法（简便但精度较低）、撞击法（基准法，精度高）和过滤法，各有适用场景。"},
  {id:103,qtype:"single",stem:"撞击法检测空气细菌总数的原理是（ ）。",options:["利用重力使空气中细菌沉降到营养琼脂平板上","利用抽气泵使空气通过狭缝冲击到琼脂平板上","使空气通过滤膜截留细菌","利用离心力分离细菌"],answer:"B",score:2,explanation:"撞击法（Andersen采样器）利用抽气泵以一定流量抽吸空气，空气以高速通过狭缝冲向营养琼脂平板，细菌因惯性冲击粘附在培养基上，经培养后计数。"},
  {id:104,qtype:"single",stem:"沉降法检测空气细菌时，培养基为（ ）。",options:["伊红美蓝琼脂","营养琼脂","麦康凯琼脂","SS琼脂"],answer:"B",score:2,explanation:"空气细菌总数检测使用营养琼脂（NA）平板，能支持一般细菌生长，其他选择培养基用于特定菌检测。"},
  {id:105,qtype:"single",stem:"沉降法采样时，培养皿放置高度和暴露时间分别为（ ）。",options:["1.2m，5分钟","1.5m，5-30分钟","地面高度，30分钟","1.2m，60分钟"],answer:"B",score:2,explanation:"沉降法采样高度1.5m（呼吸带高度），暴露时间5-30min，时间长短根据预期浓度确定，浓度高时缩短时间避免菌落重叠。"},
  {id:106,qtype:"single",stem:"空气细菌总数培养基培养温度和时间是（ ）。",options:["25℃±1℃，24小时","30℃±1℃，48小时","37℃±1℃，48小时","42℃±1℃，24小时"],answer:"C",score:2,explanation:"空气细菌培养条件为37℃±1℃培养48小时，37℃是人体正常体温温度，适合大多数常见细菌生长。"},
  {id:107,qtype:"single",stem:"空气细菌总数检测的卫生学意义是什么？",options:["评价空气清洁程度","评价呼吸道疾病传播风险","评价通风消毒效果","以上均是"],answer:"D",score:2,explanation:"空气细菌总数是评价室内空气清洁度的重要综合指标，浓度过高反映空气中飞沫核和尘埃携带的细菌超标，提示呼吸道疾病传播风险增加，也反映通风和消毒措施是否到位。"},
  {id:108,qtype:"single",stem:"撞击法检测空气细菌时，采样前需进行什么操作？",options:["用75%酒精擦拭采样头","对采样器进行消毒","仪器流量校准","以上均是"],answer:"D",score:2,explanation:"撞击法采样前需用酒精擦拭消毒采样头，校准抽气流量（一般28.3L/min），确保采样体积准确，保证检测结果的可比性。"},
  {id:109,qtype:"single",stem:"空气细菌总数检测结果以什么单位表示？",options:["个/mL","cfu/m³","cfu/皿","个/cm²"],answer:"B",score:2,explanation:"空气细菌总数结果以cfu/m³表示（菌落形成单位/立方米），撞击法通过采样体积换算，沉降法通过奥梅梁斯基公式换算。"},
  {id:110,qtype:"single",stem:"沉降法检测空气细菌时，计算公式中每个测点5分钟的换算系数为（ ）。",options:["60","100","200","与暴露时间无关"],answer:"B",score:2,explanation:"沉降法结果换算公式：cfu/m³=50000×N/（t×A），其中A为平板面积（cm²），t为暴露时间（min），对于暴露5分钟一般换算系数约为100（与平板面积有关）。"},
  {id:111,qtype:"single",stem:"关于空气细菌总数检测的质量控制，正确的说法是（ ）。",options:["培养基需在有效期内使用","采样前采样器需消毒","同时做空白对照","以上均是"],answer:"D",score:2,explanation:"空气细菌检测质控包括：培养基质量控制（有效期内、生长率合格）、采样器消毒、设置空白对照、操作人员无菌操作，防止交叉污染。"},
  {id:112,qtype:"single",stem:"为什么学校教室需要定期进行空气细菌总数检测？",options:["儿童免疫力低，呼吸道疾病易发","教室人员密集，飞沫传播风险高","空调系统容易滋生细菌","以上均是"],answer:"D",score:2,explanation:"儿童是呼吸道疾病高发人群，教室人员密集且通风受限，空气细菌超标会显著增加流感等呼吸道疾病传播风险，是学校卫生监督的重要内容。"},
  {id:113,qtype:"short",stem:"简答题：说明撞击法检测空气细菌总数的操作步骤和质量控制要点。",options:[],answer:"",score:5,explanation:"参考答案：一、操作步骤：①准备工作：配制营养琼脂平板，37℃±1℃培养24h检查无杂菌；②采样器校准流量；③消毒采样头；④平板编号，标注采样地点和时间；⑤采样：打开电源，按设定流量采样5min；⑥培养：37℃±1℃培养48h；⑦计数：计数各平板菌落数；⑧计算：cfu/m³=菌落数×1000/采样流量（L/min）×采样时间（min）。二、质控要点：①培养基生长率>80%；②采样器流量校准；③设置空白对照（未采样平板同时培养）；④采样过程避免人为污染；⑤及时送检，培养条件严格控制。"},
  {id:114,qtype:"single",stem:"根据GB/T 18204.4，公共用品用具细菌总数检测的方法是（ ）。",options:["倾注平板法","涂抹法","滤膜法","以上均可"],answer:"D",score:2,explanation:"公共用品用具细菌总数检测可采用倾注平板法（接种1mL样品）、涂抹法（棉签擦拭法）和滤膜法，根据样品性质选择。"},
  {id:115,qtype:"single",stem:"用涂抹法（棉签法）检测茶杯细菌总数时，棉签擦拭面积应为（ ）。",options:["25cm²","50cm²","100cm²","无要求"],answer:"B",score:2,explanation:"棉签法（涂抹法）擦拭面积为50cm²（5cm×10cm），擦拭后放入10mL无菌生理盐水试管，充分振荡洗脱，计算时换算为cfu/cm²。"},
  {id:116,qtype:"single",stem:"大肠菌群检测的卫生学意义是（ ）。",options:["判断是否受到粪便污染","判断是否含有致病菌","判断消毒是否彻底","以上均是"],answer:"D",score:2,explanation:"大肠菌群是人畜粪便的指示菌，检出大肠菌群表明用品用具受到粪便污染，可能含有肠道致病菌（如沙门氏菌、志贺氏菌），提示消毒不彻底或被粪便直接污染。"},
  {id:117,qtype:"single",stem:"大肠菌群的检测方法包括（ ）。",options:["发酵法（MPN法）","平板计数法","免疫学方法","以上均是"],answer:"D",score:2,explanation:"大肠菌群检测方法包括多管发酵法（MPN法，仲裁法）、平板计数法（Card法）和免疫层析法（快速法），公共场所检测常用MPN法。"},
  {id:118,qtype:"single",stem:"金黄色葡萄球菌（金葡菌）的卫生学意义是（ ）。",options:["引起化脓性感染","引起食物中毒","引起医院感染","以上均是"],answer:"D",score:2,explanation:"金黄色葡萄球菌可引起皮肤化脓性感染（疖、毛囊炎）、细菌性食物中毒（葡萄球菌肠毒素）和医院内感染，是公共用品用具的重要卫生指标菌。"},
  {id:119,qtype:"single",stem:"检测公共用品金黄色葡萄球菌时，Baird-Parker平板上典型菌落特征是（ ）。",options:["黑色或灰黑色，圆形，光滑","粉红色，圆形","无色透明","黄色"],answer:"A",score:2,explanation:"金黄色葡萄球菌在Baird-Parker平板上典型菌落为黑色或灰黑色，圆形，隆起，光滑，周围有透明环（卵磷脂酶环），是重要的形态学鉴定特征。"},
  {id:120,qtype:"single",stem:"真菌总数检测的卫生学意义是（ ）。",options:["评价潮湿发霉程度","评价过敏原暴露风险","曲霉等真菌可产生毒素或引起感染","以上均是"],answer:"D",score:2,explanation:"真菌总数反映室内潮湿和霉变程度，曲霉、青霉等可引起过敏性鼻炎和哮喘，曲霉毒素是致癌物质，免疫力低下者可发生侵袭性真菌感染，是公共卫生关注的重要指标。"},
  {id:121,qtype:"single",stem:"真菌总数检测使用的培养基是（ ）。",options:["营养琼脂","沙氏琼脂（SDA）","麦康凯琼脂","SS琼脂"],answer:"B",score:2,explanation:"真菌总数检测使用沙氏琼脂（Sabbouraud Dextrose Agar），pH偏酸（5.6±0.2），适合真菌生长而抑制大部分细菌，25-28℃培养5-7天计数。"},
  {id:122,qtype:"single",stem:"公共用品用具微生物检测的采样原则包括（ ）。",options:["在消毒处理后4小时内采样","同一用品用具采集2份平行样品","记录用品名称、消毒方法、采样时间","以上均是"],answer:"D",score:2,explanation:"公共用品微生物采样应在消毒处理后4小时内完成（避免时间过长细菌恢复或死亡），采集平行样品以确保结果可靠，详细记录消毒方式以评价消毒效果。"},
  {id:123,qtype:"single",stem:"某招待所茶杯大肠菌群检测阳性，说明（ ）。",options:["茶杯未清洗干净","茶杯清洗后消毒不彻底","茶杯被粪便污染","无法判断"],answer:"B",score:2,explanation:"茶杯检出大肠菌群说明清洗消毒不彻底，大肠菌群耐消毒剂能力弱于多数致病菌，其存在表明消毒环节存在漏洞。"},
  {id:124,qtype:"single",stem:"为什么游泳馆更衣室的拖鞋需要重点检测金黄色葡萄球菌？",options:["潮湿环境适宜金葡菌繁殖","共用拖鞋接触人群广泛","金葡菌可引起脚气和皮肤感染","以上均是"],answer:"D",score:2,explanation:"游泳馆更衣室潮湿，金葡菌可在鞋内繁殖；共用拖鞋是皮肤病传播的重要媒介，金葡菌可引起毛囊炎、脓疱疮等皮肤感染，是重点监测项目。"},
  {id:125,qtype:"short",stem:"简答题：叙述大肠菌群的检测流程（多管发酵法）并说明结果判定方法。",options:[],answer:"",score:5,explanation:"参考答案：检测流程：①初发酵（乳糖胆盐发酵管）：取样品稀释液10mL、1mL、0.1mL分别接种，37℃培养24h，观察产酸产气情况；②复发酵（伊红美蓝发酵管）：初发酵阳性管转种，37℃培养24h，观察产气情况；③结果判定：复发酵管产气即为大肠菌群阳性，根据阳性管数查MPN表得cfu/100cm²（或cfu/mL）。注意事项：初发酵不产气也可能污染，需复发酵确认；培养基需在有效期内；操作需无菌，避免假阳性。"},
  {id:126,qtype:"single",stem:"根据GB/T 18204.5，集中空调送风中可吸入颗粒物PM10的检测采样点数量为（ ）。",options:["1个","不少于3个","不少于5个","根据送风量计算确定"],answer:"C",score:2,explanation:"集中空调送风中PM10检测应在送风口设置不少于5个采样点，均匀分布，每个点重复测定不少于2次。"},
  {id:127,qtype:"single",stem:"集中空调送风中军团菌的采样方法是（ ）。",options:["用无菌玻璃瓶采集空调送风口的空气","采集空调过滤网","采集冷却水和冷凝水","采集风管内表面"],answer:"C",score:2,explanation:"军团菌主要孳生于冷却水和冷凝水系统，集中空调军团菌检测应采集冷却塔水、冷凝水等水样，送实验室培养检测。"},
  {id:128,qtype:"single",stem:"嗜肺军团菌的卫生学意义是（ ）。",options:["引起军团菌病（社区获得性肺炎）","引起流感样症状（庞蒂亚克热）","通过气溶胶传播","以上均是"],answer:"D",score:2,explanation:"嗜肺军团菌可引起军团菌病（重肺炎，死亡率高）和庞蒂亚克热（流感样疾病），主要通过空调冷却塔、淋浴喷头等产生的气溶胶传播，是集中空调卫生监测的重点。"},
  {id:129,qtype:"single",stem:"集中空调风管内表面积尘量检测的方法是（ ）。",options:["称重法","擦拭法","吸尘法","以上均是"],answer:"C",score:2,explanation:"风管内表面积尘量检测用专用吸尘采样装置，采集规定面积上的积尘，称重后计算g/m²，反映风管清洁程度。"},
  {id:130,qtype:"single",stem:"集中空调系统新风量的检测方法是（ ）。",options:["示踪气体衰减法（风管法）","热球风速仪法","皮托管法","以上均是"],answer:"D",score:2,explanation:"新风量检测方法包括示踪气体衰减法（风管法，最常用）、风速仪法（风口直接测量）和风管压差法，各有适用条件。"},
  {id:131,qtype:"single",stem:"集中空调系统为什么要定期检测新风量？",options:["新风量不足导致CO2积聚","新风量不足增加呼吸道疾病传播风险","新风量影响室内空气品质","以上均是"],answer:"D",score:2,explanation:"新风量不足导致CO2浓度升高、空气污染物蓄积，是\"病态建筑综合征\"的重要成因，增加呼吸道疾病在人群中的传播风险，是集中空调卫生评价的核心指标。"},
  {id:132,qtype:"single",stem:"空调送风中β-溶血性链球菌的检测意义是（ ）。",options:["该菌可引起化脓性感染","该菌是呼吸道感染的常见病原体","该菌在空调系统内可存活繁殖","以上均是"],answer:"D",score:2,explanation:"β-溶血性链球菌可引起咽峡炎、猩红热、皮肤感染等，人群聚集场所空调系统若检出该菌，提示室内呼吸道感染传播风险增加，是集中空调卫生监测指标。"},
  {id:133,qtype:"single",stem:"军团菌检测时，水样采集后送检时限是（ ）。",options:["2小时内","8小时内","24小时内","无时间要求"],answer:"C",score:2,explanation:"军团菌水样采集后应在24小时内送检，若不能及时检测应冷链（4℃）保存且不超过72小时，样品需避光保存以防军团菌死亡。"},
  {id:134,qtype:"single",stem:"集中空调风管内表面微生物检测的采样面积为（ ）。",options:["25cm²","50cm²","100cm²","无固定要求，不少于50cm²"],answer:"C",score:2,explanation:"风管内表面微生物检测采样面积为100cm²（10cm×10cm），用无菌棉签擦拭采样后洗脱，接种培养计数。"},
  {id:135,qtype:"single",stem:"集中空调冷却水中嗜肺军团菌的浓度达到多少时需要立即采取控制措施？",options:["≥100CFU/L","≥1000CFU/L","≥10000CFU/L","≥100CFU/mL"],answer:"A",score:2,explanation:"根据WS 394-2012，集中空调冷却水军团菌浓度≥100CFU/L时应立即采取清洗消毒等控制措施，防止军团菌病暴发。"},
  {id:136,qtype:"scenario",stem:"案例分析：某大型商场集中空调系统冷却塔水检出嗜肺军团菌阳性（1500CFU/L），请说明应急处理流程和预防措施。",options:[],answer:"",score:5,explanation:"参考答案：一、应急处理：①立即报告卫生行政部门，启动应急预案；②暂停该冷却塔运行，对冷却塔进行全面清洗消毒（次氯酸钠或二氧化氯消毒）；③通风系统全面检查，必要时停用集中空调；④对冷却塔水进行持续监测直至连续3次阴性；⑤开展病例搜索，医疗机构发现疑似病例立即上报。二、预防措施：①每年至少清洗消毒冷却塔2次（停用前和启用前）；②定期检测冷却水军团菌（每季度不少于1次）；③保持冷却水系统清洁，避免形成生物膜；④控制水温在20-50℃范围（军团菌适宜繁殖温度）；⑤增加新风比例，减少回风比例。"},
  {id:137,qtype:"single",stem:"根据GB 15982，医院洁净手术室空气细菌总数标准为多少cfu/m³？",options:["≤10cfu/m³（洁净度Ⅰ级）","≤100cfu/m³（洁净度Ⅱ级）","≤200cfu/m³（洁净度Ⅲ级）","≤500cfu/m³（普通手术室）"],answer:"A",score:2,explanation:"GB 15982规定洁净手术室空气细菌总数：Ⅰ级（100级）≤10cfu/m³，Ⅱ级（1000级）≤100cfu/m³，Ⅲ级（10000级）≤200cfu/m³，普通手术室≤500cfu/m³。"},
  {id:138,qtype:"single",stem:"医疗机构物体表面消毒效果监测的采样方法是（ ）。",options:["5cm×5cm规格板采样","棉签擦拭法","冲洗法","以上均可采用"],answer:"D",score:2,explanation:"物体表面消毒效果监测可用5cm×5cm规格板（面积100cm²）采样法或棉签擦拭法（50cm²），侵入性操作台面用冲洗法。"},
  {id:139,qtype:"single",stem:"医务人员手卫生的检测方法有（ ）。",options:["涂抹法（倾注平板）","冲洗法","接触碟法","以上均可"],answer:"D",score:2,explanation:"手卫生检测方法包括涂抹法（倾注平板法，最常用）、冲洗法（定量采集）和接触碟法（快速筛查），公共场所和医疗机构均可使用。"},
  {id:140,qtype:"single",stem:"使用中消毒液染菌量检测的合格标准是（ ）。",options:["≤10cfu/mL（使用中灭菌剂应无菌）","≤100cfu/mL","≤1000cfu/mL","不得检出细菌"],answer:"A",score:2,explanation:"使用中消毒液细菌总数≤100cfu/mL（使用中灭菌剂必须无菌），致病菌不得检出。大肠菌群阳性即为不合格，需立即更换消毒液。"},
  {id:141,qtype:"single",stem:"使用中消毒液染菌量检测的采样时机是（ ）。",options:["消毒后使用前","使用过程中随机采样","使用后更换前","使用后24小时"],answer:"B",score:2,explanation:"使用中消毒液应在使用过程中随机采样，以反映实际使用状态下的污染情况，检测结果更能代表实际卫生状况。"},
  {id:142,qtype:"single",stem:"紫外线灯辐照强度检测的方法是使用（ ）。",options:["照度计","紫外辐射照度仪（UVC探头）","光谱仪","光量子计"],answer:"B",score:2,explanation:"紫外线灯检测使用波长254nm的紫外辐射照度仪测量，新灯管30W直管型应≥70μW/cm²为合格，使用中灯管应≥70μW/cm²（≥70%初始值为合格）。"},
  {id:143,qtype:"single",stem:"30W直管型紫外线灯新灯管的辐照强度合格标准为（ ）。",options:["≥70μW/cm²","≥90μW/cm²","≥100μW/cm²","≥50μW/cm²"],answer:"B",score:2,explanation:"GB 19258规定30W直管型紫外线灯新灯强度应≥90μW/cm²；使用中灯管≥70μW/cm²或不低于初始值的70%，否则需更换。"},
  {id:144,qtype:"single",stem:"使用中紫外线灯管应多长时间检测一次辐照强度？",options:["每周","每月","每季度","每半年"],answer:"B",score:2,explanation:"使用中紫外线灯管应每月检测1次辐照强度，不合格及时更换；累计使用超过1000小时应增加检测频次。"},
  {id:145,qtype:"single",stem:"使用化学消毒剂浸泡灭菌的医疗器材，检测灭菌效果时应如何采样？",options:["采样后直接送检","加入中和剂后送检","冷冻保存后送检","无需采样"],answer:"B",score:2,explanation:"化学消毒灭菌器材采样后应加入相应中和剂（如硫代硫酸钠中和氯消毒剂），以终止残余消毒剂的继续杀菌作用，避免假阴性。"},
  {id:146,qtype:"single",stem:"为什么医院需要常规监测使用中消毒液的染菌量？",options:["消毒液使用过程中会不断污染","含菌量过高会降低消毒效果","污染的消毒液成为医源性感染来源","以上均是"],answer:"D",score:2,explanation:"消毒液在使用过程中不断被重复污染，染菌量过高会中和有效成分降低杀菌能力，成为医源性感染的重要来源，必须定期监测以确保消毒效果。"},
  {id:147,qtype:"short",stem:"简答题：说明紫外线灯强度检测的操作步骤和结果判定方法。",options:[],answer:"",score:5,explanation:"参考答案：①检测前准备：预热紫外线灯5分钟，使灯管发光稳定；②仪器校准：使用254nm专用紫外辐照仪校准；③测量位置：在灯管下方垂直1m处（标准测量距离）测量；④测量读数：打开仪器开关，待读数稳定后记录μW/cm²值；⑤判定标准：新灯管30W应≥90μW/cm²，使用中灯管≥70μW/cm²或≥70%初始值；⑥记录：记录灯管编号、测量值、测量时间、仪器型号；⑦不合格处理：立即更换灯管，复检合格后方可使用。注意事项：测量时人员应避开紫外线直接照射，佩戴防护眼镜。"},
  {id:148,qtype:"single",stem:"根据GB 5749-2022，生活饮用水色度的限值是多少？",options:["5度","10度","15度","20度"],answer:"C",score:2,explanation:"GB 5749-2022规定生活饮用水色度限值为15度（铂钴色度单位），超过15度时多数人可察觉颜色，消费者可能投诉。"},
  {id:149,qtype:"single",stem:"生活饮用水浑浊度的检测方法是（ ）。",options:["福尔马肼散射光法（标准方法）","目视比浊法","分光光度法","以上均可使用"],answer:"D",score:2,explanation:"浑浊度检测方法包括福尔马肼散射光法（基准方法，NTU单位）、目视比浊法（现场快速法）和分光光度法，水厂常用在线浊度仪。"},
  {id:150,qtype:"single",stem:"生活饮用水浑浊度高的卫生学意义是（ ）。",options:["水中可能含有泥沙、藻类","消毒剂难以有效接触病原体","浑浊物可保护致病菌","以上均是"],answer:"D",score:2,explanation:"浑浊度高反映水中悬浮颗粒物多，可能含有泥土、藻类、微生物等，颗粒物可吸附和包裹病原微生物降低消毒效果，是水质净化效果的重要指标。"},
  {id:151,qtype:"single",stem:"游离氯和总氯的检测方法为（ ）。",options:["DPD滴定法","DPD分光光度法","现场快速检测盒","以上均可采用"],answer:"D",score:2,explanation:"游离氯和总氯检测方法包括DPD滴定法（仲裁法）、DPD分光光度法（标准方法）和现场快速检测盒（现场快速筛查）。"},
  {id:152,qtype:"single",stem:"根据GB 5749-2022，管网末梢水游离氯的最低标准是多少？",options:["≥0.01mg/L","≥0.05mg/L","≥0.1mg/L","≥0.3mg/L"],answer:"B",score:2,explanation:"GB 5749-2022规定管网末梢水游离氯应≥0.05mg/L，加氯消毒需保持此最低浓度以保证持续杀菌能力。"},
  {id:153,qtype:"single",stem:"生活饮用水中总大肠菌群的检测方法是（ ）。",options:["多管发酵法（MPN法）","滤膜法","酶底物法","以上均是"],answer:"D",score:2,explanation:"总大肠菌群检测方法包括多管发酵法（MPN法，仲裁法）、滤膜法（选择性培养基）和酶底物法（Chrom Agar等，快速法），各方法均有适用场景。"},
  {id:154,qtype:"single",stem:"总大肠菌群阳性但耐热大肠菌群（大肠埃希氏菌）阴性，说明（ ）。",options:["水一定被粪便污染","可能来自土壤或植物腐败物","水是安全的可以直接饮用","无法判断"],answer:"B",score:2,explanation:"总大肠菌群包括来自粪便和自然环境（土壤、植物）的菌，耐热大肠菌群是粪便来源的指示菌。总大肠菌群阳性但耐热大肠菌群阴性，说明可能是自然环境来源而非粪便污染。"},
  {id:155,qtype:"single",stem:"菌落总数（总菌数）检测的意义是（ ）。",options:["反映水体清洁程度","反映消毒效果","预测肠道致病菌存在可能性","以上均是"],answer:"D",score:2,explanation:"菌落总数反映水体卫生清洁程度和微生物污染水平，是评价净化消毒效果的综合性指标，也是预测肠道致病菌存在可能性的辅助指标，菌落总数过高提示水处理存在缺陷。"},
  {id:156,qtype:"single",stem:"水样采集后未能及时检测时，应如何保存？",options:["常温保存即可","加入硫代硫酸钠中和残余消毒剂，冷藏4℃保存","加入福尔马林固定","立即检测无需保存"],answer:"B",score:2,explanation:"水样采集后应加入硫代硫酸钠（1%溶液0.1mL/100mL水样）中和残余消毒剂，4℃冷藏，12小时内检测；如检测大肠菌群，冷藏不超过6小时。"},
  {id:157,qtype:"single",stem:"某学校末梢水菌落总数检测结果为800CFU/mL（标准≤100CFU/mL），可能的原因是（ ）。",options:["供水管网存在二次污染","水在用户末端停留时间过长","学校储水设施未定期清洗","以上均是"],answer:"D",score:2,explanation:"菌落总数超标反映水在管网输送或储存过程中受到二次污染，可能原因包括管网老化渗漏、储水箱污染、末梢水滞留等，需排查整改。"},
  {id:158,qtype:"single",stem:"根据GB 5749-2022，饮用水中肉眼可见物的要求是（ ）。",options:["无肉眼可见物","允许有轻微悬浮物","允许有微量沉淀","无所谓"],answer:"A",score:2,explanation:"GB 5749-2022规定生活饮用水应无肉眼可见物，包括藻类、悬浮物、沉淀物等，发现肉眼可见物表明水质异常需查明原因。"},
  {id:159,qtype:"short",stem:"简答题：说明多管发酵法检测生活饮用水总大肠菌群的操作步骤。",options:[],answer:"",score:5,explanation:"参考答案：①初发酵（乳糖蛋白胨发酵管）：取100mL水样接种10mL双料管，取10mL接种单料管，另取1mL、0.1mL等梯度接种，37℃培养24h观察产酸产气；②复发酵（伊红美蓝发酵管）：初发酵阳性管转种，37℃培养24h观察产气；③结果判定：复发酵产气即为总大肠菌群阳性；④查MPN表：根据阳性管数查表得最可能数（MPN值），计算cfu/100mL；⑤质量控制：设置阴性对照（无菌水）和阳性对照（大肠杆菌），培养基在有效期内使用。"},
  {id:160,qtype:"single",stem:"根据GB 9667-1996《游泳场所卫生标准》，人工游泳池水细菌总数限值为多少？",options:["≤100CFU/mL","≤200CFU/mL","≤1000CFU/mL","不得检出"],answer:"C",score:2,explanation:"GB 9667-1996规定人工游泳池水细菌总数≤1000CFU/mL，大肠菌群≤18个/L，尿素≤3.5mg/L，游离氯0.3-0.5mg/L（使用氯消毒时）。"},
  {id:161,qtype:"single",stem:"游泳池水尿素检测的卫生学意义是（ ）。",options:["反映池水被汗液和尿液污染程度","反映池水更换频率","反映强制淋浴执行情况","以上均是"],answer:"D",score:2,explanation:"尿素是汗液和尿液的主要成分，池水尿素升高反映游泳者带入的体液污染，是泳池水更新的直接指标，也是评价强制淋浴执行情况的间接指标。"},
  {id:162,qtype:"single",stem:"游泳池水氰尿酸的作用是什么？",options:["稳定次氯酸减少分解","提供氯源","防止藻类生长","无需添加"],answer:"A",score:2,explanation:"氰尿酸（C3H3N3O3）是氯消毒剂（漂白粉、氯片）的稳定剂，可减缓次氯酸在阳光下的光解速度，延长消毒剂有效作用时间，但浓度过高会抑制次氯酸杀菌效果。"},
  {id:163,qtype:"single",stem:"游泳池游离氯浓度过高（>1.0mg/L）可能导致（ ）。",options:["刺激眼睛和皮肤","头发变黄变脆","产生三卤甲烷等消毒副产物","以上均是"],answer:"D",score:2,explanation:"游离氯过高刺激眼结膜和皮肤黏膜，引起头发损伤，且会与水中天然有机物反应生成三卤甲烷（THMs）等致癌消毒副产物，危害健康。"},
  {id:164,qtype:"single",stem:"游泳池化合氯（结合氯）是指什么？",options:["次氯酸与氨反应生成的氯胺类化合物","过量的消毒剂","尿素中的氯","游离氯"],answer:"A",score:2,explanation:"化合氯（氯胺）是次氯酸与氨（来自汗液尿液）或有机胺反应生成的化合态氯，包括一氯胺、二氯胺和三氯胺，具有刺激性臭味，是\"氯味\"的主要来源之一。"},
  {id:165,qtype:"single",stem:"游泳池氧化还原电位（ORP）的卫生学意义是（ ）。",options:["反映消毒剂活性水平","ORP≥650mV时消毒效果可靠","ORP<650mV时细菌繁殖风险增加","以上均是"],answer:"D",score:2,explanation:"ORP是反映水中消毒剂活性的综合指标，ORP≥650mV（采用氯消毒时）表明消毒剂具有足够的氧化能力保证杀菌效果，ORP低时即使余氯达标也可能消毒不足。"},
  {id:166,qtype:"single",stem:"游泳池水嗜肺军团菌的来源主要是（ ）。",options:["游泳者带入","更衣室潮湿环境","冷却塔气溶胶回漂","自来水中"],answer:"C",score:2,explanation:"泳池水军团菌主要来自冷却塔或集中空调冷却系统的气溶胶回漂，军团菌在温暖静止的水体中繁殖，淋浴喷头和按摩池是其重要孳生地。"},
  {id:167,qtype:"single",stem:"游泳池臭氧消毒时，水中臭氧残留浓度不应超过多少？",options:["0.01mg/L","0.05mg/L","0.1mg/L","0.5mg/L"],answer:"B",score:2,explanation:"游泳池采用臭氧消毒时，臭氧与有机物反应后需脱臭氧处理，水中臭氧残留浓度不应超过0.05mg/L（维持此浓度已足够消毒），过高刺激人体黏膜。"},
  {id:168,qtype:"single",stem:"为什么游泳馆需要强制淋浴后才可进入泳池？",options:["减少汗液和尿液带入池水","减少皮肤油脂和化妆品进入池水","减少头发和纤维进入","以上均是"],answer:"D",score:2,explanation:"强制淋浴冲掉身体汗液（尿素）、尿液、皮肤油脂、化妆品、防晒霜等污染物，减少池水有机负荷和消毒副产物生成，提高水质卫生质量。"},
  {id:169,qtype:"single",stem:"泳池水尿素检测方法常用（ ）。",options:["二乙酰一肟分光光度法","次溴酸钠氧化法","脲酶法","以上均是"],answer:"D",score:2,explanation:"尿素检测方法有二乙酰一肟分光光度法（最常用）、次溴酸钠氧化法、脲酶法等，其中二乙酰一肟法是游泳池水质日常监测的推荐方法。"},
  {id:170,qtype:"single",stem:"泳池水大肠菌群检测阳性时，应采取什么措施？",options:["立即换水","加大氯消毒剂量","暂停开放，查找污染源","无需处理"],answer:"C",score:2,explanation:"泳池水大肠菌群阳性表明受到粪便污染，可能存在肠道致病菌风险，应立即暂停开放，全面排查污染来源（入池前淋浴、厕所位置等），换水消毒后复检合格方可重新开放。"},
  {id:171,qtype:"scenario",stem:"案例分析：某游泳馆被投诉池水浑浊发绿，检测结果：游离氯0.1mg/L（偏低），pH 8.5（偏高），浑浊度10NTU（标准≤1NTU），尿素4.2mg/L（超标）。请分析原因并给出整改方案。",options:[],answer:"",score:5,explanation:"参考答案：一、原因分析：①游离氯0.1mg/L远低于标准（0.3-0.5mg/L），消毒不足导致藻类繁殖（池水发绿）；②pH 8.5偏高（标准6.5-7.8），高pH使次氯酸杀菌活性降低（游离氯虽测出但实际有效氯不足）；③尿素4.2mg/L超过标准（≤3.5mg/L），反映强制淋浴未严格执行或池水更新不足；④浑浊度10NTU远超标准（≤1NTU），反映过滤设备运行异常或凝絮剂投加不足。二、整改方案：①立即停止开放；②换水30%-50%以上，换水同时补加新水；③检测过滤设备，投加絮凝剂（聚合氯化铝）强化过滤；④调节pH至7.0-7.4（使用盐酸）；⑤加氯至0.5-1.0mg/L，余氯稳定后加氰尿酸稳定剂；⑥检查强制淋浴设施，加强管理；⑦整改后连续检测水质3天，合格后方可恢复营业。"},
  {id:172,qtype:"single",stem:"GB/T 18204《公共场所卫生检验方法》包括哪些部分（ ）。",options:["第1部分：物理因素","第2部分：化学污染物","第3部分：空气微生物","以上全部"],answer:"D",score:2,explanation:"GB/T 18204包括6个部分：第1部分物理因素、第2部分化学污染物、第3部分空气微生物、第4部分公共用品用具微生物、第5部分集中空调通风系统、第6部分卫生监测技术规范。"},
  {id:173,qtype:"single",stem:"公共场所卫生检测中，采样记录应包括哪些基本信息（ ）。",options:["采样时间、地点、环境条件","被测单位名称和样品信息","检测依据和检测人员","以上均是"],answer:"D",score:2,explanation:"采样记录是检测工作的原始凭证，必须完整记录采样时间、地点、环境条件（温度、湿度、大气压）、被测单位、样品信息、检测依据和检测人员签名。"},
  {id:174,qtype:"single",stem:"检测结果的表示方法中，cfu的含义是（ ）。",options:[" colony forming units（菌落形成单位）","colony forming units（菌落计数单位）","coliform fungi units（真菌计数单位）","count for use（使用计数）"],answer:"A",score:2,explanation:"cfu是colony forming units（菌落形成单位）的缩写，表示在一定条件下能够形成菌落的活菌数量，是微生物计数的标准单位。"},
  {id:175,qtype:"single",stem:"公共场所卫生检测质量控制的核心要求包括（ ）。",options:["使用经检定/校准并在有效期内的仪器设备","使用有证标准物质或合格培养基","开展实验室内部质量控制","以上均是"],answer:"D",score:2,explanation:"检测质量控制包括：仪器设备管理（检定校准）、标准物质和试剂管理（有效期内使用）、人员能力确认、检测方法正确执行、结果双审核查等关键环节。"},
  {id:176,qtype:"single",stem:"采样时发现样品数量或状态异常，应如何处理？",options:["如实记录异常情况","通知送检单位","必要时拒绝接收样品","以上均是"],answer:"D",score:2,explanation:"发现样品数量不足、容器破损、样品标识不清、超过保存时限等异常情况，应如实记录，立即通知送检单位，视情况决定是否接受样品，不合格样品检测结果无效。"},
  {id:177,qtype:"single",stem:"检测报告编制的基本要求包括（ ）。",options:["使用法定计量单位","结果表示与检测方法一致","检测结论明确","以上均是"],answer:"D",score:2,explanation:"检测报告应使用国家法定计量单位，结果表示与检测方法一致，数据修约符合规则，结论明确依据充分，信息完整可追溯，具有法律效力。"},
  {id:178,qtype:"single",stem:"检测机构开展公共场所卫生检测应具备什么资质？",options:["CMA计量认证","CATL农产品质量安全检测机构考核","CNAS认可","以上至少具备CMA"],answer:"D",score:2,explanation:"开展公共场所卫生检测的机构应至少取得CMA（中国计量认证）资质，在批准的检测能力范围内出具具有法律效力的检测报告。"},
  {id:179,qtype:"single",stem:"判断题：公共场所卫生检测时，每种样品必须采集至少3份平行样品进行检测。",options:["正确","错误"],answer:"B",score:2,explanation:"采样数量根据检测标准要求确定，并非所有样品都需要采集3份平行样。如空气细菌检测每点1皿即可，大型水体采样按规范采集所需份数。"},
  {id:180,qtype:"single",stem:"判断题：室内空气中二氧化碳浓度越高，说明室内空气污染越严重。",options:["正确","错误"],answer:"B",score:2,explanation:"CO2浓度升高主要反映室内通风不足和人员密度高，是通风效果指标而非污染物直接指标。CO2本身在正常室内浓度范围内无明显毒性，其升高间接提示空气质量下降。"},
  {id:181,qtype:"single",stem:"判断题：学校教室课桌面照度只要达到300lx，即使不均匀也可以。",options:["正确","错误"],answer:"B",score:2,explanation:"课桌面照度不仅要求平均值≥300lx，还要求照度均匀度≥0.7（最小照度/平均照度），照度分布不均匀会导致学生视觉疲劳，影响学习效果。"},

// ===== 验证码系统 =====
const CAPTCHA_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

function generateCaptcha() {
  let ops = [], code = "";
  for (let i = 0; i < 4; i++) {
    let n = Math.floor(Math.random() * 10);
    ops.push({ label: `${n} + ? = ${n + Math.floor(Math.random()*5+1)}`, answer: Math.floor(Math.random()*5+1) });
    code += n;
  }
  currentCaptcha = { code, ops, index: 0, answer: null };
  return ops;
}

function getCaptchaQ() {
  if (!currentCaptcha.ops.length) generateCaptcha();
  return currentCaptcha.ops[currentCaptcha.index % currentCaptcha.ops.length];
}

function renderCaptchaCanvas(canvas) {
  if (!canvas) return;
  let ctx = canvas.getContext("2d");
  let W = canvas.width = 140;
  let H = canvas.height = 46;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "#eef2ff";
  ctx.fillRect(0, 0, W, H);
  // 干扰线
  for (let i = 0; i < 4; i++) {
    ctx.strokeStyle = "rgba(26,58,107," + (0.1 + Math.random()*0.15) + ")";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(Math.random()*W, Math.random()*H);
    ctx.lineTo(Math.random()*W, Math.random()*H);
    ctx.stroke();
  }
  // 噪点
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = "rgba(26,58,107,0.15)";
    ctx.fillRect(Math.random()*W, Math.random()*H, 2, 2);
  }
  let q = getCaptchaQ();
  ctx.fillStyle = "#1a3a6b";
  ctx.font = "bold 13px PingFang SC, Microsoft YaHei";
  ctx.textAlign = "center";
  ctx.fillText(q.label, W/2, H/2 + 5);
  // 重绘按钮
  let bx = W - 30, by = H/2 - 12;
  ctx.fillStyle = "transparent";
  ctx.strokeStyle = "#1a3a6b";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx, by, 24, 24);
  ctx.fillStyle = "#1a3a6b";
  ctx.font = "10px sans-serif";
  ctx.fillText("↻", bx+12, by+15);
}

// ===== 密码工具 =====
function hashPin(pin) {
  // 简单哈希，用于存储（本地存储，非高安全场景）
  let h = 5381;
  for (let i = 0; i < pin.length; i++) h = ((h << 5) + h) + pin.charCodeAt(i);
  return h.toString(36);
}

function checkPinStrength(pin) {
  let score = 0;
  if (pin.length >= 6) score++;
  if (/\d/.test(pin)) score++;
  if (/[A-Za-z]/.test(pin)) score++;
  if (/[^A-Za-z0-9]/.test(pin)) score++;
  if (pin.length >= 10) score++;
  return score;
}

// ===== 登录注册逻辑 =====
function doLogin() {
  let username = $("login-username")?.value?.trim();
  let pw = $("login-pw")?.value;
  if (!username || !pw) { showToast("请填写用户名和密码", "error"); return; }

  let users = getUsers();
  let user = users.find(u => u.username === username && u.pwHash === hashPin(pw));
  if (!user) {
    showToast("用户名或密码错误", "error");
    return;
  }

  currentUser = { name: user.name, username: user.username, isAdmin: !!user.isAdmin };
  isAdmin = !!user.isAdmin;
  localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
  showToast("欢迎回来，" + user.name + "！", "success");
  state.view = "home";
  render();
}

function doRegister() {
  let name = $("reg-name")?.value?.trim();
  let username = $("reg-username")?.value?.trim();
  let pw = $("reg-pw")?.value;
  let pw2 = $("reg-pw2")?.value;
  if (!name) { showToast("请输入真实姓名", "error"); return; }
  if (!username || username.length < 2) { showToast("请输入正确的用户名（至少2位）", "error"); return; }
  if (pw.length < 6) { showToast("密码至少6位", "error"); return; }
  if (pw !== pw2) { showToast("两次密码不一致", "error"); return; }

  let users = getUsers();
  if (users.find(u => u.username === username)) {
    showToast("该用户名已注册，请直接登录", "error");
    switchAuthTab("login");
    return;
  }

  users.push({ name, username, pwHash: hashPin(pw), isAdmin: false, createdAt: new Date().toISOString() });
  saveUsers(users);

  currentUser = { name, username, isAdmin: false };
  isAdmin = false;
  localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
  showToast("注册成功！欢迎 " + name, "success");
  state.view = "home";
  render();

function shuffleArray(arr) {
  let a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 考试 =====
function startExam() {
  if (!currentUser) { showToast("请先登录", "error"); switchAuthTab("login"); return; }
  state.candName = currentUser.name;
  state.taskId = 1;
  // 百分制：从题库随机抽题，每题2分，共50题=100分
  var pool = questions.slice();
  shuffleArray(pool);
  var picked = [];
  var totalScore = 0;
  var targetScore = 100;
  var perScore = 2;
  var needCount = targetScore / perScore; // 50题
  // 优先覆盖各分类
  var byCat = {};
  pool.forEach(function(q) {
    var c = q.category || "其他";
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(q);
  });
  var cats = Object.keys(byCat);
  // 每类按比例抽取
  var perCat = Math.max(1, Math.floor(needCount / cats.length));
  cats.forEach(function(c) {
    shuffleArray(byCat[c]);
    byCat[c].slice(0, perCat).forEach(function(q) { picked.push(q); });
  });
  // 不足补足
  shuffleArray(pool);
  while (picked.length < needCount && pool.length > 0) {
    var q = pool.shift();
    if (picked.indexOf(q) === -1) picked.push(q);
  }
  picked = picked.slice(0, needCount);
  // 确保每题2分
  picked.forEach(function(q) { q.score = perScore; });
  state.questions = picked;
  state.totalScore = targetScore;
  state.answers = {};
  state.currentQ = 0;
  state.submitted = false;
  state.view = "exam";
  render();
  scrollTo(0, 0);
  showToast("本次考核共 " + picked.length + " 题，总分 " + targetScore + " 分", "info");
}

function renderCurrentQ() {

  if (q.qtype === "single" || q.qtype === "judge") {
    optsHtml = q.options.map(o => {

        <span class="opt-letter" style="color:${clr};border-color:${sel?typeColor:"currentColor"};background:${bg}">${o[0]}</span>

      </div>`;
    }).join("");
  } else if (q.qtype === "multi") {
    let selArr = (state.answers[q.id]||"").split(",").filter(x=>x);
    optsHtml = q.options.map(o => {
      let sel = selArr.includes(o[0]);
      let clr = sel ? "#fff" : "#6b3fa0";
      let bg = sel ? "#6b3fa0" : "transparent";
      return `<div class="option-item${sel?" selected":""}" onclick="toggleMulti(this,'${o[0]}')">

        <span class="opt-text">${esc(o.slice(2))}</span>
      </div>`;
    }).join("");
  } else {
    optsHtml = `<div class="short-area">
      <textarea id="short-answer" placeholder="请在此输入你的答案..." onchange="setShort(this.value)">${esc(state.answers[q.id]||"")}</textarea>
    </div>`;
  }

  card.innerHTML = `
    <span class="q-type" style="background:${typeColor}20;color:${typeColor}">${typeLabel} · ${q.score}分</span>
    <div class="q-stem">${esc(q.stem)}</div>

function toggleMulti(el, val) {

// 主观题（简答/场景）按关键词覆盖率自动评分
function gradeSubjective(q, ua) {
  let ua2 = (ua||"").toLowerCase();
  let keys = (q.keyword||"").split(/[；;]/).map(k=>k.trim()).filter(Boolean);
  if (keys.length === 0) return { matched:0, total:0, ratio:0, score:0, auto:false };
  let matched = keys.filter(k => ua2.indexOf(k.toLowerCase()) >= 0).length;
  let ratio = matched / keys.length;
  let score = Math.round((q.score||0) * ratio);
  return { matched, total:keys.length, ratio, score, auto:true };
}

// 单题评判结果：返回 {isObj,isSubj,ok,g}
function questionResult(q, ua) {
  let isObj = ["single","multi","judge"].includes(q.qtype);
  let isSubj = q.qtype === "short" || q.qtype === "scenario";
  if (isObj) {
    let ok;
    if (q.qtype === "multi") ok = (ua||"").split(",").sort().join(",") === q.answer.split(",").sort().join(",");
    else ok = (ua||"") === q.answer;
    return { isObj, isSubj, ok, g:null };
  }
  if (isSubj) {
    let g = gradeSubjective(q, ua);
    return { isObj, isSubj, ok: g.total>0 && g.ratio>=0.5, g };
  }
  return { isObj, isSubj, ok:false, g:null };
}

function calcScore(qs, answers) {
  let auto=0;
  qs.forEach(q => {
    if(["single","judge"].includes(q.qtype)) {
      if((answers[q.id]||"")===q.answer) auto+=q.score;
    } else if(q.qtype==="multi") {
      let ca=q.answer.split(",").sort().join(",");
      if((answers[q.id]||"").split(",").sort().join(",")===ca) auto+=q.score;
    } else if(q.qtype==="short"||q.qtype==="scenario") {
      auto += gradeSubjective(q, answers[q.id]).score;
    }
  });
  return auto;
}

function showAdminTab(tab) {
  ["questions","print","records","security"].forEach(t => {
    let el = document.getElementById("tab-"+t);
    if (el) el.style.display = t===tab?"":"none";
  });
  if (tab==="print") setTimeout(generatePrint, 50);
}

function changeAdminPin() {
  let cur = $("cur-pin")?.value;
  let npin = $("new-pin")?.value;
  let npin2 = $("new-pin2")?.value;
  let cfg = getAdminConfig();
  if (cur !== cfg.pin) { showToast("当前 PIN 错误", "error"); return; }
  if (!/^\d{6}$/.test(npin)) { showToast("新 PIN 必须为 6 位数字", "error"); return; }
  if (npin !== npin2) { showToast("两次新 PIN 不一致", "error"); return; }
  cfg.pin = npin;
  saveAdminConfig(cfg);
  showToast("PIN 修改成功", "success");
  $("cur-pin").value = "";
  $("new-pin").value = "";
  $("new-pin2").value = "";
}

function importQuestions() {
  let raw = $("import-area")?.value?.trim();
  if (!raw) { showToast("请先粘贴 JSON 数据", "error"); return; }
  try {
    let data = JSON.parse(raw);
    if (!Array.isArray(data)) throw new Error("不是数组");
    data.forEach(q => { if(!q.stem||!q.qtype) throw new Error("缺少 stem 或 qtype"); });
    questions = data;
    saveQuestions(questions);
    showToast(`成功导入 ${questions.length} 道题目`, "success");
    render();
  } catch(e) { showToast("JSON 格式错误：" + e.message, "error"); }
}

function exportQuestions() {
  let blob = new Blob([JSON.stringify(questions, null, 2)], {type:"application/json"});
  let url = URL.createObjectURL(blob);
  let a = document.createElement("a");
  a.href = url; a.download = "题库_" + new Date().toISOString().slice(0,10) + ".json";
  a.click(); URL.revokeObjectURL(url);
  showToast("题库已导出", "success");
}

function resetQuestions() {
  if (!confirm("确定恢复默认题库？当前题库将被覆盖。")) return;
  questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
  saveQuestions(questions);
  showToast("已恢复默认题库", "info");
  render();
}

function deleteQuestion(id) {
  if (!confirm("确定删除第 " + id + " 题？")) return;
  questions = questions.filter(q => q.id !== id);
  saveQuestions(questions);
  showToast("已删除", "info");
  render();
}

function setQuestionScore(id, val) {
  let v = parseInt(val, 10);
  if (isNaN(v) || v < 0) { showToast("分值无效", "error"); render(); return; }
  let q = questions.find(x => x.id === id);
  if (q) { q.score = v; saveQuestions(questions); showToast("分值已更新（第 " + id + " 题 " + v + " 分）", "info"); }
}

function openRecord(idx) {
  state.recordIndex = idx;
  state.view = "record";
  render();
  scrollTo(0,0);
}

function backToRecords() {
  state.view = "admin";
  render();
  setTimeout(() => showAdminTab("records"), 50);
}

function deleteRecord(idx) {
  if (!confirm("确定删除这条考试记录？此操作不可恢复。")) return;
  let records = getRecords();
  if (idx < 0 || idx >= records.length) { showToast("记录不存在", "error"); return; }
  records.splice(idx, 1);

  showToast("记录已删除", "info");

function renderRecord() {
  let records = getRecords();
  let rec = records[state.recordIndex];
  if (!rec) { state.view="admin"; render(); return; }
  let qs = rec.questions || [];
  let ans = rec.answers || {};
  if (!qs.length) {
    return `<div class="page">
      <div class="no-print" style="margin-bottom:20px"><button class="btn btn-ghost" onclick="backToRecords()">← 返回记录</button></div>
      <div class="card"><p style="text-align:center;color:var(--text-light);padding:30px">该记录为旧版格式，未保存详细答卷数据，无法查看成绩试卷。<br>（之后的考试记录将自动保存完整答卷，可正常查看与打印。）</p></div>
    </div>`;
  }
  let typeMap = {single:"单项选择题",multi:"多项选择题",judge:"判断题",short:"简答题",scenario:"场景分析题"};
  let typeOrder = ["single","multi","judge","short","scenario"];
  let cnNum = ["一","二","三","四","五","六","七","八","九","十"];
  let sections = [];
  typeOrder.forEach(t => {
    let tqs = qs.filter(q => q.qtype === t);
    if (tqs.length === 0) return;
    let totalScore = tqs.reduce((s,q) => s + q.score, 0);
    let eachScore = tqs[0].score;
    let header = `<div class="paper-section"><div class="paper-section-title">${cnNum[sections.length]} ${typeMap[t]}（每题${eachScore}分，共${totalScore}分）</div></div>`;
    let items = tqs.map((q,i) => {
      let r = questionResult(q, ans[q.id]);
      let ua = ans[q.id] || "";
      let got;
      if (r.isObj) got = r.ok ? q.score : 0;
      else if (r.isSubj) got = (r.g && r.g.total>0) ? r.g.score : (ua ? "待阅" : 0);
      else got = ua ? "待阅" : 0;
      let subjInfo = (r.isSubj && r.g && r.g.total>0) ? `（关键词命中 ${r.g.matched}/${r.g.total}，覆盖率 ${Math.round(r.g.ratio*100)}%）` : "";
      let rightMark = r.ok ? "✓" : "✗";
      let answerMark;
      if (t === "judge") {
        let correctAns = q.answer && q.answer.trim().toUpperCase();
        let isCorrectStatement = correctAns === "A" || correctAns === "正确" || correctAns === "TRUE" || correctAns === "T";
        let displayAns = isCorrectStatement ? "✓" : "×";
        answerMark = `（${displayAns}）${rightMark}`;
      } else if (r.isObj) {
        answerMark = `（${esc(ua)||"未答"}）${r.ok ? "" : rightMark}`;
      } else {
        answerMark = "";
      }
      let optsHtml;
      if (["single","multi"].includes(t) && q.options && q.options.length) {
        let chosenArr = Array.isArray(ua) ? ua : (typeof ua==="string" && ua.indexOf(",")>=0 ? ua.split(",").map(s=>s.trim()) : (ua?[ua]:[]));
        optsHtml = '<div class="paper-opts-inline">' + q.options.map(o => {
          let letter = o[0];
          let isChosen = chosenArr.includes(letter);
          return `<span class="paper-opt-i${isChosen?' chosen':''}">${letter} ${esc(o.slice(2))}</span>`;
        }).join("") + '</div>';
      } else if (t === "judge") {
        optsHtml = "";
      } else if (q.options && q.options.length) {
        optsHtml = "";
      } else {
        optsHtml = `<div class="paper-subj-ans">作答：${ua ? esc(ua) : '（未作答）'}<br>得分：${got} 分 ${subjInfo} ${rightMark}</div>`;
      }
      return `<div class="paper-q">
        <div class="paper-q-head"><span class="paper-num">${i+1}.</span><span class="paper-stem-inline">${esc(q.stem)}${answerMark}</span></div>
        ${optsHtml}
      </div>`;
    }).join("");
    sections.push(header + items);
  });
  let blocks = sections.join("");
  let subjTotal = qs.filter(q=>q.qtype==="short"||q.qtype==="scenario").reduce((s,q)=>{ let g=gradeSubjective(q, ans[q.id]); return s + (g.total>0?g.score:0); }, 0);
  return `<div class="page">
    <div class="no-print" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:24px">📋</div>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--primary)">考生成绩试卷</div>
          <div style="font-size:12px;color:var(--text-light)">${esc(rec.name)} · ${esc(rec.username||"")} · ${new Date(rec.time).toLocaleString("zh-CN")}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="backToRecords()">← 返回记录</button>
        <button class="btn btn-accent" onclick="window.print()">🖨 打印成绩试卷</button>
      </div>
    </div>
    <div class="print-area" id="print-area">
      <div class="print-header">
        <h1>🛡️ 湖南绿盾卫士检测技术有限公司</h1>
        <p style="font-size:15px;font-weight:700;margin-top:4px">GB/T 18204 培训考核卷 · 成绩试卷</p>
      </div>
      <div class="info-row">
        <span>姓名：<input class="wide" value="${esc(rec.name)}" readonly></span>
        <span>用户名：<input class="wide" value="${esc(rec.username||"")}" readonly></span>
        <span>考核日期：<input class="wide" value="${new Date(rec.time).toLocaleDateString("zh-CN")}" readonly></span>
        <span>总分：<input value="${rec.score}" readonly></span>
        <span>结果：<input value="${rec.passed?'合格':'不合格'}" readonly></span>
      </div>
      <div class="paper-list">${blocks}</div>
      <div class="paper-total">合计得分：<strong>${rec.score}</strong> 分 &nbsp;|&nbsp; 结果：<strong>${rec.passed?'合格':'不合格'}</strong></div>
      <div style="margin-top:10px;padding:8px;background:#f8f8f8;border-radius:6px;font-size:12px;line-height:1.8">
        <strong>说明：</strong>客观题自动判分；主观题按关键词覆盖率自动评分（满分 ${subjTotal} 分）。本成绩试卷由系统自动生成。
      </div>
    </div>
  </div>`;
}

// ===== 打印考核卷 =====
function generatePrint() {
  let title = $("print-title")?.value || "培训考核卷";
  let singles = questions.filter(q => q.qtype === "single");
  let multis = questions.filter(q => q.qtype === "multi");
  let judges = questions.filter(q => q.qtype === "judge");
  let shorts = questions.filter(q => q.qtype === "short");
  let scenarios = questions.filter(q => q.qtype === "scenario");

  function buildSection(name, qs) {
    if (!qs.length) return "";
    let rows = qs.map(q => {
      let optHtml = "";
      if (["single","judge","multi"].includes(q.qtype)) {
        optHtml = q.options.map(o => `<td class="opt-col">${o[0]}</td><td>${esc(o.slice(2))}</td>`).join("");
      } else {

      }
      return `<tr><td class="num">${q.id}</td><td class="q-text" style="width:46%">${esc(q.stem)}</td>${optHtml}<td class="score-col">${q.score}</td></tr>`;
    }).join("");
    return `<div class="section-title">${esc(name)}（${qs.length} 题，${qs.reduce((s,q)=>s+q.score,0)} 分）</div>

  }

  let ansRow = [...Array(33)].map((_,i)=>`${i+1}：____`).join("&nbsp;&nbsp;");

  $("print-area").innerHTML = `
    <div class="print-header">
      <h1>🛡️ 湖南绿盾卫士检测技术有限公司</h1>

const MODULE_DATA = {
  laws: {
    title: "法律法规", icon: "⚖️",
    chapters: [
      { id:"l1", title:"第一章 公共场所卫生管理条例", content:"<h3>第一条</h3><p>本条例适用于下列公共场所：宾馆、饭馆、旅店、招待所、车马店、咖啡馆、酒吧、茶座；公共浴室、理发店、美容店；影剧院、录像厅（室）、游艺厅（室）、舞厅、音乐厅；体育场（馆）、游泳场（馆）、公园；展览馆、博物馆、美术馆、图书馆；商场（店）、书店；候诊室、候车（机、船）室、公共交通工具。</p><h3>第二条</h3><p>公共场所的下列项目应符合国家卫生标准和要求：空气、微小气候（湿度、温度、风速）；水质；采光、照明；噪音；顾客用具和卫生设施。</p><h3>第三条</h3><p>公共场所的卫生工作要求：环境整洁、空气清新微小气候（湿度、温度、风速）符合国家标准，水质符合国家生活饮用水卫生标准，采光、照明良好，噪音符合国家卫生标准，顾客用具和卫生设施清洁无污染。</p>" },
      { id:"l2", title:"第二章 公共场所卫生管理条例实施细则", content:"<h3>总则</h3><p>根据《公共场所卫生管理条例》制定本细则。公共场所经营者应当遵守有关卫生法律、行政法规和部门规章以及相关的卫生标准、规范。</p><h3>卫生管理</h3><p>公共场所经营者应当建立卫生管理制度，配备专职或兼职卫生管理人员，建立健全卫生管理档案。</p><h3>卫生许可证</h3><p>公共场所经营者应当依法取得县级以上卫生行政部门颁发的卫生许可证后方可向工商行政管理部门申请登记办理营业执照。</p>" },
      { id:"l3", title:"第三章 卫生监督与法律责任", content:"<h3>卫生监督机构</h3><p>县级以上地方人民政府卫生行政部门负责本行政区域的公共场所卫生监督管理工作。</p><h3>法律责任</h3><p>卫生质量不符合国家卫生标准和要求而继续营业的，未获得卫生许可证擅自营业的，拒绝卫生监督的，可根据情节轻重给予警告、罚款、停业整顿、吊销卫生许可证等行政处罚。</p><h3>处罚标准</h3><p>对违反本条例有关规定的单位或个人，可处以20元以上、5000元以下的罚款；情节较重的，处以5000元以上、20000元以下的罚款。</p>" },
      { id:"l4", title:"第四章 学校卫生工作条例", content:"<h3>学校卫生工作要求</h3><p>学校应当合理安排学生的学习时间。学校应当建立卫生制度，加强对学生个人卫生、环境卫生以及教室、宿舍卫生的管理。</p><h3>教室卫生要求</h3><p>学校教室的采光、照明、课桌椅配置等应当符合国家有关标准。教室墙壁和顶棚应当为白色或浅色。</p><h3>健康教育</h3><p>学校应当把健康教育纳入教学计划。普通中小学必须开设健康教育课，普通高等学校、中等专业学校、技工学校、农业中学、职业中学应当开设健康教育选修课或讲座。</p>" }
    ]
  },
  expert: {
    title: "专业知识", icon: "📚",
    chapters: [
      { id:"e1", title:"第一章 教室环境卫生标准概述", content:"<h3>GB/T 18204 检测方法概览</h3><p>教室环境卫生检测主要包括：空气质量检测（二氧化碳、甲醛、PM2.5、PM10、细菌总数）；物理因素（温度、湿度、风速、噪声、照度、采光系数）。</p><h3>采样基本要求</h3><p>采样前关闭门窗30分钟以上，采样高度为呼吸带高度（1.2-1.5m）。采样点应避开通风口和门窗，均匀分布。</p><h3>检测频次</h3><p>学校教学环境每年至少检测一次，新装修或改建的教室投入使用前应进行专项检测。</p>" },
      { id:"e2", title:"第二章 教室采光照明检测", content:"<h3>采光系数</h3><p>采光系数 = 室内某一点照度 / 室外同一时间照度 × 100%，教室采光系数不应低于1.5%（GB 7793-2010）。</p><h3>桌面照度</h3><p>教室课桌面维持平均照度值不应低于300 lx，照度均匀度不应低于0.7。黑板面维持平均照度不应低于500 lx，均匀度不应低于0.8。</p><h3>照明检测方法</h3><p>使用照度计测量，测点布置在课桌面上，高度0.75m，测量前照度计应经过校准。</p>" },
      { id:"e3", title:"第三章 教室空气质量检测", content:"<h3>二氧化碳（CO₂）</h3><p>教室二氧化碳浓度不应超过0.15%（1500ppm）。使用不分光红外线气体分析仪法检测。</p><h3>甲醛（HCHO）</h3><p>教室甲醛浓度不应超过0.10mg/m³。使用酚试剂分光光度法检测。</p><h3>PM2.5/PM10</h3><p>教室PM2.5日均浓度不应超过75μg/m³，PM10日均不超过150μg/m³。使用重量法或光散射法检测。</p><h3>空气细菌总数</h3><p>教室空气细菌总数不应超过2500cfu/m³。使用撞击法或沉降法检测。</p>" },
      { id:"e4", title:"第四章 教室噪声检测", content:"<h3>噪声标准</h3><p>教室外环境噪声昼间不应超过55dB(A)，夜间不应超过45dB(A)。教室内噪声宜控制在40dB(A)以下。</p><h3>检测方法</h3><p>使用声级计（2型或以上）进行测量，测点高度1.2-1.5m，结果以等效连续A声级Leq表示。</p><h3>注意事项</h3><p>测量应在教室正常使用状态下进行，避开上课前后10分钟，测量时声级计应避免受到建筑物反射的影响。</p>" }
    ]
  },
  mgmt: {
    title: "管理体系文件", icon: "📋",
    chapters: [
      { id:"m1", title:"第一章 质量管理体系概述", content:"<h3>ISO/IEC 17025 概述</h3><p>检测实验室应建立、实施和维持与其活动范围相适应的管理体系。</p><h3>组织和管理</h3><p>实验室应具有法律地位，承担法律责任。应有管理人员和技术人员，具有所需的权力和资源。</p><h3>管理体系文件</h3><p>管理体系应形成文件，包括质量手册、程序文件、作业指导书和记录表格四级文件结构。</p>" },
      { id:"m2", title:"第二章 文件控制与记录管理", content:"<h3>文件控制</h3><p>所有文件发布前应由授权人员审查和批准。受控文件应有分发记录，作废文件应及时收回并标识。</p><h3>记录管理</h3><p>检测记录应包括原始观察、导出数据和最终结果。所有记录应清晰、完整，更改应可追溯，原记录不得涂改。</p><h3>保密性</h3><p>实验室应保护客户机密信息和所有权，对检测活动和结果的保密义务应在合同中明确。</p>" },
      { id:"m3", title:"第三章 内部审核与管理评审", content:"<h3>内部审核</h3><p>实验室应按照预定日程表和程序定期对其活动进行内部审核。审核员不得审核自己的工作。</p><h3>纠正措施</h3><p>发现不符合工作时，应采取纠正措施消除不符合原因。纠正措施应与问题的影响程度相适应。</p><h3>管理评审</h3><p>实验室最高管理者应定期对管理体系进行评审，确保其持续适宜性和有效性，评审记录应予保存。</p>" },
      { id:"m4", title:"第四章 人员管理", content:"<h3>人员资质要求</h3><p>检测人员应具备相关专业中专以上学历，经培训考核合格后方可上岗。</p><h3>健康管理</h3><p>从事公共场所卫生检测的人员，每年应进行一次健康检查。患有影响检测工作疾病的人员不得从事直接接触样品的工作。</p><h3>培训</h3><p>实验室应建立人员培训计划，对新进人员和在职人员进行持续培训，培训记录应予保存。</p>" }
    ]
