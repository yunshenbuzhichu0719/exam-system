<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>湖南绿盾卫士检测技术有限公司 - 在线考试系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a3a6b;
  --primary-light:#2a5aaa;
  --accent:#c9a84c;
  --accent-light:#f0d080;
  --bg:#e8edf4;
  --card:#fff;
  --text:#1a1a2e;
  --text-light:#5a6a7a;
  --border:#d0d8e4;
  --success:#1a8a4a;
  --danger:#c0392b;
  --warn:#e67e22;
}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== 顶部导航 ===== */
.topbar{
  background: linear-gradient(135deg,#1a3a6b 0%,#0d2247 100%);
  color:#fff;padding:0 40px;height:64px;display:flex;align-items:center;
  box-shadow:0 2px 16px rgba(10,30,70,.35);position:sticky;top:0;z-index:100;
}
.topbar-logo{display:flex;align-items:center;gap:12px;flex:1}
.topbar-logo .shield{
  width:40px;height:40px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.topbar-logo .name{font-size:17px;font-weight:700;letter-spacing:.5px}
.topbar-logo .sub{font-size:11px;opacity:.7;letter-spacing:1px}
.topbar-info{display:flex;align-items:center;gap:24px;font-size:14px;opacity:.9}
.topbar-info .user-icon{background:rgba(255,255,255,.15);padding:6px 12px;border-radius:20px}

/* ===== 主页 ===== */
.page-home{max-width:1100px;margin:0 auto;padding:40px 20px}

.hero{
  background: linear-gradient(135deg,#1a3a6b 0%,#1a5a9a 50%,#0d2247 100%);
  border-radius:20px;padding:60px 50px;margin-bottom:36px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 8px 40px rgba(26,58,107,.35);position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;right:-60px;top:-60px;
  width:280px;height:280px;background:rgba(201,168,76,.12);border-radius:50%;
}
.hero::after{
  content:'';position:absolute;right:40px;bottom:-80px;
  width:200px;height:200px;background:rgba(201,168,76,.08);border-radius:50%;
}
.hero-text{flex:1;position:relative;z-index:1}
.hero-text h1{font-size:32px;font-weight:700;margin-bottom:12px;color:#fff;line-height:1.3}
.hero-text p{font-size:15px;color:rgba(255,255,255,.75);line-height:1.7;max-width:500px}
.hero-badge{
  background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);
  border-radius:16px;padding:16px 24px;text-align:center;color:var(--accent-light);
  font-size:13px;position:relative;z-index:1;
}
.hero-badge .num{font-size:36px;font-weight:800;display:block;color:#fff}

.card{
  background:var(--card);border-radius:16px;padding:32px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);
  margin-bottom:24px;
}
.card-title{
  font-size:18px;font-weight:700;color:var(--primary);margin-bottom:24px;
  padding-bottom:14px;border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.card-title::before{
  content:'';width:4px;height:22px;background:var(--accent);border-radius:2px;
}

/* 姓名输入区 */
.name-section{display:flex;gap:16px;align-items:flex-end;margin-bottom:32px}
.name-section input{
  flex:1;padding:14px 18px;border:2px solid var(--border);border-radius:12px;
  font-size:16px;transition:border-color .2s;outline:none;
}
.name-section input:focus{border-color:var(--primary-light)}
.name-section .btn-start{
  background:linear-gradient(135deg,#1a3a6b,#1a5a9a);color:#fff;
  border:none;border-radius:12px;padding:14px 32px;font-size:16px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:transform .15s,box-shadow .15s;
}
.name-section .btn-start:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,58,107,.4)}

/* 试卷卡片 */
.paper-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.paper-card{
  border:2px solid var(--border);border-radius:16px;padding:24px;
  transition:border-color .2s,box-shadow .2s,transform .15s;cursor:pointer;
  background:var(--card);
}
.paper-card:hover{
  border-color:var(--primary-light);box-shadow:0 6px 24px rgba(26,58,107,.12);
  transform:translateY(-2px);
}
.paper-card .paper-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.paper-card .paper-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.4}
.paper-card .paper-tag{
  background:#eef2ff;color:var(--primary-light);border-radius:8px;
  padding:4px 10px;font-size:12px;flex-shrink:0;margin-left:12px;
}
.paper-card .paper-desc{font-size:13px;color:var(--text-light);line-height:1.6;margin-bottom:16px}
.paper-card .paper-meta{display:flex;gap:16px;font-size:12px;color:var(--text-light);margin-bottom:20px;flex-wrap:wrap}
.paper-card .paper-meta span{display:flex;align-items:center;gap:4px}
.paper-card .paper-meta .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0}
.paper-card .paper-btn{
  width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .2s,transform .15s;
}
.paper-card .paper-btn:hover{opacity:.88;transform:translateY(-1px)}

/* 模块标签页 */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px}
.tab{
  padding:12px 28px;font-size:15px;font-weight:600;color:var(--text-light);
  cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:color .2s,border-color .2s;
}
.tab.active{color:var(--primary);border-bottom-color:var(--accent)}

/* ===== 考试页面 ===== */
.page-exam{display:flex;gap:24px;max-width:1200px;margin:0 auto;padding:24px 20px;align-items:flex-start}

/* 左侧题号面板 */
.sidebar{width:220px;flex-shrink:0;position:sticky;top:80px}
.sidebar .card{padding:20px}
.sidebar-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:16px}
.q-nav{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.q-dot{
  width:36px;height:36px;border-radius:8px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--text-light);
  cursor:pointer;transition:all .15s;
}
.q-dot.answered{border-color:var(--primary-light);background:#eef2ff;color:var(--primary-light)}
.q-dot.current{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,168,76,.4)}
.q-dot.wrong{border-color:var(--danger);background:#fef2f2;color:var(--danger)}
.q-dot.right{border-color:var(--success);background:#f0fdf4;color:var(--success)}
.q-legend{display:flex;flex-direction:column;gap:8px;font-size:12px;color:var(--text-light)}
.q-legend span{display:flex;align-items:center;gap:8px}
.q-legend .dot{width:14px;height:14px;border-radius:4px;border:2px solid}

.timer-box{
  background:linear-gradient(135deg,#fff8e8,#fff3cc);border:1px solid #e8d090;
  border-radius:12px;padding:14px;margin-top:16px;text-align:center;
}
.timer-box .timer-label{font-size:12px;color:var(--warn);font-weight:600;margin-bottom:4px}
.timer-box .timer-num{font-size:28px;font-weight:800;color:var(--warn);font-variant-numeric:tabular-nums}

/* 右侧答题区 */
.exam-main{flex:1;min-width:0}
.exam-header{
  background:var(--card);border-radius:16px;padding:24px 28px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);
  margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.exam-header h2{font-size:18px;color:var(--primary)}
.exam-header .exam-info{display:flex;gap:20px;font-size:14px;color:var(--text-light)}
.exam-header .exam-info strong{color:var(--text)}
.progress-bar{width:100%;height:6px;background:#e8edf4;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary-light));border-radius:3px;transition:width .4s}

.question-card{
  background:var(--card);border-radius:16px;padding:28px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);
  margin-bottom:20px;
}
.question-card .q-type{
  display:inline-block;background:#eef2ff;color:var(--primary-light);
  border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700;
  margin-bottom:16px;letter-spacing:.5px;
}
.question-card .q-stem{font-size:16px;line-height:1.7;font-weight:600;margin-bottom:20px;color:var(--text)}
.options{list-style:none;display:flex;flex-direction:column;gap:10px}
.option-item{
  display:flex;align-items:center;gap:14px;padding:14px 18px;
  border:2px solid var(--border);border-radius:12px;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.option-item:hover{border-color:var(--primary-light);background:#f5f7ff}
.option-item.selected{border-color:var(--primary);background:#eef2ff}
.option-item .opt-letter{
  width:32px;height:32px;border-radius:50%;border:2px solid currentColor;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  flex-shrink:0;
}
.option-item .opt-text{flex:1;font-size:15px;line-height:1.5}
.option-item input[type=radio],.option-item input[type=checkbox]{display:none}

/* 多选/判断 */
.short-area textarea{
  width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;
  font-size:15px;line-height:1.7;resize:vertical;min-height:120px;
  font-family:inherit;outline:none;transition:border-color .2s;
}
.short-area textarea:focus{border-color:var(--primary-light)}

.q-nav-bottom{display:flex;gap:12px;flex-wrap:wrap}
.q-nav-bottom .btn{
  border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:600;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,58,107,.35)}
.btn-ghost{background:#f1f4f8;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:#e8edf4}
.btn-accent{background:linear-gradient(135deg,#c9a84c,#e0bc5a);color:#fff}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,.4)}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}

/* ===== 结果页面 ===== */
.page-result{max-width:960px;margin:0 auto;padding:40px 20px}

.result-hero{
  text-align:center;padding:60px 40px;background:linear-gradient(135deg,#1a3a6b,#0d2247);
  border-radius:24px;margin-bottom:40px;position:relative;overflow:hidden;
}
.result-hero::before{
  content:'✓';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:220px;color:rgba(201,168,76,.08);line-height:1;
}
.result-hero .result-icon{
  width:80px;height:80px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;margin:0 auto 20px;position:relative;
}
.result-hero h1{font-size:36px;color:#fff;margin-bottom:12px;position:relative}
.result-hero .result-score{font-size:72px;font-weight:900;color:var(--accent-light);margin-bottom:8px;position:relative}
.result-hero .result-sub{font-size:16px;color:rgba(255,255,255,.65);position:relative}

.cert-box{
  background:var(--card);border-radius:20px;border:2px solid var(--accent);
  padding:48px 60px;text-align:center;margin-bottom:32px;position:relative;
}
.cert-box::before,.cert-box::after{
  content:'★';position:absolute;top:20px;font-size:20px;color:var(--accent);
}
.cert-box::before{left:30px}
.cert-box::after{right:30px}
.cert-box .cert-title{
  font-size:13px;letter-spacing:8px;color:var(--text-light);margin-bottom:8px;
}
.cert-box .cert-company{font-size:24px;font-weight:900;color:var(--primary);margin-bottom:24px;letter-spacing:2px}
.cert-box .cert-line{border-top:1px dashed var(--border);margin:24px 0}
.cert-box .cert-text{font-size:15px;color:var(--text-light);line-height:2}
.cert-box .cert-name{font-size:22px;font-weight:700;color:var(--text);margin:16px 0;letter-spacing:4px}
.cert-box .cert-score{font-size:48px;font-weight:900;color:var(--accent);margin:16px 0}
.cert-box .cert-status{
  display:inline-block;font-size:20px;font-weight:800;
  padding:8px 32px;border-radius:30px;margin-top:12px;
}
.cert-status.pass{background:#f0fdf4;color:var(--success);border:2px solid var(--success)}
.cert-status.fail{background:#fef2f2;color:var(--danger);border:2px solid var(--danger)}
.cert-box .cert-date{font-size:13px;color:var(--text-light);margin-top:20px}
.cert-box .cert-id{font-size:12px;color:#b0bec5;margin-top:6px;font-family:monospace}

.result-detail{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.result-detail-header{
  background:#f5f7ff;padding:20px 28px;font-size:16px;font-weight:700;color:var(--primary);
  border-bottom:1px solid var(--border);
}
.result-detail-body{padding:24px 28px}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.detail-stat{
  text-align:center;padding:20px;border-radius:12px;border:1px solid var(--border);
}
.detail-stat .stat-num{font-size:28px;font-weight:800;color:var(--primary)}
.detail-stat .stat-label{font-size:13px;color:var(--text-light);margin-top:4px}
.detail-stat.success{background:#f0fdf4;border-color:#bbf7d0}
.detail-stat.success .stat-num{color:var(--success)}
.detail-stat.danger{background:#fef2f2;border-color:#fecaca}
.detail-stat.danger .stat-num{color:var(--danger)}
.detail-stat.warn{background:#fff8e8;border-color:#e8d090}
.detail-stat.warn .stat-num{color:var(--warn)}

.q-list-item{
  border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;
}
.q-list-item .q-list-stem{font-size:15px;font-weight:600;margin-bottom:12px}
.q-list-item .q-list-meta{display:flex;gap:16px;font-size:13px;color:var(--text-light);flex-wrap:wrap}
.q-list-item .q-list-meta .tag{
  padding:2px 10px;border-radius:6px;font-size:12px;font-weight:600;
}
.tag-right{background:#f0fdf4;color:var(--success)}
.tag-wrong{background:#fef2f2;color:var(--danger)}
.tag-wait{background:#fff8e8;color:var(--warn)}
.tag-manual{background:#f0f4ff;color:var(--primary-light)}

.result-actions{display:flex;gap:16px;justify-content:center;margin-top:32px;flex-wrap:wrap}

/* 提交确认弹窗 */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal-box{
  background:#fff;border-radius:20px;padding:40px;max-width:460px;width:100%;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-box h3{font-size:20px;color:var(--primary);margin-bottom:16px}
.modal-box p{color:var(--text-light);line-height:1.7;margin-bottom:28px}
.modal-box .modal-actions{display:flex;gap:12px;justify-content:center}

/* 未答提示 */
.unanswered-alert{
  background:#fef3cd;border:1px solid #f0c040;color:#7a5000;
  border-radius:12px;padding:16px 20px;margin-bottom:20px;font-size:14px;
}

/* 页脚 */
.footer{text-align:center;padding:32px 20px;font-size:12px;color:var(--text-light)}

/* 工具提示 */
.info-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:#f1f4f8;border-radius:999px;padding:4px 12px;font-size:12px;color:var(--text-light);
}
.info-pill strong{color:var(--text)}

/* 动画 */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page-home,.page-exam,.page-result{animation:fadeUp .35s ease-out}
.card,.paper-card,.question-card{transition:all .2s}

/* 响应式 */
@media(max-width:900px){
  .page-exam{flex-direction:column}
  .sidebar{width:100%;position:static}
  .q-nav{grid-template-columns:repeat(10,1fr)}
  .hero{flex-direction:column;text-align:center;padding:40px 30px;gap:24px}
  .hero-badge{margin-top:0}
  .detail-stats{grid-template-columns:repeat(2,1fr)}
  .cert-box{padding:32px 24px}
}
@media(max-width:600px){
  .topbar{padding:0 16px}
  .topbar-info .user-icon{display:none}
  .paper-grid{grid-template-columns:1fr}
  .exam-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar" id="topbar">
  <div class="topbar-logo">
    <div class="shield">🛡️</div>
    <div>
      <div class="name">湖南绿盾卫士检测技术有限公司</div>
      <div class="sub">在线培训考核系统</div>
    </div>
  </div>
  <div class="topbar-info">
    <span>📞 0731-88888888</span>
    <span class="user-icon" id="topbar-user">👤 未登录</span>
  </div>
</div>

<!-- 主应用区 -->
<div id="app"></div>

<script>
// ===== 题库数据 =====
const TASKS = [
  {
    id: 1,
    name: "GB/T 18204 培训考核卷",
    desc: "公共场所卫生检验方法 6 部分核心知识点，覆盖法律法规、采样技术、微生物检测与质控要点。",
    pass_score: 80,
    scoring_mode: "auto",
    paper_mode: "fixed",
    category: "专业知识",
    subcategory: "理化检测",
    questions: [
      {id:1,qtype:"single",stem:"GB/T 18204 标准族共有几个部分？",options:["A. 3 个","B. 5 个","C. 6 个","D. 8 个"],answer:"C",score:2,explanation:"分为物理性、化学性、空气微生物、公共用品用具微生物、集中空调、卫生监测规范 6 部分。"},
      {id:2,qtype:"single",stem:"室内温度、相对湿度测点的高度一般应为？",options:["A. 距地面 0.2 m","B. 距地面 0.8~1.6 m","C. 距天花板 0.5 m","D. 任意高度"],answer:"B",score:2,explanation:"代表人群呼吸带高度。"},
      {id:3,qtype:"single",stem:"用热球式电风速计测风速时，采样员应当？",options:["A. 站在仪器正前方","B. 退到仪器下风向 0.5 m 外","C. 用手扶住探头","D. 紧贴墙壁站立"],answer:"B",score:2,explanation:"避免人体遮挡风流、制造乱流。"},
      {id:4,qtype:"single",stem:"甲醛采样最常用的方法是？",options:["A. 酚试剂分光光度法","B. 重量法","C. 撞击法","D. 沉降法"],answer:"A",score:2,explanation:"酚试剂（MBTH）分光光度法最常用；重量法用于颗粒物。"},

function $(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function shuffle(arr) {
  let a = arr.slice(), i = a.length;
  while (i) { let j = Math.floor(Math.random() * i); [a[--i], a[j]] = [a[j], a[i]]; }
  return a;
}

function buildPaper(task) {
  if (task.paper_mode === "fixed") return task.questions.slice();
  return shuffle(task.questions).slice(0, task.random_count || task.questions.length);
}

function calcScore(task, questions, answers) {
  let auto = 0, manual = 0;
  questions.forEach(q => {
    if (["single","judge"].includes(q.qtype)) {
      if ((answers[q.id] || "") === q.answer) auto += q.score;
    } else if (q.qtype === "multi") {
      let ca = q.answer.split(",").sort().join(",");
      if ((answers[q.id] || "").split(",").sort().join(",") === ca) auto += q.score;
    } else {
      manual += q.score;
    }
  });
  return { auto, manual };
}

function totalScore(questions) { return questions.reduce((s,q)=>s+q.score,0); }

// ===== 渲染 =====
function render() {
  document.getElementById("topbar").style.display = state.view === "home" ? "flex" : "flex";
  switch(state.view) {
    case "home": $("app").innerHTML = renderHome(); break;
    case "exam": renderExam(); break;
    case "result": $("app").innerHTML = renderResult(); break;
  }
}

function renderCurrentQ() {
  let q = state.questions[state.currentQ];
  let card = document.getElementById("q-card");
  if (!card) return;

  let typeLabel = {"single":"单选题","multi":"多选题","judge":"判断题","short":"简答题","scenario":"场景分析题"}[q.qtype] || "问答题";
  let typeColor = {"single":"#1a5a9a","multi":"#6b3fa0","judge":"#1a8a4a","short":"#c05a20","scenario":"#8a1a4a"}[q.qtype] || "#1a3a6b";

  let optsHtml = "";
  if (q.qtype === "single" || q.qtype === "judge") {
    optsHtml = q.options.map(o => {
      let sel = (state.answers[q.id] || "") === o[0];
      let letter = o[0];
      let text = o.slice(2);
      return `<div class="option-item${sel?" selected":""}" onclick="selectOption(this,'${letter}')">
        <span class="opt-letter" style="color:${sel?"#fff":"var(--primary-light)"};border-color:${sel?"var(--primary)":"currentColor"};background:${sel?"var(--primary)":"transparent"}">${letter}</span>
        <span class="opt-text">${esc(text)}</span>
      </div>`;
    }).join("");
  } else if (q.qtype === "multi") {
    let selArr = (state.answers[q.id] || "").split(",").filter(x=>x);
    optsHtml = q.options.map(o => {
      let sel = selArr.includes(o[0]);
      let text = o.slice(2);
      return `<div class="option-item${sel?" selected":""}" onclick="toggleMulti(this,'${o[0]}')">
        <span class="opt-letter" style="color:${sel?"#fff":"#6b3fa0"};border-color:${sel?"#6b3fa0":"currentColor"};background:${sel?"#6b3fa0":"transparent"}">${o[0]}</span>
        <span class="opt-text">${esc(text)}</span>
      </div>`;
    }).join("");
  } else {
    optsHtml = `<div class="short-area">
      <textarea id="short-answer" placeholder="请在此输入你的答案..." onchange="setShort(this.value)">${esc(state.answers[q.id]||"")}</textarea>
    </div>`;
  }

  card.innerHTML = `
    <span class="q-type" style="background:${typeColor}20;color:${typeColor}">${typeLabel} · ${q.score}分</span>
    <div class="q-stem">${esc(q.stem)}</div>
    <ul class="options">${optsHtml}</ul>
  `;
}

function selectOption(el, val) {
  let q = state.questions[state.currentQ];
  state.answers[q.id] = val;
  el.parentElement.querySelectorAll(".option-item").forEach(e => {
    e.classList.remove("selected");
    e.querySelector(".opt-letter").style.background = "transparent";
    e.querySelector(".opt-letter").style.color = "var(--primary-light)";
    e.querySelector(".opt-letter").style.borderColor = "currentColor";
  });
  el.classList.add("selected");
  el.querySelector(".opt-letter").style.background = "var(--primary)";
  el.querySelector(".opt-letter").style.color = "#fff";
  el.querySelector(".opt-letter").style.borderColor = "var(--primary)";
  updateNav();
}

function toggleMulti(el, val) {
  let q = state.questions[state.currentQ];
  let arr = (state.answers[q.id] || "").split(",").filter(x=>x);
  if (arr.includes(val)) {
    arr = arr.filter(x=>x!==val);
    el.classList.remove("selected");
    el.querySelector(".opt-letter").style.background = "transparent";
    el.querySelector(".opt-letter").style.color = "#6b3fa0";
    el.querySelector(".opt-letter").style.borderColor = "currentColor";
  } else {
    arr.push(val);
    el.classList.add("selected");
    el.querySelector(".opt-letter").style.background = "#6b3fa0";
    el.querySelector(".opt-letter").style.color = "#fff";
    el.querySelector(".opt-letter").style.borderColor = "#6b3fa0";
  }
  state.answers[q.id] = arr.sort().join(",");
  updateNav();
}

function setShort(val) {
  state.answers[state.questions[state.currentQ].id] = val;
  updateNav();
}

function updateNav() {
  let nav = document.querySelector(".q-nav");
  if (!nav) return;
  state.questions.forEach((q, i) => {
    let dot = nav.children[i];
    if (!dot) return;
    dot.className = "q-dot";
    if (i === state.currentQ) dot.classList.add("current");
    else if (state.answers[q.id]) dot.classList.add("answered");
  });
  // 更新进度
  let answered = state.questions.filter(q => !!state.answers[q.id]).length;
  let pct = Math.round(answered / state.questions.length * 100);
  let fill = document.querySelector(".progress-bar .fill");
  if (fill) fill.style.width = pct + "%";
}

function jumpTo(idx) {
  state.currentQ = idx;
  renderCurrentQ();
  updateNav();
}
function prevQ() {
  if (state.currentQ > 0) { state.currentQ--; renderCurrentQ(); updateNav(); }
}
function nextQ() {
  if (state.currentQ < state.questions.length - 1) { state.currentQ++; renderCurrentQ(); updateNav(); }
}

// ===== 倒计时 =====
let timerInterval = null;
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  let sec = 60 * 60; // 60分钟
  timerInterval = setInterval(() => {
    sec--;
    if (sec <= 0) { clearInterval(timerInterval); confirmSubmit(); return; }
    let m = Math.floor(sec/60), s = sec%60;
    let el = document.getElementById("timer");
    if (el) el.textContent = String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  }, 1000);
}

// ===== 提交确认 =====
function confirmSubmit() {
  if (timerInterval) clearInterval(timerInterval);
  let unanswered = state.questions.filter(q => !state.answers[q.id]).length;
  let html = `<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3>确认提交试卷？</h3>
      ${unanswered > 0 ? `<p>你还有 <strong>${unanswered} 道题</strong>未作答，提交后将无法修改答案。</p>` : `<p>你已完成全部题目，确认提交吗？</p>`}
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">继续答题</button>
        <button class="btn btn-accent" onclick="doSubmit()">确认提交 ✓</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.querySelector(".modal-overlay")?.remove();
  if (timerInterval === null) startTimer(); // 如果之前是超时提交的，不再启动
}

function doSubmit() {
  document.querySelector(".modal-overlay")?.remove();
  let task = TASKS.find(t => t.id === state.taskId);
  let result = calcScore(task, state.questions, state.answers);
  state.score = result.auto;
  state.passed = state.score >= task.pass_score;
  state.submitted = true;
  state.view = "result";
  saveRecord();
  render();
  scrollTo(0, 0);
}

function backHome() {
  if (!confirm("确定退出？考试记录将丢失。")) return;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  state.view = "home";
  state.taskId = null;
  state.answers = {};
  document.getElementById("topbar-user").textContent = "👤 未登录";
  render();
}

// ===== 结果页 =====
function renderResult() {
  let task = TASKS.find(t => t.id === state.taskId);
  let total = totalScore(state.questions);
  let auto = 0, manual = 0;
  state.questions.forEach(q => {
    if (["single","judge"].includes(q.qtype)) {
      if ((state.answers[q.id]||"")===q.answer) auto+=q.score;
    } else if (q.qtype==="multi") {
      let ca=q.answer.split(",").sort().join(",");
      if ((state.answers[q.id]||"").split(",").sort().join(",")===ca) auto+=q.score;
    } else { manual+=q.score; }
  });

  let rightCount = state.questions.filter(q => {
    if(["single","judge"].includes(q.qtype)) return (state.answers[q.id]||"")===q.answer;
    if(q.qtype==="multi") return (state.answers[q.id]||"").split(",").sort().join(",")===q.answer.split(",").sort().join(",");
    return false;
  }).length;

  let qList = state.questions.map((q,i) => {
    let isObj = ["single","multi","judge"].includes(q.qtype);
    let ua = state.answers[q.id] || "";
    let ok = false, tagCls="tag-wait", tagText="待阅";
    if (isObj) {
      if (q.qtype==="multi") ok = ua.split(",").sort().join(",")===q.answer.split(",").sort().join(",");
      else ok = ua===q.answer;
      tagCls = ok ? "tag-right" : "tag-wrong";
      tagText = ok ? "✓ 正确" : "✗ 错误";
    } else {
      tagCls = "tag-manual";
      tagText = "待人工阅卷";
    }
    return `<div class="q-list-item">
      <div class="q-list-stem">${i+1}. ${esc(q.stem)} <span class="tag ${tagCls}">${tagText}</span> <span class="tag" style="background:#f1f4f8;color:var(--text-light)">${q.score}分</span></div>
      <div class="q-list-meta">
        <span>你的答案：<strong>${esc(ua)||"未作答"}</strong></span>
        ${isObj?`<span>正确答案：<strong>${esc(q.answer)}</strong></span>`:""}
        ${q.explanation?`<span style="color:var(--primary-light)">${esc(q.explanation)}</span>`:""}
      </div>
    </div>`;
  }).join("");

  let certId = "LV" + Date.now().toString(36).toUpperCase();
  let certDate = new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric"});
  let bgIcon = state.passed ? "🏆" : "📋";

  return `
    <div class="page-result">
      <div class="result-hero">
        <div class="result-icon">${bgIcon}</div>
        <h1>${state.passed ? "恭喜！考试合格" : "考试结束"}</h1>
        <div class="result-score">${state.score} <span style="font-size:24px;font-weight:400;opacity:.7">/ ${total} 分</span></div>
        <div class="result-sub">合格线 ${task.pass_score} 分 · ${state.passed?"合格":"不合格"} · ${esc(state.candName)} · ${esc(task.name)}</div>
      </div>

      <div class="cert-box">
        <div class="cert-title">湖南绿盾卫士检测技术有限公司</div>
        <div class="cert-company">培训考核合格证书</div>
        <div class="cert-line"></div>
        <div class="cert-text">经考核，成绩合格，特发此证。</div>
        <div class="cert-name">${esc(state.candName)}</div>
        <div class="cert-score">${state.score} 分</div>
        <div class="cert-status ${state.passed?"pass":"fail"}">${state.passed?"✓ 合格":"✗ 不合格"}</div>
        <div class="cert-date">考核日期：${certDate}</div>
        <div class="cert-id">证书编号：${certId}</div>
      </div>

      <div class="result-detail">
        <div class="result-detail-header">📊 答题详情（共 ${state.questions.length} 题）</div>
        <div class="result-detail-body">
          <div class="detail-stats">
            <div class="detail-stat success">
              <div class="stat-num">${rightCount}</div>
              <div class="stat-label">答对题数</div>
            </div>
            <div class="detail-stat danger">
              <div class="stat-num">${state.questions.length - rightCount - (state.questions.length - state.questions.filter(q=>["single","multi","judge"].includes(q.qtype)).length)}</div>
              <div class="stat-label">答错题数</div>
            </div>
            <div class="detail-stat warn">
              <div class="stat-num">${state.questions.filter(q=>["short","scenario"].includes(q.qtype)).length}</div>
              <div class="stat-label">主观题（待阅）</div>
            </div>
            <div class="detail-stat">
              <div class="stat-num">${task.pass_score}</div>
              <div class="stat-label">合格线</div>
            </div>
          </div>
          ${qList}
        </div>
      </div>

      <div class="result-actions">
        <button class="btn btn-primary" onclick="window.print()">🖨 打印证书</button>
        <button class="btn btn-ghost" onclick="backHome()">返回首页</button>
      </div>

      <div class="footer">© 2026 湖南绿盾卫士检测技术有限公司 · 培训考核系统</div>
    </div>
  `;
}

// ===== LocalStorage =====
function saveRecord() {
  let task = TASKS.find(t => t.id === state.taskId);
  let records = JSON.parse(localStorage.getItem("exam_records") || "[]");
  records.push({time: new Date().toISOString(), name: state.candName, task: task.name, score: state.score, passed: state.passed});
  localStorage.setItem("exam_records", JSON.stringify(records));
}

// ===== 初始化 =====
window.onload = () => render();
</script>
</body>
</html>
