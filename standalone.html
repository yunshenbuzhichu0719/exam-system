<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>湖南绿盾卫士检测技术有限公司考试系统</title>
<style>
* { box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; margin: 0; background: #f4f6f9; color: #222; }
.wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }
.card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
h1,h2,h3 { margin-top: 0; }
input, select, textarea, button { font-family: inherit; font-size: 15px; }
input[type=text], input[type=password], select, textarea {
  width: 100%; padding: 10px 12px; border: 1px solid #d0d7de; border-radius: 8px; margin: 6px 0 14px;
}
button, .btn { background: #2563eb; color: #fff; border: 0; border-radius: 8px; padding: 10px 18px; cursor: pointer; }
button:hover { background: #1d4ed8; }
.btn-ghost { background: #e5e7eb; color: #222; }
.brand { font-size: 13px; color: #2563eb; font-weight: 700; letter-spacing: .5px; margin-bottom: 6px; }
.module { margin-top: 24px; }
.module-title { font-size: 19px; border-left: 4px solid #2563eb; padding-left: 10px; margin-bottom: 12px; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.chip { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; border-radius: 999px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
.chip.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.papers { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.paper-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; background: #fafbff; }
.paper-name { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
.paper-meta { font-size: 13px; color: #475569; margin-bottom: 4px; }
.paper-sub { font-size: 12px; color: #94a3b8; margin-bottom: 10px; }
.q { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin: 14px 0; }
.q .stem { font-weight: 600; margin-bottom: 10px; }
.opt { display: block; padding: 8px 10px; border-radius: 8px; }
.opt:hover { background: #f1f5f9; }
.opt input { width: auto; margin-right: 8px; vertical-align: middle; }
.tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #4338ca; margin-left: 8px; }
.score-badge { float: right; font-weight: 700; }
.ok { color: #16a34a; } .bad { color: #dc2626; }
.ans-box { background: #f8fafc; border-left: 3px solid #94a3b8; padding: 8px 12px; margin: 8px 0; border-radius: 0 8px 8px 0; }
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.flash { background: #fef3c7; color: #92400e; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; }
.note { font-size: 13px; color: #64748b; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { border: 1px solid #e2e8f0; padding: 8px 10px; text-align: left; }
th { background: #f1f5f9; }
.pass { color: #16a34a; font-weight: 700; } .fail { color: #dc2626; font-weight: 700; }
.hidden { display: none; }
@media (max-width: 600px) { .papers { grid-template-columns: 1fr; } }
@media print {
  body { background: #fff; }
  .wrap { max-width: 100%; }
  .card { box-shadow: none; }
  .no-print { display: none !important; }
  .q { border: 1px solid #999; page-break-inside: avoid; }
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ====== 题库数据 ======
const TASKS = [
  {
    id: 1,
    name: "GB/T 18204 培训考核卷",
    desc: "公共场所卫生检验方法 6 部分 培训考核（与讲义配套）",
    pass_score: 80,
    scoring_mode: "auto",
    paper_mode: "fixed",
    category: "专业知识",
    subcategory: "理化检测",
    questions: [
      {id:1,qtype:"single",stem:"GB/T 18204 标准族共有几个部分？",options:["A. 3 个","B. 5 个","C. 6 个","D. 8 个"],answer:"C",score:2,explanation:"分为物理性、化学性、空气微生物、公共用品用具微生物、集中空调、卫生监测规范 6 部分。"},
      {id:2,qtype:"single",stem:"室内温度、相对湿度测点的高度一般应为？",options:["A. 距地面 0.2 m","B. 距地面 0.8~1.6 m","C. 距天花板 0.5 m","D. 任意高度"],answer:"B",score:2,explanation:"代表人群呼吸带高度。"},
      {id:3,qtype:"single",stem:"用热球式电风速计测风速时，采样员应当？",options:["A. 站在仪器正前方","B. 退到仪器下风向 0.5 m 外","C. 用手扶住探头","D. 紧贴墙壁站立"],answer:"B",score:2,explanation:"避免人体遮挡风流、制造乱流。"},
      {id:4,qtype:"single",stem:"甲醛采样最常用的方法是？",options:["A. 酚试剂分光光度法","B. 重量法","C. 撞击法","D. 沉降法"],answer:"A",score:2,explanation:"酚试剂（MBTH）分光光度法最常用；重量法用于颗粒物。"},
      {id:5,qtype:"single",stem:"PM2.5\"重量法\"的核心步骤是？",options:["A. 用激光数颗粒","B. 滤膜采样后恒温恒湿称重差重","C. 直接读仪器","D. 培养菌落"],answer:"B",score:2,explanation:"滤膜采集后称重，差重算浓度；光散射法为快速法。"},
      {id:6,qtype:"single",stem:"空气细菌总数\"自然沉降法\"是指？",options:["A. 用机器把空气吹到平皿上","B. 把平皿打开让菌自然落下","C. 用拭子擦空气","D. 过滤空气"],answer:"B",score:2,explanation:"平皿暴露让微生物自然沉降；撞击法才用机器。"},
      {id:7,qtype:"single",stem:"公共用品用具微生物采样，一件毛巾应？",options:["A. 用一支拭子擦所有毛巾","B. 一件用品用一支拭子，固定面积涂抹","C. 直接剪碎培养","D. 用嘴吹一下"],answer:"B",score:2,explanation:"一件一拭子，防止交叉污染、便于溯源。"},
      {id:8,qtype:"single",stem:"集中空调冷却水中需重点检测、且必须在生物安全柜操作的致病微生物是？",options:["A. 大肠杆菌","B. 金黄色葡萄球菌","C. 嗜肺军团菌","D. 真菌"],answer:"C",score:2,explanation:"军团菌致病且存在气溶胶风险，需生物安全柜操作。"},
      {id:9,qtype:"single",stem:"根据监测技术规范，布点一般按？",options:["A. 只在门口布点","B. 每 50~100 m² 设 1 个点，均匀布设","C. 随机 1 个点","D. 只在污染源旁"],answer:"B",score:2,explanation:"按面积均匀布点，保证代表性。"},
      {id:10,qtype:"single",stem:"质控\"现场空白\"的作用是证明？",options:["A. 采样员手不抖","B. 吸收液/滤膜本身没被污染","C. 仪器很准","D. 数据好看"],answer:"B",score:2,explanation:"现场空白证\"锅干净\"；平行样证\"手不抖\"；加标证\"秤准\"。"},
      {id:11,qtype:"multi",stem:"下列哪些属于 GB/T 18204.1 物理性指标？",options:["A. 照度","B. 噪声","C. 甲醛","D. 新风量","E. 大气压"],answer:"A,B,D,E",score:3,explanation:"甲醛属化学性指标（第2部分）。"},
      {id:12,qtype:"multi",stem:"化学性指标采样时，下列哪些做法正确？",options:["A. 甲醛样品避光、24h内分析","B. 臭氧样品全程避光、即采即测","C. 苯系物活性炭管进气方向接反无所谓","D. 采样流量和体积要准确记录","E. 滤膜用手直接拿取"],answer:"A,B,D",score:3,explanation:"活性炭管方向不能反；滤膜应用镊子取放避免污染。"},
      {id:13,qtype:"multi",stem:"空气微生物采样质控应包括？",options:["A. 培养基空白（不采样培养应无菌落）","B. 平行采样取平均","C. 开盖时间越长越好","D. 无菌操作"],answer:"A,B,D",score:3,explanation:"暴露过长平皿干燥、结果失真。"},
      {id:14,qtype:"multi",stem:"公共用品用具微生物检测项目通常包括？",options:["A. 细菌总数","B. 大肠菌群","C. 金黄色葡萄球菌","D. 真菌总数"],answer:"A,B,C,D",score:3,explanation:"四项均为常规检测项目。"},
      {id:15,qtype:"multi",stem:"通用质控\"四件套\"包括？",options:["A. 现场空白","B. 运输空白","C. 平行样","D. 加标回收","E. 随意修改数据"],answer:"A,B,C,D",score:3,explanation:"随意修改数据违反质控原则。"},
      {id:16,qtype:"judge",stem:"GB/T 18204.2 是空气微生物指标的测定方法。",options:["对","错"],answer:"错",score:2,explanation:"第2部分是化学性指标；空气微生物是第3部分。"},
      {id:17,qtype:"judge",stem:"测照度前，探头应遮光清零，且人不要挡住光路。",options:["对","错"],answer:"对",score:2,explanation:"正确。"},
      {id:18,qtype:"judge",stem:"风速测量时，采样员站在仪器正前方不影响结果。",options:["对","错"],answer:"错",score:2,explanation:"人会挡风制造乱流。"},
      {id:19,qtype:"judge",stem:"甲醛吸收液采样时，应保证气泡连续均匀，不能让液体被吸走。",options:["对","错"],answer:"对",score:2,explanation:"正确。"},
      {id:20,qtype:"judge",stem:"空气细菌总数\"撞击法\"是用机器把空气高速撞到培养皿上。",options:["对","错"],answer:"对",score:2,explanation:"正确。"},
      {id:21,qtype:"judge",stem:"沉降法平皿暴露时间越长结果越准，可以暴露 1 小时。",options:["对","错"],answer:"错",score:2,explanation:"暴露过长平皿干燥、结果失真。"},
      {id:22,qtype:"judge",stem:"公共用品采样时，一支棉拭子可以连续擦拭多件不同用品以提高效率。",options:["对","错"],answer:"错",score:2,explanation:"会交叉污染，应一件一拭子。"},
      {id:23,qtype:"judge",stem:"嗜肺军团菌检测存在生物危害，应在生物安全柜内操作。",options:["对","错"],answer:"对",score:2,explanation:"正确。"},
      {id:24,qtype:"judge",stem:"监测布点应在场所正常营业/使用状态下进行，不能在空场造假。",options:["对","错"],answer:"对",score:2,explanation:"正确。"},
      {id:25,qtype:"judge",stem:"平行样是为了证明\"仪器很准\"，空白样是为了证明\"手不抖\"。",options:["对","错"],answer:"错",score:2,explanation:"空白证\"锅干净\"、平行证\"手不抖\"、加标证\"秤准\"。"},
      {id:26,qtype:"short",stem:"简述室内空气\"新风量\"的采样原理和关键注意事项。",options:[],answer:"原理：用示踪气体（如CO₂）在密闭有人房间测浓度衰减/释放，结合房间体积与人数算新风量。注意：在正常使用、门窗正常关闭状态测；房间先密闭平衡；记录体积、人数、门窗状态；重复2~3次取平均。",score:6,explanation:"",keyword:"示踪气体；密闭平衡；记录体积人数；正常使用状态；重复取平均"},
      {id:27,qtype:"short",stem:"甲醛采样-检测全流程中，列举至少 3 个易出错点和对应正确做法。",options:[],answer:"①吸收管未垂直/气泡不均→液体被吸走，应垂直、气泡连续；②未避光/超24h才分析→甲醛分解，应避光并限时分析；③显色温度时间不准→严格控温计时；④采样前房间未按要求密闭→先密闭再采；⑤流量体积不准→校准流量计、记录体积。",score:6,explanation:"",keyword:"垂直气泡连续；避光24h内；控温计时；先密闭；流量体积准"},
      {id:28,qtype:"short",stem:"什么是\"空气细菌总数\"的撞击法和自然沉降法？各适用于什么场景？",options:[],answer:"撞击法：用采样器将空气高速撞击到培养皿上捕菌，速度快、定量好，适合精确监测。自然沉降法：平皿打开暴露一定时间，靠重力落菌，操作简便但受暴露时间影响大，适合快速筛查。",score:6,explanation:"",keyword:"撞击法机器定量精确；沉降法暴露简便筛查"},
      {id:29,qtype:"short",stem:"公共用品用具微生物采样\"涂抹法\"的操作要点是什么？",options:[],answer:"无菌生理盐水湿润棉拭子；在用品表面固定面积（如5×5cm²）内来回均匀涂抹；剪去手触部分放入采样液；一件一拭子、标记清楚；尽快4℃冷藏送检。",score:6,explanation:"",keyword:"无菌；固定面积；一件一拭子；标记；冷藏"},
      {id:30,qtype:"short",stem:"集中空调通风系统卫生监测包含哪几类主要检测内容？为什么军团菌检测要特别小心？",options:[],answer:"内容：送风中细菌/真菌总数、送风中PM10、风管内表面积尘量、风管内表面微生物、冷却水/冷凝水嗜肺军团菌。原因：军团菌致病、可随空调气溶胶吸入致病，且培养操作有生物危害，须生物安全柜、个人防护。",score:6,explanation:"",keyword:"送风微生物；PM10；积尘；表面微生物；军团菌；生物安全柜"},
      {id:31,qtype:"scenario",stem:"【场景】某检测员在商场测风速，为图方便站在风速计正前方读数，得到 0.05 m/s。请指出问题，并说明正确做法和可能造成的后果。",options:[],answer:"问题：人站在正前方会遮挡风流、制造乱流，测得的是\"人的影子\"而非真实风速。正确：采样员退到仪器下风向0.5m外，探头迎风。后果：读数偏低，可能掩盖通风不良问题，数据不可靠。",score:5,explanation:"",keyword:"遮挡风流；退到下风向0.5m外；读数偏低不可靠"},
      {id:32,qtype:"scenario",stem:"【场景】某宾馆杯具卫生监测，一名采样员用同一支无菌棉拭子依次擦拭了 8 个茶杯内侧，混合后送检。请评价该操作，并给出规范做法。",options:[],answer:"问题：一支拭子擦多件用品会造成交叉污染，且无法定位哪件不合格。规范：一件用品一支无菌拭子，固定面积涂抹，分别标记、分别培养。混合后即使检出菌也无法追溯来源。",score:5,explanation:"",keyword:"交叉污染；一件一拭子；分别标记培养；无法溯源"},
      {id:33,qtype:"scenario",stem:"【场景】第三方机构受委托测新装修办公室甲醛。采样员到现场发现门窗大开、空调全开，仍按标准流程采了 20 L 气体。实验室报出\"甲醛合格\"。请分析该结果是否可靠，并说明正确采样条件。",options:[],answer:"不可靠。原因：甲醛采样应在房间按标准密闭（关闭门窗一定时段、停止通风）状态下进行；门窗大开、空调全开会把甲醛吹散稀释，导致\"假合格\"。正确：采样前按标准要求密闭房间、关闭新风/空调，达到平衡后再采样。",score:5,explanation:"",keyword:"不可靠；应密闭关闭通风；假合格；平衡后采样"}
    ]
  }
];

const CATEGORIES = ["法律法规", "专业知识"];
const SUBCATS = {
  "专业知识": ["理化检测", "检测技术", "微生物", "采样技术", "公司管理体系文件"]
};
const SCORING_MODES = { manual: "全手动阅卷", auto: "客观题自动算，主观题留白", keyword: "关键词自动匹配给分" };
const PAPER_MODES = { fixed: "固定试卷", random: "随机抽题", mixed: "混合（随机+题型覆盖）" };

// ====== 全局状态 ======
let state = {
  view: "home",
  candName: "",
  taskId: null,
  questions: [],
  answers: {},
  submitted: false,
  score: 0,
  passed: false
};

// ====== 工具函数 ======
function $(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function shuffle(arr) {
  let a = arr.slice(), i = a.length;
  while (i) { let j = Math.floor(Math.random() * i); [a[--i], a[j]] = [a[j], a[i]]; }
  return a;
}

function buildPaper(task) {
  if (task.paper_mode === "fixed") return task.questions.slice();
  let n = task.random_count || task.questions.length;
  if (task.paper_mode === "random") return shuffle(task.questions).slice(0, n);
  // mixed: 保证每种题型至少1道
  let byType = {};
  task.questions.forEach(q => { (byType[q.qtype] = byType[q.qtype] || []).push(q); });
  Object.keys(byType).forEach(k => { byType[k] = shuffle(byType[k]); });
  let picked = [];
  Object.keys(byType).forEach(k => { if (byType[k].length) picked.push(byType[k].shift()); });
  let rest = shuffle([].concat(...Object.values(byType)));
  while (picked.length < n && rest.length) picked.push(rest.shift());
  return picked.slice(0, n);
}

function calcScore(task, questions, answers) {
  let total = 0, auto = 0, manual = 0;
  questions.forEach(q => {
    total += q.score;
    let ua = answers[q.id] || "";
    if (q.qtype === "single" || q.qtype === "judge") {
      if (ua === q.answer) auto += q.score;
    } else if (q.qtype === "multi") {
      let ca = q.answer.split(",").sort().join(",");
      if (ua.split(",").sort().join(",") === ca) auto += q.score;
    } else {
      manual += q.score; // 主观题留白
    }
  });
  return { total, auto, manual, final: auto };
}

// ====== 渲染函数 ======
function render() {
  let html = "";
  switch (state.view) {
    case "home": html = renderHome(); break;
    case "exam": html = renderExam(); break;
    case "result": html = renderResult(); break;
  }
  $("app").innerHTML = html;
}

function renderHome() {
  let grouped = {};
  CATEGORIES.forEach(c => grouped[c] = []);
  TASKS.forEach(t => {
    let cat = t.category || "专业知识";
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(t);
  });

  let chips = SUBCATS["专业知识"].map(s =>
    `<button type="button" class="chip" data-sub="${esc(s)}" onclick="filterSub(this)">${esc(s)}</button>`
  ).join("");

  let modules = CATEGORIES.map(cat => {
    let cards = grouped[cat].map(t => `
      <div class="paper-card" data-cat="${esc(t.category)}" data-sub="${esc(t.subcategory || '通用')}">
        <div class="paper-name">${esc(t.name)}</div>
        <div class="paper-meta">${esc(SCORING_MODES[t.scoring_mode]||t.scoring_mode)} · ${esc(PAPER_MODES[t.paper_mode]||t.paper_mode)} · 合格线 ${t.pass_score} 分</div>
        <div class="paper-sub">分类：${esc(t.category)} / ${esc(t.subcategory || '通用')}</div>
        <button class="btn" onclick="startExam(${t.id})">开始考试</button>
      </div>
    `).join("") || `<p class="note">该模块暂无试卷。</p>`;
    let subFilter = cat === "专业知识" ? `<div class="chips"><button type="button" class="chip active" data-sub="all" onclick="filterSub(this)">全部</button>${chips}</div>` : "";
    return `
      <div class="module">
        <h2 class="module-title">${esc(cat)}</h2>
        ${subFilter}
        <div class="papers">${cards}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="card">
      <div class="brand">湖南绿盾卫士检测技术有限公司考试系统</div>
      <h1>考生端 · 在线考试</h1>
      <p class="note">请先填写姓名，再选择下方考试模块中的试卷开始。</p>
      <label>考生姓名</label>
      <input type="text" id="candName" placeholder="请输入姓名" value="${esc(state.candName)}">
      ${modules}
      <p class="note" style="margin-top:18px">单文件 HTML 版 · 数据存储在本地浏览器（LocalStorage）</p>
    </div>
  `;
}

function filterSub(btn) {
  let sub = btn.getAttribute("data-sub");
  btn.parentElement.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".paper-card").forEach(c => {
    c.style.display = (sub === "all" || c.getAttribute("data-sub") === sub) ? "" : "none";
  });
}

function startExam(taskId) {
  let nm = $("candName").value.trim();
  if (!nm) { alert("请先填写考生姓名"); return; }
  let task = TASKS.find(t => t.id === taskId);
  if (!task) { alert("试卷不存在"); return; }
  state.candName = nm;
  state.taskId = taskId;
  state.questions = buildPaper(task);
  state.answers = {};
  state.submitted = false;
  state.score = 0;
  state.passed = false;
  state.view = "exam";
  render();
}

function renderExam() {
  let task = TASKS.find(t => t.id === state.taskId);
  let totalScore = state.questions.reduce((s, q) => s + q.score, 0);
  let qHtml = state.questions.map((q, i) => {
    let opts = "";
    if (q.qtype === "single" || q.qtype === "judge") {
      opts = q.options.map(o => `
        <label class="opt"><input type="radio" name="q${q.id}" value="${o[0]}" onchange="setAnswer(${q.id},this.value)" ${state.answers[q.id]===o[0]?"checked":""}> ${esc(o)}</label>
      `).join("");
    } else if (q.qtype === "multi") {
      opts = q.options.map(o => `
        <label class="opt"><input type="checkbox" name="q${q.id}" value="${o[0]}" onchange="toggleMulti(${q.id},this)" ${state.answers[q.id]===o[0]?"checked":""}> ${esc(o)}</label>
      `).join("");
    } else {
      opts = `<textarea rows="4" style="width:100%" onchange="setAnswer(${q.id},this.value)">${esc(state.answers[q.id]||"")}</textarea>`;
    }
    return `
      <div class="q">
        <div class="stem">${i+1}. [${q.qtype==="single"?"单选":q.qtype==="multi"?"多选":q.qtype==="judge"?"判断":q.qtype==="short"?"简答":"场景"} ${q.score}分] ${esc(q.stem)}</div>
        ${opts}
      </div>
    `;
  }).join("");

  return `
    <div class="card">
      <div class="brand">湖南绿盾卫士检测技术有限公司考试系统</div>
      <h1>${esc(task.name)}</h1>
      <p class="note">考生：${esc(state.candName)} · 共 ${state.questions.length} 题 · 满分 ${totalScore} 分</p>
      ${qHtml}
      <div class="toolbar">
        <button class="btn" onclick="submitExam()">提交试卷</button>
        <button class="btn btn-ghost" onclick="backHome()">返回首页</button>
      </div>
    </div>
  `;
}

function setAnswer(qid, val) {
  state.answers[qid] = val;
}

function toggleMulti(qid, cb) {
  let arr = (state.answers[qid] || "").split(",").filter(x => x);
  if (cb.checked) {
    if (!arr.includes(cb.value)) arr.push(cb.value);
  } else {
    arr = arr.filter(x => x !== cb.value);
  }
  state.answers[qid] = arr.sort().join(",");
}

function submitExam() {
  let task = TASKS.find(t => t.id === state.taskId);
  let result = calcScore(task, state.questions, state.answers);
  state.score = result.final;
  state.passed = state.score >= task.pass_score;
  state.submitted = true;
  state.view = "result";
  saveRecord();
  render();
}

function renderResult() {
  let task = TASKS.find(t => t.id === state.taskId);
  let total = state.questions.reduce((s, q) => s + q.score, 0);
  let qHtml = state.questions.map((q, i) => {
    let ua = state.answers[q.id] || "";
    let ca = q.answer;
    let isObj = ["single","multi","judge"].includes(q.qtype);
    let ok = false;
    if (isObj) {
      if (q.qtype === "multi") {
        ok = ua.split(",").sort().join(",") === ca.split(",").sort().join(",");
      } else {
        ok = ua === ca;
      }
    }
    let badge = isObj ? (ok ? `<span class="score-badge ok">+${q.score}</span>` : `<span class="score-badge bad">0</span>`) : `<span class="score-badge">待阅</span>`;
    let uaText = q.qtype === "single" || q.qtype === "judge" ? ua : (q.qtype === "multi" ? ua : `<div class="ans-box">${esc(ua) || "（未作答）"}</div>`);
    let caText = q.qtype === "single" || q.qtype === "judge" || q.qtype === "multi" ? ca : `<div class="ans-box">${esc(ca)}</div>`;
    return `
      <div class="q">
        <div class="stem">${i+1}. ${esc(q.stem)} ${badge}</div>
        <p><b>你的答案：</b>${uaText}</p>
        <p><b>参考答案：</b>${caText}</p>
        ${q.explanation ? `<p class="note">${esc(q.explanation)}</p>` : ""}
      </div>
    `;
  }).join("");

  return `
    <div class="card">
      <div class="brand">湖南绿盾卫士检测技术有限公司考试系统</div>
      <h1>考试结果</h1>
      <p class="note">考生：${esc(state.candName)} · ${esc(task.name)} · <span class="${state.passed?'pass':'fail'}">${state.passed?'合格':'不合格'}</span></p>
      <p>得分：<strong>${state.score}</strong> / ${total} · 合格线：${task.pass_score}</p>
      ${qHtml}
      <div class="toolbar no-print">
        <button class="btn" onclick="window.print()">打印 / 存档</button>
        <button class="btn btn-ghost" onclick="backHome()">返回首页</button>
      </div>
    </div>
  `;
}

function backHome() {
  state.view = "home";
  state.taskId = null;
  state.questions = [];
  state.answers = {};
  state.submitted = false;
  render();
}

// ====== LocalStorage 记录 ======
function saveRecord() {
  let task = TASKS.find(t => t.id === state.taskId);
  let records = JSON.parse(localStorage.getItem("exam_records") || "[]");
  records.push({
    time: new Date().toISOString(),
    name: state.candName,
    task: task.name,
    score: state.score,
    passed: state.passed
  });
  localStorage.setItem("exam_records", JSON.stringify(records));
}

// ====== 初始化 ======
window.onload = render;
</script>
</body>
</html>
