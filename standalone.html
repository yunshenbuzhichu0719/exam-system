window.doStartPractice = function(typeId) {
  var qs;
  if (typeId === 'all') qs = questions.slice();
  else qs = questions.filter(function(q){ return q.qtype === typeId; });
  qs = qs.map(function(q){ return {id: q.id, qtype: q.qtype, stem: q.stem, options: q.options, answer: q.answer, score: q.score, explanation: q.explanation||'', keyword: q.keyword||''}; });
  for (var i = qs.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = qs[i]; qs[i] = qs[j]; qs[j] = t;
  }
  state.pQuestions = qs;
  state.pAnswers = {};
  state.pIdx = 0;
  state.pDone = false;
  state.pResults = null;
  state.view = "practice-exam";
  render();
};

// 刷题考试页面
function renderPracticeExam() {
  var qs = state.pQuestions;
  if (!qs || !qs.length) { state.view = "practice"; render(); return; }
  var q = qs[state.pIdx];
  var num = state.pIdx + 1;
  var total = qs.length;
  var answered = state.pAnswers[q.id] !== undefined;
  var qtypeLabel = {single:"单选题", multi:"多选题", judge:"判断题", short:"简答题", scenario:"场景题"};
  var typeColors = {single:"type-single", multi:"type-multi", judge:"type-judge", short:"type-short", scenario:"type-scenario"};

  var optsHtml = '';
  if (q.qtype === 'single' || q.qtype === 'judge') {
    optsHtml = q.options.map(function(o, oi) {
      var sel = state.pAnswers[q.id] === oi;
      return '<div class="option-item' + (sel ? ' selected' : '') + '" onclick="pSelect(' + q.id + ',\'' + q.qtype + '\',' + oi + ')">'
        + '<span class="opt-letter">' + (q.qtype==='judge' ? (oi===0?'对':'错') : String.fromCharCode(65+oi)) + '</span>'
        + '<span class="opt-text">' + esc(o) + '</span></div>';
    }).join('');
  } else if (q.qtype === 'multi') {
    var curAns = state.pAnswers[q.id] || [];
    optsHtml = q.options.map(function(o, oi) {
      var sel = curAns.indexOf(oi) >= 0;
      return '<div class="option-item' + (sel ? ' selected' : '') + '" onclick="pToggleMulti(' + q.id + ',' + oi + ')">'
        + '<input type="checkbox"' + (sel ? ' checked' : '') + ' style="margin-right:8px" disabled>'
        + '<span class="opt-letter" style="font-size:11px">' + String.fromCharCode(65+oi) + '</span>'
        + '<span class="opt-text">' + esc(o) + '</span></div>';
    }).join('');
  } else {
    optsHtml = '<div class="short-area"><textarea class="exam-textarea" placeholder="请输入答案..." id="p-textarea" oninput="pTextAns(' + q.id + ',this.value)">' + (typeof state.pAnswers[q.id]==='string' ? esc(state.pAnswers[q.id]) : '') + '</textarea></div>';
  }

  // 答题反馈
  var feedback = '';
  if (answered) {
    var correct = pCheckAns(q, state.pAnswers[q.id]);
    feedback = correct
      ? '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px;margin:12px 0;color:#1a8a4a;font-size:14px"><strong>✅ 回答正确！</strong></div>'
      : '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px;margin:12px 0;color:#c0392b;font-size:14px"><strong>❌ 回答错误</strong><div style="margin-top:4px">正确答案：' + esc(pGetCorrectStr(q)) + '</div></div>';
    if (q.explanation) {
      feedback += '<div style="background:#fff8e8;border:1px solid #e8d090;border-radius:8px;padding:14px;margin:12px 0;color:#7a5000;font-size:13px;line-height:1.6"><strong>📖 解析：</strong>' + esc(q.explanation) + '</div>';
    }
  }

  // 侧边栏题号
  var dots = qs.map(function(qq, i) {
    var ans = state.pAnswers[qq.id] !== undefined;
    var cur = i === state.pIdx ? ' current' : '';
    var done = ans ? ' answered' : '';
    return '<div class="q-dot' + cur + done + '" onclick="pGoto(' + i + ')">' + (i+1) + '</div>';
  }).join('');

  var answeredCount = Object.keys(state.pAnswers).length;
  var qTotal = state.questions.length;
  var pct = Math.round(answeredCount / qTotal * 100);

  return '<div class="page page-exam">'
    + '<div class="sidebar"><div class="card">'
    + '<div class="sidebar-title">刷题进度<span style="font-weight:400;font-size:12px;color:var(--text-light)"> 共' + qTotal + '题</span></div>'
    + '<div class="q-legend" style="margin-bottom:14px">'
    + '<span>已答 ' + answeredCount + '/' + qTotal + '</span>'
    + '<div class="progress-bar"><div class="fill" style="width:' + pct + '%"></div></div></div>'
    + '<div class="q-group-dots-practice">' + dots + '</div>'
    + '<div class="timer-box" style="margin-top:14px"><div class="timer-label">当前</div><div style="font-size:22px;font-weight:800;color:var(--primary)">' + num + '/' + qTotal + '</div></div>'
    + '</div></div>'
    + '<div class="exam-main">'
    + '<div class="question-card">'
    + '<span class="q-type ' + (typeColors[q.qtype] || '') + '">' + (qtypeLabel[q.qtype]||'未知') + '</span>'
    + '<span style="float:right;font-size:12px;color:var(--text-light)">第 ' + num + ' 题</span>'
    + '<div class="q-stem" style="margin-top:8px">' + esc(q.stem) + '</div>'
    + (q.qtype==='short'||q.qtype==='scenario' ? '' : '<div class="options">' + optsHtml + '</div>')
    + (q.qtype==='short'||q.qtype==='scenario' ? optsHtml : '')
    + feedback
    + '</div>'
    + '<div class="q-nav-bottom">'
    + (state.pIdx > 0 ? '<button class="btn btn-ghost" onclick="pPrev()">← 上一题</button>' : '')
    + (!answered ? '<button class="btn btn-primary" onclick="pSubmit()">提交答案</button>' : '')
    + (state.pIdx < total - 1 ? '<button class="btn btn-primary" onclick="pNext()">' + (answered ? '下一题 →' : '跳过') + '</button>' : '')
    + (answered && state.pIdx === total - 1 ? '<button class="btn btn-accent" onclick="pFinish()">📊 查看报告</button>' : '')
    + '</div></div></div>';
}

function pGetCorrectStr(q) {
  if (q.qtype === 'single') return String.fromCharCode(65 + parseInt(q.answer));
  if (q.qtype === 'judge') return q.answer;
  if (q.qtype === 'multi') return q.answer.split('').map(function(c){ return c.toUpperCase(); }).join('、');
  return q.answer;
}

function pCheckAns(q, ans) {
  if (q.qtype === 'single') return parseInt(ans) === parseInt(q.answer);
  if (q.qtype === 'judge') {
    var correctIdx = q.answer === '对' ? 0 : 1;
    return ans === correctIdx;
  }
  if (q.qtype === 'multi') {
    if (!Array.isArray(ans) || !q.answer) return false;
    var my = ans.slice().sort().join(',');
    var correct = q.answer.split('').map(function(c){ return c.toUpperCase(); }).sort().join(',');
    return my === correct;
  }
  if (q.qtype === 'short' || q.qtype === 'scenario') {
    if (typeof ans !== 'string' || !q.keyword) return false;
    var kws = q.keyword.split('；').filter(Boolean);
    var hits = kws.filter(function(k){ return ans.indexOf(k.trim()) >= 0; });
    return hits.length >= Math.ceil(kws.length * 0.5);
  }
  return false;
}

window.pToggleMulti = function(qid, oi) {
  if (!state.pAnswers[qid]) state.pAnswers[qid] = [];
  var arr = state.pAnswers[qid];
  var idx = arr.indexOf(oi);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(oi);
  render();
};

window.pSubmit = function() {
  var q = state.pQuestions[state.pIdx];
  if (state.pAnswers[q.id] === undefined) {
    showToast('请先选择或输入答案', 'info'); return;
  }
  render();
};

window.pGoto = function(idx) {
  state.pIdx = idx; render();
};

window.pPrev = function() {
  if (state.pIdx > 0) { state.pIdx--; render(); }
};

window.pNext = function() {
  if (state.pIdx < state.pQuestions.length - 1) {
    state.pIdx++; render();
  }
};

window.pFinish = function() {
  var qs = state.pQuestions;
  var results = qs.map(function(q) {
    var ans = state.pAnswers[q.id];
    var answered = ans !== undefined && ans !== '';
    if (!answered) return {q:q, correct:false, answered:false};
    return {q:q, correct:pCheckAns(q, ans), answered:true};
  });
  state.pResults = results;
  state.view = "practice-result";
  $("app").innerHTML = renderPracticeResult();
  window.scrollTo(0, 0);
};

function renderPracticeResult() {
  var results = state.pResults || [];
  var total = results.length;
  var correct = results.filter(function(r){ return r.correct; }).length;
  var wrong = results.filter(function(r){ return !r.correct && r.answered; }).length;
  var unanswered = results.filter(function(r){ return !r.answered; }).length;
  var pct = total > 0 ? Math.round(correct / total * 100) : 0;
  var pass = pct >= 80;
  var qtypeLabel = {single:"单选题", multi:"多选题", judge:"判断题", short:"简答题", scenario:"场景题"};

  var list = results.map(function(r, i) {
    return '<div class="q-list-item">'
      + '<div class="q-list-stem">' + (i+1) + '. [' + (qtypeLabel[r.q.qtype]||r.q.qtype) + '] ' + esc(r.q.stem) + '</div>'
      + '<div class="q-list-meta">'
      + '<span class="tag ' + (r.correct ? 'tag-right' : (r.answered ? 'tag-wrong' : 'tag-wait')) + '">'
      + (r.correct ? '✓ 正确' : (r.answered ? '✗ 错误' : '⏭ 未作答') ) + '</span></div>'
      + (r.q.explanation ? '<div style="font-size:12px;color:#7a5000;margin-top:6px;padding:8px;background:#fff8e8;border-radius:6px"><strong>📖 解析：</strong>' + esc(r.q.explanation) + '</div>' : '')
      + '</div>';
  }).join('');

  return '<div class="page page-result">'
    + '<div class="result-hero">'
    + '<div class="result-icon">' + (pass ? '🎉' : '💪') + '</div>'
    + '<h1>练习报告</h1>'
    + '<div class="result-score">' + correct + '/' + total + ' 题正确</div>'
    + '<div class="result-sub">正确率 ' + pct + '%' + (unanswered > 0 ? '（' + unanswered + ' 题未作答）' : '') + '</div>'
    + '</div>'
    + '<div class="card"><div class="card-title">成绩统计</div>'
    + '<div class="detail-stats">'
    + '<div class="detail-stat success"><div class="stat-num">' + correct + '</div><div class="stat-label">✅ 正确</div></div>'
    + '<div class="detail-stat danger"><div class="stat-num">' + wrong + '</div><div class="stat-label">❌ 错误</div></div>'
    + '<div class="detail-stat warn"><div class="stat-num">' + unanswered + '</div><div class="stat-label">⏭ 未答</div></div>'
    + '<div class="detail-stat' + (pass?' success':' danger') + '"><div class="stat-num">' + pct + '%</div><div class="stat-label">正确率</div></div>'
    + '</div></div>'
    + '<div class="card"><div class="card-title">逐题回顾</div>' + list + '</div>'
    + '<div class="result-actions">'
    + '<button class="btn btn-primary" onclick="backToHome()">返回首页</button>'
    + '<button class="btn btn-accent" onclick="doStartPractice(\'all\')">再来一次</button>'
    + '<button class="btn btn-ghost" onclick="state.view=\'practice\';render()">换范围</button>'
    + '</div>'
    + '<div class="footer">© 2026 湖南绿盾卫士检测技术有限公司</div></div>';
}

    + '<p style="color:var(--text-light);font-size:13px;margin-bottom:16px">\u4ee5\u4e0b\u4e3a\u7ba1\u7406\u5458\u4e0a\u4f20\u7684 PDF / WORD \u8d44\u6599\uff0c\u53ef\u5728\u7ebf\u9884\u89c8\u6216\u4e0b\u8f7d\u3002</p>'
    + '<div id="lib-file-list"><div style="text-align:center;padding:40px;color:var(--text-light)">\u23f3 \u52a0\u8f7d\u4e2d...</div></div>'
    + '</div>'
    + '<div class="footer">\u00a9 2026 \u6e56\u5357\u7eff\u76fe\u536b\u58eb\u68c0\u6d4b\u6280\u672f\u6709\u9650\u516c\u53f8</div></div>';
}

window.copyText = function(text) {
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){ showToast('\u5df2\u590d\u5236\u5230\u526a\u8d34\u677f', 'success'); }); }
  else { showToast('\u590d\u5236\u5185\u5bb9\uff1a' + text, 'info'); }
};

// ===== IndexedDB \u8d44\u6599\u5e93\u5b58\u50a8 =====
var LIB_DB_NAME = 'examLibraryDB';
var LIB_STORE = 'files';
function libOpenDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(LIB_DB_NAME, 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(LIB_STORE)) {
        db.createObjectStore(LIB_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}
function libGetAll() {
  return libOpenDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(LIB_STORE, 'readonly');
      var req = tx.objectStore(LIB_STORE).getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = function() { reject(req.error); };
    });
  });
}
function libPut(record) {
  return libOpenDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(LIB_STORE, 'readwrite');
      tx.objectStore(LIB_STORE).put(record);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}
function libDelete(id) {
  return libOpenDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(LIB_STORE, 'readwrite');
      tx.objectStore(LIB_STORE).delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}
function libClearAll() {
  return libOpenDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(LIB_STORE, 'readwrite');
      tx.objectStore(LIB_STORE).clear();
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}

// ===== \u5b66\u5458\u7aef\uff1a\u52a0\u8f7d\u3001\u9884\u89c8\u3001\u4e0b\u8f7d =====
window.loadLibraryFiles = function() {
  libGetAll().then(function(files) {
    var el = document.getElementById('lib-file-list');
    if (!el) return;
    if (!files.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-light)">\ud83d\udced \u6682\u65e0\u8d44\u6599\uff0c\u8bf7\u7ba1\u7406\u5458\u4e0a\u4f20</div>'; return; }
    files.sort(function(a,b){ return b.id - a.id; });
    el.innerHTML = files.map(function(f) {
      var icon = f.type === 'word' ? '\ud83d\udcdd' : '\ud83d\udcc4';
      var sizeStr = (f.size/1024/1024).toFixed(2) + ' MB';
      return '<div class="file-card">'
        + '<div class="file-icon">' + icon + '</div>'
        + '<div class="file-info"><div class="file-name">' + esc(f.name) + '</div>'
        + '<div class="file-meta">' + (f.desc ? esc(f.desc) + ' \u00b7 ' : '') + sizeStr + ' \u00b7 ' + esc(f.date) + '</div></div>'
        + '<div class="file-actions">'
        + (f.type === 'pdf' ? '<button class="btn btn-sm btn-sm-primary" onclick="libPreview(' + f.id + ')">\ud83d\udd0d \u9884\u89c8</button>' : '')
        + '<button class="btn btn-sm btn-sm-accent" onclick="libDownload(' + f.id + ')">\u2b07 \u4e0b\u8f7d</button>'
        + '</div></div>';
    }).join('');
  }).catch(function(e){
    var el = document.getElementById('lib-file-list');
    if (el) el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--danger)">\u52a0\u8f7d\u5931\u8d25\uff1a' + e + '</div>';
  });
};
window.libPreview = function(id) {
  libGetAll().then(function(files){
    var f = null; for (var i=0;i<files.length;i++){ if(files[i].id===id){f=files[i];break;} }
    if (!f) { showToast('\u6587\u4ef6\u4e0d\u5b58\u5728', 'error'); return; }
    var blob = f.blob instanceof Blob ? f.blob : new Blob([f.blob], { type: f.mime || 'application/pdf' });
    var url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(function(){ URL.revokeObjectURL(url); }, 60000);
  });
};
window.libDownload = function(id) {
  libGetAll().then(function(files){
    var f = null; for (var i=0;i<files.length;i++){ if(files[i].id===id){f=files[i];break;} }
    if (!f) { showToast('\u6587\u4ef6\u4e0d\u5b58\u5728', 'error'); return; }
    var blob = f.blob instanceof Blob ? f.blob : new Blob([f.blob], { type: f.mime || 'application/octet-stream' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = f.fileName || f.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  });
};

// ===== \u7ba1\u7406\u5458\u7aef\uff1a\u4e0a\u4f20\u901a\u9053 =====
function renderLibraryAdmin() {
  setTimeout(loadAdminLibFiles, 0);
  return '<div class="page">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">'
    + '<button class="btn btn-ghost btn-sm" onclick="state.view=\'library\';render()">\u2190 \u8fd4\u56de</button>'
    + '<span style="font-size:22px">\u2699</span>'
    + '<span style="font-size:18px;font-weight:700;color:var(--primary)">\u8d44\u6599\u5e93\u7ba1\u7406</span></div>'
    + '<div class="card"><div class="card-title">\ud83d\udce4 \u4e0a\u4f20\u8d44\u6599</div>'
    + '<p class="admin-hint">\u652f\u6301\u4e0a\u4f20 PDF\u3001WORD\uff08.doc / .docx\uff09\u6587\u6863\u3002\u6587\u4ef6\u4fdd\u5b58\u5728\u672c\u673a\u6d4f\u89c8\u5668\u4e2d\uff0c\u4f9b\u5b66\u5458\u5728\u7ebf\u9884\u89c8\u548c\u4e0b\u8f7d\u3002\u5355\u4e2a\u6587\u4ef6\u5efa\u8bae\u4e0d\u8d85\u8fc7 50MB\u3002</p>'
    + '<div class="admin-panel" style="gap:12px">'
    + '<div><label>\u9009\u62e9\u6587\u4ef6</label><input type="file" id="lib-file" accept=".pdf,.doc,.docx" onchange="onLibFileSelected()"></div>'
    + '<div><label>\u8d44\u6599\u540d\u79f0</label><input type="text" id="lib-name" placeholder="\u7559\u7a7a\u5219\u4f7f\u7528\u6587\u4ef6\u540d"></div>'
    + '<div><label>\u8bf4\u660e\uff08\u53ef\u9009\uff09</label><input type="text" id="lib-desc" placeholder="\u7b80\u8981\u8bf4\u660e"></div>'
    + '<button class="btn btn-primary" id="lib-upload-btn" onclick="doUploadLibFile()">\ud83d\udce4 \u4e0a\u4f20</button></div></div>'
    + '<div class="card"><div class="card-title">\ud83d\udcda \u5df2\u4e0a\u4f20\u8d44\u6599<button class="btn btn-sm btn-sm-danger" style="margin-left:auto" onclick="doClearLibrary()">\ud83d\uddd1 \u6e05\u7a7a\u5168\u90e8</button></div>'
    + '<div id="lib-admin-list"><div style="text-align:center;padding:30px;color:var(--text-light)">\u23f3 \u52a0\u8f7d\u4e2d...</div></div></div>'
    + '<div class="footer">\u00a9 2026 \u6e56\u5357\u7eff\u76fe\u536b\u58eb\u68c0\u6d4b\u6280\u672f\u6709\u9650\u516c\u53f8</div></div>';
}

window.onLibFileSelected = function() {
  var fi = document.getElementById('lib-file');
  var nameEl = document.getElementById('lib-name');
  if (fi && fi.files.length && nameEl && !nameEl.value.trim()) {
    nameEl.value = fi.files[0].name.replace(/\.(pdf|docx?)$/i, '');
  }
};
window.doUploadLibFile = function() {
  var fi = document.getElementById('lib-file');
  if (!fi || !fi.files.length) { showToast('\u8bf7\u9009\u62e9\u6587\u4ef6', 'error'); return; }
  var file = fi.files[0];
  var ext = (file.name.split('.').pop() || '').toLowerCase();
  if (['pdf','doc','docx'].indexOf(ext) === -1) { showToast('\u4ec5\u652f\u6301 PDF / WORD \u6587\u6863', 'error'); return; }
  if (file.size > 60 * 1024 * 1024) { showToast('\u6587\u4ef6\u8fc7\u5927\uff08\u8d85\u8fc7 60MB\uff09', 'error'); return; }
  var type = ext === 'pdf' ? 'pdf' : 'word';
  var name = (document.getElementById('lib-name') || {value:''}).value.trim() || file.name;
  var desc = (document.getElementById('lib-desc') || {value:''}).value.trim();
  var btn = document.getElementById('lib-upload-btn');
  if (btn) { btn.disabled = true; btn.textContent = '\u4e0a\u4f20\u4e2d...'; }
  var record = {
    id: Date.now(),
    name: name, desc: desc, type: type,
    fileName: file.name, mime: file.type || (type === 'pdf' ? 'application/pdf' : 'application/msword'),
    size: file.size, blob: file,
    date: new Date().toISOString().slice(0,10)
  };
  libPut(record).then(function() {
    showToast('\u8d44\u6599\u4e0a\u4f20\u6210\u529f', 'success');
    if (btn) { btn.disabled = false; btn.textContent = '\ud83d\udce4 \u4e0a\u4f20'; }
    fi.value = '';
    var n = document.getElementById('lib-name'); if (n) n.value = '';
    var d = document.getElementById('lib-desc'); if (d) d.value = '';
    loadAdminLibFiles();
  }).catch(function(e) {
    showToast('\u4e0a\u4f20\u5931\u8d25\uff1a' + e, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '\ud83d\udce4 \u4e0a\u4f20'; }
  });
};
window.loadAdminLibFiles = function() {
  libGetAll().then(function(files) {
    var el = document.getElementById('lib-admin-list');
    if (!el) return;
    if (!files.length) { el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-light)">\ud83d\udced \u6682\u65e0\u8d44\u6599</div>'; return; }
    files.sort(function(a,b){ return b.id - a.id; });
    el.innerHTML = files.map(function(f) {
      var icon = f.type === 'word' ? '\ud83d\udcdd' : '\ud83d\udcc4';
      var sizeStr = (f.size/1024/1024).toFixed(2) + ' MB';
      return '<div class="file-card">'
        + '<div class="file-icon">' + icon + '</div>'
        + '<div class="file-info"><div class="file-name">' + esc(f.name) + '</div>'
        + '<div class="file-meta">' + esc(f.fileName) + ' \u00b7 ' + sizeStr + ' \u00b7 ' + esc(f.date) + '</div></div>'
        + '<div class="file-actions">'
        + '<button class="btn btn-sm btn-sm-primary" onclick="' + (f.type === 'pdf' ? 'libPreview' : 'libDownload') + '(' + f.id + ')">\ud83d\udc41 \u67e5\u770b</button>'
        + '<button class="btn btn-sm btn-sm-danger" onclick="doDeleteLibFile(' + f.id + ')">\ud83d\uddd1 \u5220\u9664</button>'
        + '</div></div>';
    }).join('');
  });
};
window.doDeleteLibFile = function(id) {
  if (!confirm('\u786e\u8ba4\u5220\u9664\u6b64\u8d44\u6599\uff1f')) return;
  libDelete(id).then(function(){ showToast('\u5df2\u5220\u9664', 'success'); loadAdminLibFiles(); });
};
window.doClearLibrary = function() {
  if (!confirm('\u786e\u8ba4\u6e05\u7a7a\u5168\u90e8\u8d44\u6599\uff1f\u6b64\u64cd\u4f5c\u4e0d\u53ef\u6062\u590d\uff01')) return;
  libClearAll().then(function(){ showToast('\u8d44\u6599\u5e93\u5df2\u6e05\u7a7a', 'success'); loadAdminLibFiles(); });
};

function renderLibraryContent() {
  return '<div class="page">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">'
    + '<button class="btn btn-ghost btn-sm" onclick="state.view=\'library\';render()">\u2190 \u8fd4\u56de\u8d44\u6599\u5e93</button></div>'
    + '<div class="card"><div class="card-title">\u6587\u4ef6\u9884\u89c8</div><p style="color:var(--text-light)">\u8bf7\u5728\u8d44\u6599\u5e93\u5217\u8868\u4e2d\u9009\u62e9\u6587\u4ef6\u9884\u89c8\u6216\u4e0b\u8f7d\u3002</p></div>'
    + '<div class="footer">\u00a9 2026 \u6e56\u5357\u7eff\u76fe\u536b\u58eb\u68c0\u6d4b\u6280\u672f\u6709\u9650\u516c\u53f8</div></div>';
}

(function cleanupOldLibrary() {
  try { localStorage.removeItem('exam_library'); } catch(e) {}
