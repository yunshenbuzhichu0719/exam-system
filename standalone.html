<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>湖南绿盾卫士检测技术有限公司 - 在线考试系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a3a6b;--primary-light:#2a5aaa;--primary-dark:#0d2247;
  --accent:#c9a84c;--accent-light:#f0d080;--accent-dark:#a07830;
  --bg:#e8edf4;--card:#fff;--text:#1a1a2e;--text-light:#5a6a7a;
  --border:#d0d8e4;--success:#1a8a4a;--danger:#c0392b;--warn:#e67e22;
}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== 顶部导航 ===== */
.topbar{
  background:linear-gradient(135deg,#1a3a6b 0%,#0d2247 100%);color:#fff;
  padding:0 40px;height:64px;display:flex;align-items:center;
  box-shadow:0 2px 16px rgba(10,30,70,.35);position:sticky;top:0;z-index:100;
}
.topbar-logo{display:flex;align-items:center;gap:12px;flex:1}
.topbar-logo .shield{width:40px;height:40px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.topbar-logo .name{font-size:17px;font-weight:700;letter-spacing:.5px}
.topbar-logo .sub{font-size:11px;opacity:.7;letter-spacing:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-right .user-icon{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer}
.topbar-right .btn-bar{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);color:var(--accent-light);padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:background .2s}
.topbar-right .btn-bar:hover{background:rgba(201,168,76,.35)}

/* ===== 通用 ===== */
.page{padding:40px 20px;max-width:1200px;margin:0 auto;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:16px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:24px}
.card-title{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title::before{content:'';width:4px;height:22px;background:var(--accent);border-radius:2px}

/* ===== 通用组件 ===== */
.btn{border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 3px 12px rgba(26,58,107,.3)}
.btn-accent{background:linear-gradient(135deg,#c9a84c,#e0bc5a);color:#fff;box-shadow:0 3px 12px rgba(201,168,76,.35)}
.btn-ghost{background:#f1f4f8;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:#e8edf4}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
.btn-sm-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-sm-primary{background:#eef2ff;color:var(--primary-light);border:1px solid #c7d2fe}
.btn-sm-accent{background:#fff8e8;color:#b06000;border:1px solid #f0c040}
.footer{text-align:center;padding:28px 20px;font-size:12px;color:var(--text-light)}

/* ===== Toast ===== */
.toast{position:fixed;top:80px;right:20px;background:#fff;border-radius:12px;padding:14px 20px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:300;font-size:14px;display:none;animation:fadeUp .2s ease;min-width:200px}
.toast.show{display:block}
.toast.success{border-left:4px solid var(--success)}
.toast.error{border-left:4px solid var(--danger)}
.toast.info{border-left:4px solid var(--primary)}

/* ===== 模态弹窗 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:20px;padding:40px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;animation:fadeUp .25s ease}
.modal-box h3{font-size:20px;color:var(--primary);margin-bottom:6px}
.modal-box .modal-sub{font-size:13px;color:var(--text-light);margin-bottom:24px;line-height:1.6}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light);line-height:1}
.modal-close:hover{color:var(--text)}
.modal-actions{display:flex;gap:10px;justify-content:center;margin-top:20px}
.modal-row{display:flex;flex-direction:column;gap:16px}

/* ===== 表单字段 ===== */
.field{width:100%}
.field label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:block}
.field input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--primary-light)}
.field .hint{font-size:11px;color:var(--text-light);margin-top:4px}

/* ===== 验证码 ===== */
.captcha-row{display:flex;gap:10px;align-items:flex-end}
.captcha-row .field{flex:1}
.captcha-canvas{border-radius:10px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;height:46px;transition:border-color .2s}
.captcha-canvas:hover{border-color:var(--primary-light)}

/* ===== 登录页 ===== */
/* ===== 认证页（政府事业单位风格） ===== */
.auth-page-wrap{min-height:calc(100vh - 64px);display:flex;flex-direction:column}

/* 顶部机构栏 */
.auth-topbar{background:linear-gradient(135deg,#1a3a6b,#0d2247);height:56px;display:flex;align-items:center;padding:0 40px}
.auth-topbar-inner{max-width:1200px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.auth-topbar-logo{display:flex;align-items:center;gap:12px}
.auth-topbar-icon{width:38px;height:38px;background:rgba(201,168,76,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(201,168,76,.3)}
.auth-topbar-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px}
.auth-topbar-sub{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:1px}
.auth-page-footer{text-align:center;font-size:12px;color:var(--text-light);padding:18px 20px;letter-spacing:.5px;border-top:1px solid var(--border);background:#fff}
/* 主内容 */
.auth-main{display:flex;flex:1;max-width:1200px;width:100%;margin:0 auto;padding:40px;gap:60px;align-items:stretch}

/* 左侧品牌区 */
.auth-brand{flex:1;display:flex;align-items:center;background:linear-gradient(160deg,#1a3a6b 0%,#0d2247 60%,#1a3a8a 100%);border-radius:20px;padding:44px;position:relative;overflow:hidden;min-height:460px}
.auth-brand::before{content:'';position:absolute;right:-40px;bottom:-40px;width:200px;height:200px;background:rgba(201,168,76,.1);border-radius:50%}
.auth-brand::after{content:'';position:absolute;left:-30px;top:-30px;width:160px;height:160px;background:rgba(201,168,76,.07);border-radius:50%}
.auth-brand-inner{position:relative;z-index:1}
.auth-brand-logo{font-size:52px;margin-bottom:20px}
.auth-brand-title{font-size:26px;font-weight:900;color:#fff;line-height:1.35;margin-bottom:16px;letter-spacing:1px}
.auth-brand-desc{font-size:14px;color:rgba(255,255,255,.7);line-height:1.8;margin-bottom:32px}
.auth-brand-features{display:flex;flex-direction:column;gap:14px}
.auth-brand-feat{display:flex;align-items:flex-start;gap:14px;background:rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;border:1px solid rgba(255,255,255,.1)}
.auth-brand-feat-icon{font-size:24px;flex-shrink:0}
.auth-brand-feat-t{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.auth-brand-feat-d{font-size:12px;color:rgba(255,255,255,.6);line-height:1.5}

/* 右侧表单区 */
.auth-form-area{flex:1;max-width:420px;display:flex;flex-direction:column}
.auth-form-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:0}
.auth-form-tab{flex:1;text-align:center;padding:14px;font-size:15px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;letter-spacing:.5px}
.auth-form-tab.active{color:var(--primary);border-bottom-color:var(--accent)}
.auth-form-tab:hover:not(.active){color:var(--text)}
.auth-form-wrap{background:var(--card);border-radius:0 0 20px 20px;padding:30px 34px;border:1px solid var(--border);border-top:none;box-shadow:0 4px 20px rgba(0,0,0,.07);flex:1}

.auth-form{display:none;flex-direction:column;gap:14px}
.auth-form.active{display:flex}

/* 表单行 */
.af-row{display:flex;align-items:flex-start;gap:0}
.af-icon{width:36px;height:36px;background:#f0f4ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:26px;border:1px solid #dde4ff}
.af-field{flex:1;padding-left:12px}
.af-label{font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:6px;padding-left:4px;letter-spacing:.5px}
.af-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;background:#fff}
.af-input:focus{border-color:var(--primary-light);background:#f8faff}
.af-pw-wrap{position:relative}
.af-pw-wrap .af-input{padding-right:42px}
.af-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-light);padding:4px}
.af-captcha-row{display:flex;gap:8px;align-items:flex-end}
.af-cap-in{flex:1}
.af-canvas{border-radius:8px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;height:44px;background:#f8faff;transition:border-color .2s}
.af-canvas:hover{border-color:var(--primary-light)}
.af-sms-btn{background:#fff;border:1.5px solid var(--primary);color:var(--primary);padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.af-sms-btn:hover{background:var(--primary);color:#fff}
.af-hint{font-size:11px;color:var(--text-light);margin-top:5px;line-height:1.5}
.af-submit-btn{width:100%;padding:13px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,#1a3a6b,#1a5a9a);border:none;border-radius:10px;cursor:pointer;letter-spacing:2px;margin-top:4px;transition:opacity .2s,transform .15s;box-shadow:0 4px 14px rgba(26,58,107,.3)}
.af-submit-btn:hover{opacity:.88;transform:translateY(-1px)}
.af-reg-btn{background:linear-gradient(135deg,#c9a84c,#e0bc5a);box-shadow:0 4px 14px rgba(201,168,76,.3)}
.af-links{text-align:center;margin-top:10px;display:flex;justify-content:center;gap:8px;align-items:center}
.af-link-sep{color:var(--border);font-size:12px}
.af-link-primary{font-size:13px;color:var(--primary);font-weight:600;text-decoration:none;cursor:pointer}
.af-link-primary:hover{text-decoration:underline}
.af-link-ghost{font-size:13px;color:var(--text-light);text-decoration:none;cursor:pointer}
.af-link-ghost:hover{color:var(--text)}

@media(max-width:900px){
  .auth-brand{display:none}
  .auth-main{padding:20px 16px;gap:0}
  .auth-form-area{max-width:100%;width:100%}
  .auth-topbar{padding:0 16px}
}
@media(max-width:480px){
  .auth-form-wrap{padding:24px 20px}
}

/* ===== 首页 Hero ===== */
.hero{background:linear-gradient(135deg,#1a3a6b 0%,#1a5a9a 50%,#0d2247 100%);border-radius:20px;padding:56px 50px;margin-bottom:36px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;background:rgba(201,168,76,.12);border-radius:50%}
.hero-text{position:relative;z-index:1}
.hero-text h1{font-size:30px;font-weight:700;color:#fff;margin-bottom:10px}
.hero-text p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.7;max-width:480px}
.hero-badge{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);border-radius:16px;padding:16px 24px;text-align:center;color:var(--accent-light);position:relative;z-index:1}
.hero-badge .num{font-size:36px;font-weight:800;display:block;color:#fff}

/* ===== 试卷选择 ===== */
.paper-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.paper-card{border:2px solid var(--border);border-radius:16px;padding:22px;transition:all .2s;cursor:pointer;background:var(--card)}
.paper-card:hover{border-color:var(--primary-light);box-shadow:0 6px 24px rgba(26,58,107,.12);transform:translateY(-2px)}
.paper-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.paper-title{font-size:15px;font-weight:700;line-height:1.4}
.paper-tag{background:#eef2ff;color:var(--primary-light);border-radius:8px;padding:3px 10px;font-size:12px;flex-shrink:0;margin-left:10px}
.paper-desc{font-size:13px;color:var(--text-light);line-height:1.5;margin-bottom:14px}
.paper-meta{display:flex;gap:14px;font-size:12px;color:var(--text-light);margin-bottom:18px;flex-wrap:wrap}
.paper-meta span{display:flex;align-items:center;gap:4px}
.paper-meta .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0}
.paper-btn{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:10px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.paper-btn:hover{opacity:.88}

/* ===== 考试页面 ===== */
.page-exam{display:flex;gap:22px;max-width:1280px;margin:0 auto;padding:24px 20px;align-items:flex-start}
.sidebar{width:210px;flex-shrink:0;position:sticky;top:80px}
.sidebar .card{padding:18px}
.sidebar-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:14px}
.q-nav{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}
.q-dot{width:34px;height:34px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-light);cursor:pointer;transition:all .15s}
.q-dot.answered{border-color:var(--primary-light);background:#eef2ff;color:var(--primary-light)}
.q-dot.current{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,168,76,.4)}
.q-legend{display:flex;flex-direction:column;gap:7px;font-size:11px;color:var(--text-light)}
.timer-box{background:#fff8e8;border:1px solid #e8d090;border-radius:12px;padding:12px;margin-top:14px;text-align:center}
.timer-label{font-size:11px;color:var(--warn);font-weight:600;margin-bottom:3px}
.timer-num{font-size:26px;font-weight:800;color:var(--warn);font-variant-numeric:tabular-nums}
.exam-main{flex:1;min-width:0}
.exam-header{background:var(--card);border-radius:16px;padding:22px 26px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.exam-header h2{font-size:17px;color:var(--primary)}
.exam-info{display:flex;gap:18px;font-size:13px;color:var(--text-light)}
.exam-info strong{color:var(--text)}
.progress-bar{width:100%;height:5px;background:#e8edf4;border-radius:3px;overflow:hidden;margin-top:3px}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary-light));border-radius:3px;transition:width .4s}
.question-card{background:var(--card);border-radius:16px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px}
.q-type{display:inline-block;border-radius:6px;padding:3px 12px;font-size:12px;font-weight:700;margin-bottom:14px;letter-spacing:.5px}
.q-stem{font-size:15px;line-height:1.7;font-weight:600;margin-bottom:18px}
.options{list-style:none;display:flex;flex-direction:column;gap:9px}
.option-item{display:flex;align-items:center;gap:13px;padding:12px 16px;border:2px solid var(--border);border-radius:11px;cursor:pointer;transition:border-color .15s,background .15s}
.option-item:hover{border-color:var(--primary-light);background:#f5f7ff}
.option-item.selected{border-color:var(--primary);background:#eef2ff}
.opt-letter{width:30px;height:30px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s}
.opt-text{flex:1;font-size:14px;line-height:1.4}
.short-area textarea{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:11px;font-size:14px;line-height:1.6;resize:vertical;min-height:110px;font-family:inherit;outline:none;transition:border-color .2s}
.short-area textarea:focus{border-color:var(--primary-light)}
.q-nav-bottom{display:flex;gap:10px;flex-wrap:wrap}
.unanswered-alert{background:#fef3cd;border:1px solid #f0c040;color:#7a5000;border-radius:11px;padding:14px 18px;margin-bottom:16px;font-size:13px}

/* ===== 结果页 ===== */
.page-result{max-width:960px;margin:0 auto;padding:40px 20px}
.result-hero{text-align:center;padding:56px 40px;background:linear-gradient(135deg,#1a3a6b,#0d2247);border-radius:24px;margin-bottom:36px;position:relative;overflow:hidden}
.result-hero::before{content:'✓';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:200px;color:rgba(201,168,76,.08);line-height:1}
.result-icon{width:76px;height:76px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px;position:relative}
.result-hero h1{font-size:34px;color:#fff;margin-bottom:10px;position:relative}
.result-score{font-size:68px;font-weight:900;color:var(--accent-light);margin-bottom:6px;position:relative}
.result-sub{font-size:15px;color:rgba(255,255,255,.65);position:relative}
.cert-box{background:var(--card);border-radius:20px;border:2px solid var(--accent);padding:44px 56px;text-align:center;margin-bottom:30px;position:relative}
.cert-box::before,.cert-box::after{content:'★';position:absolute;top:18px;font-size:18px;color:var(--accent)}
.cert-box::before{left:28px}.cert-box::after{right:28px}
.cert-title{font-size:12px;letter-spacing:7px;color:var(--text-light);margin-bottom:6px}
.cert-company{font-size:22px;font-weight:900;color:var(--primary);margin-bottom:22px;letter-spacing:2px}
.cert-line{border-top:1px dashed var(--border);margin:22px 0}
.cert-name{font-size:20px;font-weight:700;margin:14px 0;letter-spacing:4px}
.cert-score{font-size:44px;font-weight:900;color:var(--accent);margin:14px 0}
.cert-status{display:inline-block;font-size:18px;font-weight:800;padding:7px 28px;border-radius:30px;margin-top:10px}
.cert-status.pass{background:#f0fdf4;color:var(--success);border:2px solid var(--success)}
.cert-status.fail{background:#fef2f2;color:var(--danger);border:2px solid var(--danger)}
.cert-date{font-size:13px;color:var(--text-light);margin-top:18px}
.cert-id{font-size:12px;color:#b0bec5;margin-top:5px;font-family:monospace}
.result-detail{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:30px}
.result-detail-header{background:#f5f7ff;padding:18px 26px;font-size:15px;font-weight:700;color:var(--primary);border-bottom:1px solid var(--border)}
.result-detail-body{padding:22px 26px}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.detail-stat{text-align:center;padding:18px;border-radius:12px;border:1px solid var(--border)}
.detail-stat .stat-num{font-size:26px;font-weight:800;color:var(--primary)}
.detail-stat .stat-label{font-size:12px;color:var(--text-light);margin-top:3px}
.detail-stat.success{background:#f0fdf4;border-color:#bbf7d0}
.detail-stat.success .stat-num{color:var(--success)}
.detail-stat.danger{background:#fef2f2;border-color:#fecaca}
.detail-stat.danger .stat-num{color:var(--danger)}
.detail-stat.warn{background:#fff8e8;border-color:#e8d090}
.detail-stat.warn .stat-num{color:var(--warn)}
.q-list-item{border:1px solid var(--border);border-radius:11px;padding:18px;margin-bottom:10px}
.q-list-item .q-list-stem{font-size:14px;font-weight:600;margin-bottom:10px}
.tag{padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600}
.tag-right{background:#f0fdf4;color:var(--success)}
.tag-wrong{background:#fef2f2;color:var(--danger)}
.tag-wait{background:#fff8e8;color:var(--warn)}
.tag-manual{background:#f0f4ff;color:var(--primary-light)}
.q-list-meta{display:flex;gap:14px;font-size:12px;color:var(--text-light);flex-wrap:wrap}
.result-actions{display:flex;gap:14px;justify-content:center;margin-top:28px;flex-wrap:wrap}

/* ===== 管理员面板 ===== */
.admin-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px}
.admin-tab{padding:11px 26px;font-size:14px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.admin-tab.active{color:var(--primary);border-bottom-color:var(--accent)}
.admin-hint{font-size:12px;color:var(--text-light);background:#f5f7ff;border-radius:8px;padding:10px 14px;line-height:1.6;margin-bottom:16px}
.admin-hint code{background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:11px;font-family:monospace}
.stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.stat-item{flex:1;min-width:140px;background:#f5f7ff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;text-align:center}
.stat-item .si-num{font-size:28px;font-weight:800;color:var(--primary)}
.stat-item .si-label{font-size:12px;color:var(--text-light);margin-top:3px}
.admin-panel{display:flex;flex-direction:column;gap:12px}
.admin-panel label{font-size:13px;font-weight:600;color:var(--text)}
.admin-panel input,.admin-panel textarea,.admin-panel select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.admin-panel input:focus,.admin-panel textarea:focus,.admin-panel select:focus{border-color:var(--primary-light)}
.admin-panel textarea{resize:vertical;min-height:240px;line-height:1.5}
.q-table{width:100%;border-collapse:collapse;font-size:13px}
.q-table th,.q-table td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.q-table th{background:#f5f7ff;font-weight:700;color:var(--primary)}
.q-table tr:hover td{background:#f9faff}
.type-badge{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700}
.type-single{background:#eef2ff;color:#1a5a9a}
.type-multi{background:#f3efff;color:#6b3fa0}
.type-judge{background:#f0fdf4;color:#1a8a4a}
.type-short{background:#fff8e8;color:#b06000}
.type-scenario{background:#fef2f2;color:#8a1a4a}

/* 打印考核卷 */
.print-toolbar{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.print-toolbar label{font-size:13px;color:var(--text-light}
.print-toolbar input,.print-toolbar select{padding:8px 14px;border:2px solid var(--border);border-radius:10px;font-size:13px;outline:none}
.print-toolbar input:focus,.print-toolbar select:focus{border-color:var(--primary-light)}
.print-preview{background:#888;padding:24px;min-height:400px;border-radius:12px}
.print-area{background:#fff;padding:28px 32px;font-size:13px;line-height:1.5;color:#000;max-width:210mm;margin:0 auto}
.print-area .print-header{text-align:center;border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:16px}
.print-area .print-header h1{font-size:18px;font-weight:900;letter-spacing:2px;margin-bottom:4px}
.print-area .info-row{display:flex;gap:20px;margin-bottom:16px;font-size:13px}
.print-area .info-row input{border:none;border-bottom:1px solid #000;padding:2px 4px;width:80px;font-size:13px;outline:none}
.print-area .info-row input.wide{width:120px}
.print-area table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.print-area table th,.print-area table td{border:1px solid #555;padding:5px 7px;vertical-align:top;line-height:1.4}
.print-area table th{background:#f0f0f0;font-weight:700;text-align:center}
.print-area table td.num{text-align:center;width:22px}
.print-area table td.opt-col{width:20px;text-align:center}
.print-area table .q-text{font-weight:600}
.print-area .section-title{font-size:13px;font-weight:800;background:#f0f0f0;padding:4px 8px;margin-top:8px;margin-bottom:3px}
.print-area .answer-line{border-bottom:1px solid #555;height:16px;margin-top:4px}
.print-area .page-break{page-break-after:always}

/* 密码强度指示器 */
.pw-strength{margin-top:4px;display:flex;gap:4px;align-items:center}
.pw-strength-bar{height:4px;flex:1;border-radius:2px;background:#e8edf4;overflow:hidden}
.pw-strength-bar span{display:block;height:100%;transition:width .3s}
.pw-strength-label{font-size:11px;color:var(--text-light);margin-top:3px}

/* 密码眼睛 */
.input-wrap{position:relative}
.input-wrap input{padding-right:42px}
.input-wrap .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-light);padding:0}

/* ===== 响应式 ===== */
@media(max-width:900px){
  .page-exam{flex-direction:column}
  .sidebar{width:100%;position:static}
  .q-nav{grid-template-columns:repeat(10,1fr)}
  .hero{flex-direction:column;text-align:center;padding:36px 28px;gap:22px}
  .detail-stats{grid-template-columns:repeat(2,1fr)}
  .cert-box{padding:30px 22px}
}
@media(max-width:600px){
  .topbar{padding:0 14px}
  .topbar-right .user-icon,.topbar-right .btn-bar .admin-label{display:none}
  .paper-grid{grid-template-columns:1fr}
  .auth-container{padding:32px 24px}
}
@media print{
  body{background:#fff}
  .topbar,.page-exam,.page-result,.no-print,.sidebar,.print-toolbar,.footer,.modal-overlay,.auth-page,.hero,.card:not(.print-card){display:none!important}
  .page-result{max-width:100%;padding:0}
  .print-area{display:block!important}
  .print-area{font-size:12px;padding:1.2cm 1.5cm;max-width:100%}
  @page{size:A4;margin:1.2cm 1.5cm}
}

<script>
// ===== 默认题库 =====

  {id:1,qtype:"single",stem:"GB/T 18204 标准族共有几个部分？",options:["A. 3 个","B. 5 个","C. 6 个","D. 8 个"],answer:"C",score:2,explanation:"分为物理性、化学性、空气微生物、公共用品用具微生物、集中空调、卫生监测规范 6 部分。"},

  {id:4,qtype:"single",stem:"甲醛采样最常用的方法是？",options:["A. 酚试剂分光光度法","B. 重量法","C. 撞击法","D. 沉降法"],answer:"A",score:2,explanation:"酚试剂（MBTH）分光光度法最常用。"},
  {id:5,qtype:"single",stem:"PM2.5\"重量法\"的核心步骤是？",options:["A. 用激光数颗粒","B. 滤膜采样后恒温恒湿称重差重","C. 直接读仪器","D. 培养菌落"],answer:"B",score:2,explanation:"滤膜采集后称重，差重算浓度。"},
  {id:6,qtype:"single",stem:"空气细菌总数\"自然沉降法\"是指？",options:["A. 用机器把空气吹到平皿上","B. 把平皿打开让菌自然落下","C. 用拭子擦空气","D. 过滤空气"],answer:"B",score:2,explanation:"平皿暴露让微生物自然沉降。"},
  {id:7,qtype:"single",stem:"公共用品用具微生物采样，一件毛巾应？",options:["A. 用一支拭子擦所有毛巾","B. 一件用品用一支拭子，固定面积涂抹","C. 直接剪碎培养","D. 用嘴吹一下"],answer:"B",score:2,explanation:"一件一拭子，防止交叉污染。"},
  {id:8,qtype:"single",stem:"集中空调冷却水中需在生物安全柜操作的致病微生物是？",options:["A. 大肠杆菌","B. 金黄色葡萄球菌","C. 嗜肺军团菌","D. 真菌"],answer:"C",score:2,explanation:"军团菌致病且存在气溶胶风险，需生物安全柜操作。"},
  {id:9,qtype:"single",stem:"根据监测技术规范，布点一般按？",options:["A. 只在门口布点","B. 每 50~100 m² 设 1 个点，均匀布设","C. 随机 1 个点","D. 只在污染源旁"],answer:"B",score:2,explanation:"按面积均匀布点，保证代表性。"},
  {id:10,qtype:"single",stem:"质控\"现场空白\"的作用是证明？",options:["A. 采样员手不抖","B. 吸收液/滤膜本身没被污染","C. 仪器很准","D. 数据好看"],answer:"B",score:2,explanation:"现场空白证\"锅干净\"。"},
  {id:11,qtype:"multi",stem:"下列哪些属于 GB/T 18204.1 物理性指标？",options:["A. 照度","B. 噪声","C. 甲醛","D. 新风量","E. 大气压"],answer:"A,B,D,E",score:3,explanation:"甲醛属化学性指标。"},
  {id:12,qtype:"multi",stem:"化学性指标采样时，下列哪些做法正确？",options:["A. 甲醛样品避光、24h内分析","B. 臭氧样品全程避光、即采即测","C. 苯系物活性炭管进气方向接反无所谓","D. 采样流量和体积要准确记录","E. 滤膜用手直接拿取"],answer:"A,B,D",score:3},
  {id:13,qtype:"multi",stem:"空气微生物采样质控应包括？",options:["A. 培养基空白","B. 平行采样取平均","C. 开盖时间越长越好","D. 无菌操作"],answer:"A,B,D",score:3},
  {id:14,qtype:"multi",stem:"公共用品用具微生物检测项目通常包括？",options:["A. 细菌总数","B. 大肠菌群","C. 金黄色葡萄球菌","D. 真菌总数"],answer:"A,B,C,D",score:3},
  {id:15,qtype:"multi",stem:"通用质控\"四件套\"包括？",options:["A. 现场空白","B. 运输空白","C. 平行样","D. 加标回收","E. 随意修改数据"],answer:"A,B,C,D",score:3},
  {id:16,qtype:"judge",stem:"GB/T 18204.2 是空气微生物指标的测定方法。",options:["对","错"],answer:"错",score:2,explanation:"第2部分是化学性指标；空气微生物是第3部分。"},
  {id:17,qtype:"judge",stem:"测照度前，探头应遮光清零，且人不要挡住光路。",options:["对","错"],answer:"对",score:2},

  {id:19,qtype:"judge",stem:"甲醛吸收液采样时，应保证气泡连续均匀，不能让液体被吸走。",options:["对","错"],answer:"对",score:2},
  {id:20,qtype:"judge",stem:"空气细菌总数\"撞击法\"是用机器把空气高速撞到培养皿上。",options:["对","错"],answer:"对",score:2},
  {id:21,qtype:"judge",stem:"沉降法平皿暴露时间越长结果越准，可以暴露 1 小时。",options:["对","错"],answer:"错",score:2},
  {id:22,qtype:"judge",stem:"公共用品采样时，一支棉拭子可以连续擦拭多件不同用品以提高效率。",options:["对","错"],answer:"错",score:2},
  {id:23,qtype:"judge",stem:"嗜肺军团菌检测存在生物危害，应在生物安全柜内操作。",options:["对","错"],answer:"对",score:2},
  {id:24,qtype:"judge",stem:"监测布点应在场所正常营业/使用状态下进行，不能在空场造假。",options:["对","错"],answer:"对",score:2},
  {id:25,qtype:"judge",stem:"平行样是为了证明\"仪器很准\"，空白样是为了证明\"手不抖\"。",options:["对","错"],answer:"错",score:2},
  {id:26,qtype:"short",stem:"简述室内空气\"新风量\"的采样原理和关键注意事项。",options:[],answer:"原理：用示踪气体（如CO₂）在密闭有人房间测浓度衰减/释放，结合房间体积与人数算新风量。注意：在正常使用、门窗正常关闭状态测；房间先密闭平衡；记录体积、人数、门窗状态；重复2~3次取平均。",score:6,keyword:"示踪气体；密闭平衡；记录体积人数"},
  {id:27,qtype:"short",stem:"甲醛采样-检测全流程中，列举至少 3 个易出错点和对应正确做法。",options:[],answer:"①吸收管未垂直/气泡不均→液体被吸走；②未避光/超24h才分析→甲醛分解；③显色温度时间不准→严格控温计时；④采样前房间未按要求密闭→先密闭再采。",score:6,keyword:"垂直气泡；避光24h；控温计时；先密闭"},
  {id:28,qtype:"short",stem:"什么是\"空气细菌总数\"的撞击法和自然沉降法？各适用于什么场景？",options:[],answer:"撞击法：用采样器将空气高速撞击到培养皿上捕菌，速度快、定量好，适合精确监测。自然沉降法：平皿打开暴露一定时间，靠重力落菌，操作简便，适合快速筛查。",score:6,keyword:"撞击法定量精确；沉降法简便筛查"},
  {id:29,qtype:"short",stem:"公共用品用具微生物采样\"涂抹法\"的操作要点是什么？",options:[],answer:"无菌生理盐水湿润棉拭子；在用品表面固定面积（如5×5cm²）内来回均匀涂抹；剪去手触部分放入采样液；一件一拭子、标记清楚；尽快4℃冷藏送检。",score:6,keyword:"无菌；固定面积；一件一拭子；标记；冷藏"},
  {id:30,qtype:"short",stem:"集中空调通风系统卫生监测包含哪几类主要检测内容？为什么军团菌检测要特别小心？",options:[],answer:"内容：送风中细菌/真菌总数、送风中PM10、风管内表面积尘量、风管内表面微生物、冷却水嗜肺军团菌。原因：军团菌致病、可随气溶胶吸入，且操作有生物危害，须生物安全柜防护。",score:6,keyword:"送风微生物；PM10；积尘；军团菌；生物安全柜"},
  {id:31,qtype:"scenario",stem:"【场景】某检测员在商场测风速，站在风速计正前方读数，得到 0.05 m/s。请指出问题，并说明正确做法和可能造成的后果。",options:[],answer:"问题：人站在正前方会遮挡风流、制造乱流，测得的是\"人的影子\"而非真实风速。正确：采样员退到仪器下风向0.5m外，探头迎风。后果：读数偏低，数据不可靠。",score:5,keyword:"遮挡风流；退到下风向0.5m外"},
  {id:32,qtype:"scenario",stem:"【场景】某宾馆杯具监测，采样员用同一支无菌棉拭子依次擦拭了 8 个茶杯内侧，混合后送检。请评价该操作，并给出规范做法。",options:[],answer:"问题：一支拭子擦多件用品会造成交叉污染，且无法定位哪件不合格。规范：一件用品一支无菌拭子，固定面积涂抹，分别标记、分别培养。",score:5,keyword:"交叉污染；一件一拭子；分别标记培养"},
  {id:33,qtype:"scenario",stem:"【场景】测新装修办公室甲醛，采样时门窗大开、空调全开，实验室报出\"甲醛合格\"。请分析该结果是否可靠，并说明正确采样条件。",options:[],answer:"不可靠。甲醛采样应在房间密闭（关闭门窗一定时段、停止通风）状态下进行；门窗大开、空调全开会稀释甲醛，导致\"假合格\"。正确：采样前按标准要求密闭房间、关闭新风/空调，达到平衡后再采样。",score:5,keyword:"不可靠；应密闭；假合格"}

function $ (id) { return document.getElementById(id); }

// ===== 验证码系统 =====
const CAPTCHA_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

function generateCaptcha() {
  let ops = [], code = "";
  for (let i = 0; i < 4; i++) {
    let n = Math.floor(Math.random() * 10);
    ops.push({ label: `${n} + ? = ${n + Math.floor(Math.random()*5+1)}`, answer: Math.floor(Math.random()*5+1) });
    code += n;
  }
  currentCaptcha = { code, ops, index: 0, answer: null };
  return ops;
}

function getCaptchaQ() {
  if (!currentCaptcha.ops.length) generateCaptcha();
  return currentCaptcha.ops[currentCaptcha.index % currentCaptcha.ops.length];
}

function renderCaptchaCanvas(canvas) {
  if (!canvas) return;
  let ctx = canvas.getContext("2d");
  let W = canvas.width = 140;
  let H = canvas.height = 46;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "#eef2ff";
  ctx.fillRect(0, 0, W, H);
  // 干扰线
  for (let i = 0; i < 4; i++) {
    ctx.strokeStyle = "rgba(26,58,107," + (0.1 + Math.random()*0.15) + ")";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(Math.random()*W, Math.random()*H);
    ctx.lineTo(Math.random()*W, Math.random()*H);
    ctx.stroke();
  }
  // 噪点
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = "rgba(26,58,107,0.15)";
    ctx.fillRect(Math.random()*W, Math.random()*H, 2, 2);
  }
  let q = getCaptchaQ();
  ctx.fillStyle = "#1a3a6b";
  ctx.font = "bold 13px PingFang SC, Microsoft YaHei";
  ctx.textAlign = "center";
  ctx.fillText(q.label, W/2, H/2 + 5);
  // 重绘按钮
  let bx = W - 30, by = H/2 - 12;
  ctx.fillStyle = "transparent";
  ctx.strokeStyle = "#1a3a6b";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx, by, 24, 24);
  ctx.fillStyle = "#1a3a6b";
  ctx.font = "10px sans-serif";
  ctx.fillText("↻", bx+12, by+15);
}

// ===== 密码工具 =====
function hashPin(pin) {
  // 简单哈希，用于存储（本地存储，非高安全场景）
  let h = 5381;
  for (let i = 0; i < pin.length; i++) h = ((h << 5) + h) + pin.charCodeAt(i);
  return h.toString(36);
}

function checkPinStrength(pin) {
  let score = 0;
  if (pin.length >= 6) score++;
  if (/\d/.test(pin)) score++;
  if (/[A-Za-z]/.test(pin)) score++;
  if (/[^A-Za-z0-9]/.test(pin)) score++;
  if (pin.length >= 10) score++;
  return score;
}

function switchAuthTab(tab) {
  state.authTab = tab;
  ["login","register","forgot"].forEach(t => {
    document.getElementById("form-"+t).classList.toggle("active", t===tab);
    document.getElementById("tab-"+t).classList.toggle("active", t===tab);
  });
  // 刷新验证码
  setTimeout(() => refreshCaptcha(tab), 50);
}

function refreshCaptcha(tab) {
  let canvas = document.getElementById("captcha-"+tab);
  if (canvas) renderCaptchaCanvas(canvas);
}

function onPwStrength(val, id) {
  let bar = document.getElementById(id);
  let lbl = document.getElementById(id.replace("strength","strength-label"));
  if (!bar) return;
  let s = checkPinStrength(val);
  let colors = ["#e8edf4","#f0f0f0","#f0f0f0","#f0f0f0","#f0f0f0","#f0f0f0"];
  let labels = ["","弱","中","中强","强","非常强"];
  let color = ["#e8edf4","#c0392b","#e67e22","#e67e22","#1a8a4a","#1a8a4a"][s];
  let pct = (s / 5) * 100;
  bar.innerHTML = `<span style="width:${pct}%;background:${color};display:block;height:100%"></span>`;
  if (lbl) lbl.textContent = val ? labels[s] : "";
}

function togglePw(id, btn) {
  let inp = document.getElementById(id);
  if (!inp) return;
  if (inp.type === "password") { inp.type = "text"; btn.textContent = "🙈"; }
  else { inp.type = "password"; btn.textContent = "👁"; }
}

// ===== 登录注册逻辑 =====
function doLogin() {
  let username = $("login-username")?.value?.trim();
  let pw = $("login-pw")?.value;
  let captcha = $("login-captcha")?.value?.trim();

  if (!username || !pw) { showToast("请填写用户名和密码", "error"); return; }

  // 验证码
  let q = getCaptchaQ();
  if (String(captcha).trim() !== String(q.answer)) {
    showToast("验证码错误，请重试", "error");
    refreshCaptcha("login");
    return;
  }

  let users = getUsers();
  let user = users.find(u => u.username === username && u.pwHash === hashPin(pw));
  if (!user) {
    showToast("用户名或密码错误", "error");
    return;
  }

  currentUser = { name: user.name, username: user.username, isAdmin: !!user.isAdmin };
  isAdmin = !!user.isAdmin;
  localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
  showToast("欢迎回来，" + user.name + "！", "success");
  state.view = "home";
  render();
}

function doRegister() {
  let name = $("reg-name")?.value?.trim();
  let username = $("reg-username")?.value?.trim();
  let pw = $("reg-pw")?.value;
  let pw2 = $("reg-pw2")?.value;
  let captcha = $("reg-captcha")?.value?.trim();

  if (!name) { showToast("请输入真实姓名", "error"); return; }
  if (!username || username.length < 2) { showToast("请输入正确的用户名（至少2位）", "error"); return; }
  if (pw.length < 6) { showToast("密码至少6位", "error"); return; }
  if (pw !== pw2) { showToast("两次密码不一致", "error"); return; }

  let q = getCaptchaQ();
  if (String(captcha).trim() !== String(q.answer)) {
    showToast("验证码错误，请重试", "error");
    refreshCaptcha("register");
    return;
  }

  let users = getUsers();
  if (users.find(u => u.username === username)) {
    showToast("该用户名已注册，请直接登录", "error");
    switchAuthTab("login");
    return;
  }

  users.push({ name, username, pwHash: hashPin(pw), isAdmin: false, createdAt: new Date().toISOString() });
  saveUsers(users);

  currentUser = { name, username, isAdmin: false };
  isAdmin = false;
  localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
  showToast("注册成功！欢迎 " + name, "success");
  state.view = "home";
  render();
}

// ===== 忘记密码 =====
let forgotStep = 0; // 0=验证手机 1=重置密码

function doForgot() {
  let username = $("fg-username")?.value?.trim();
  let captcha = $("fg-captcha")?.value?.trim();

  if (forgotStep === 0) {
    if (!username || username.length < 2) { showToast("请输入正确的用户名", "error"); return; }
    let q = getCaptchaQ();
    if (String(captcha).trim() !== String(q.answer)) {
      showToast("验证码错误", "error"); refreshCaptcha("forgot"); return;
    }
    let users = getUsers();
    if (!users.find(u => u.username === username)) {
      showToast("该用户名未注册", "error"); return;
    }
    // 演示：显示短信验证码到控制台
    let code = String(Math.floor(Math.random() * 900000 + 100000));
    console.log("【演示用】忘记密码验证码：" + code);
    window._forgotCode = code;
    window._forgotUsername = username;
    document.getElementById("fg-step2").style.display = "block";
    $("fg-sms-btn").textContent = "已发送 ✓";
    $("fg-sms-btn").disabled = true;
    showToast("演示验证码已输出到控制台（F12查看）", "info");
    forgotStep = 1;
    return;
  }

  if (forgotStep === 1) {
    let sms = $("fg-sms")?.value?.trim();
    if (!sms) { showToast("请输入短信验证码", "error"); return; }
    if (String(sms) !== window._forgotCode) {
      showToast("短信验证码错误", "error"); return;
    }
    document.getElementById("fg-reset-section").style.display = "block";
    $("fg-sms-btn").textContent = "✓ 已验证";
    showToast("身份验证通过，请设置新密码", "success");
    forgotStep = 2;
    return;
  }

  if (forgotStep === 2) {
    let newPw = $("fg-new-pw")?.value;
    let newPw2 = $("fg-new-pw2")?.value;
    if (newPw.length < 6) { showToast("新密码至少6位", "error"); return; }
    if (newPw !== newPw2) { showToast("两次密码不一致", "error"); return; }
    let users = getUsers();
    let idx = users.findIndex(u => u.username === window._forgotUsername);
    if (idx >= 0) {
      users[idx].pwHash = hashPin(newPw);
      saveUsers(users);
    }
    showToast("密码重置成功，请用新密码登录", "success");
    forgotStep = 0;
    document.getElementById("fg-step2").style.display = "none";
    document.getElementById("fg-reset-section").style.display = "none";
    switchAuthTab("login");
  }
}

// ===== 考试 =====
function startExam() {
  if (!currentUser) { showToast("请先登录", "error"); switchAuthTab("login"); return; }
  state.candName = currentUser.name;
  state.taskId = 1;
  state.questions = questions.slice();
  state.answers = {};
  state.currentQ = 0;
  state.submitted = false;
  state.view = "exam";
  render();
  scrollTo(0, 0);
}

function renderExam() {
  let total = totalScore(state.questions);
  let answered = state.questions.filter(q => !!state.answers[q.id]).length;
  let pct = Math.round(answered / state.questions.length * 100);
  let navHtml = state.questions.map((q, i) => {
    let cls = "q-dot";
    if (i === state.currentQ) cls += " current";
    else if (state.answers[q.id]) cls += " answered";
    return `<div class="${cls}" onclick="jumpTo(${i})">${i+1}</div>`;
  }).join("");

  $("app").innerHTML = `
  <div class="page-exam">
    <div class="sidebar">
      <div class="card">
        <div class="sidebar-title">答题进度</div>
        <div class="q-nav">${navHtml}</div>
        <div class="q-legend">
          <span><span class="dot" style="background:#eef2ff;border-color:var(--primary-light)"></span>未答</span>
          <span><span class="dot" style="background:#eef2ff;border-color:var(--primary-light)"></span>已答</span>
          <span><span class="dot" style="background:var(--accent);border-color:var(--accent)"></span>当前题</span>
        </div>
        <div class="timer-box">
          <div class="timer-label">⏱ 剩余时间</div>
          <div class="timer-num" id="timer">60:00</div>
        </div>
      </div>
    </div>
    <div class="exam-main">
      <div class="exam-header">
        <div>
          <h2>GB/T 18204 培训考核卷</h2>
          <div class="exam-info">
            <span>考生：<strong>${esc(state.candName)}</strong></span>
            <span>已答：<strong>${answered}/${state.questions.length}</strong></span>
            <span>满分：<strong>${total}</strong> 分</span>
          </div>
          <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
        </div>
        <button class="btn btn-accent" onclick="confirmSubmit()">提交试卷</button>
      </div>
      <div class="question-card" id="q-card"></div>
      <div class="q-nav-bottom">
        <button class="btn btn-ghost" onclick="prevQ()">← 上一题</button>
        <button class="btn btn-primary" onclick="nextQ()">下一题 →</button>
        ${state.currentQ === state.questions.length - 1 ? `<button class="btn btn-accent" onclick="confirmSubmit()">提交试卷</button>` : ""}
        <button class="btn btn-ghost" onclick="backHome()">退出考试</button>
      </div>
    </div>
  </div>`;

  renderCurrentQ();
  startTimer();
}

function renderCurrentQ() {
  let q = state.questions[state.currentQ];
  let card = $("q-card");
  if (!card) return;
  let typeLabel = {single:"单选题",multi:"多选题",judge:"判断题",short:"简答题",scenario:"场景分析题"}[q.qtype]||"问答题";
  let typeColor = {single:"#1a5a9a",multi:"#6b3fa0",judge:"#1a8a4a",short:"#c05a20",scenario:"#8a1a4a"}[q.qtype]||"#1a3a6b";
  let optsHtml = "";

  if (q.qtype === "single" || q.qtype === "judge") {
    optsHtml = q.options.map(o => {
      let sel = (state.answers[q.id]||"") === o[0];
      let clr = sel ? typeColor : "";
      let bg = sel ? typeColor : "transparent";
      return `<div class="option-item${sel?" selected":""}" onclick="selectOption(this,'${o[0]}','${typeColor}')">
        <span class="opt-letter" style="color:${clr};border-color:${sel?typeColor:"currentColor"};background:${bg}">${o[0]}</span>
        <span class="opt-text">${esc(o.slice(2))}</span>
      </div>`;
    }).join("");
  } else if (q.qtype === "multi") {
    let selArr = (state.answers[q.id]||"").split(",").filter(x=>x);
    optsHtml = q.options.map(o => {
      let sel = selArr.includes(o[0]);
      let clr = sel ? "#fff" : "#6b3fa0";
      let bg = sel ? "#6b3fa0" : "transparent";
      return `<div class="option-item${sel?" selected":""}" onclick="toggleMulti(this,'${o[0]}')">
        <span class="opt-letter" style="color:${clr};border-color:${sel?"#6b3fa0":"currentColor"};background:${bg}">${o[0]}</span>
        <span class="opt-text">${esc(o.slice(2))}</span>
      </div>`;
    }).join("");
  } else {
    optsHtml = `<div class="short-area">
      <textarea id="short-answer" placeholder="请在此输入你的答案..." onchange="setShort(this.value)">${esc(state.answers[q.id]||"")}</textarea>
    </div>`;
  }

  card.innerHTML = `
    <span class="q-type" style="background:${typeColor}20;color:${typeColor}">${typeLabel} · ${q.score}分</span>
    <div class="q-stem">${esc(q.stem)}</div>
    <ul class="options">${optsHtml}</ul>
  `;
}

function selectOption(el, val, color) {
  let q = state.questions[state.currentQ];
  state.answers[q.id] = val;
  el.parentElement.querySelectorAll(".option-item").forEach(e => {
    e.classList.remove("selected");
    let l = e.querySelector(".opt-letter");
    l.style.background = "transparent"; l.style.color = ""; l.style.borderColor = "currentColor";
  });
  el.classList.add("selected");
  let l = el.querySelector(".opt-letter");
  l.style.background = color; l.style.color = "#fff"; l.style.borderColor = color;
  updateNav();
}

function toggleMulti(el, val) {
  let q = state.questions[state.currentQ];
  let arr = (state.answers[q.id]||"").split(",").filter(x=>x);
  if (arr.includes(val)) {
    arr = arr.filter(x=>x!==val);
    el.classList.remove("selected");
    let l = el.querySelector(".opt-letter");
    l.style.background = "transparent"; l.style.color = "#6b3fa0"; l.style.borderColor = "currentColor";
  } else {
    arr.push(val);
    el.classList.add("selected");
    let l = el.querySelector(".opt-letter");
    l.style.background = "#6b3fa0"; l.style.color = "#fff"; l.style.borderColor = "#6b3fa0";
  }
  state.answers[q.id] = arr.sort().join(",");
  updateNav();
}

function setShort(val) { state.answers[state.questions[state.currentQ].id] = val; updateNav(); }

function updateNav() {
  let nav = document.querySelector(".q-nav");
  if (!nav) return;
  state.questions.forEach((q,i) => {
    let dot = nav.children[i];
    if (!dot) return;
    dot.className = "q-dot";
    if (i===state.currentQ) dot.classList.add("current");
    else if (state.answers[q.id]) dot.classList.add("answered");
  });
  let answered = state.questions.filter(q=>!!state.answers[q.id]).length;
  let fill = document.querySelector(".progress-bar .fill");
  if (fill) fill.style.width = Math.round(answered/state.questions.length*100)+"%";
}

function jumpTo(idx) { state.currentQ=idx; renderCurrentQ(); updateNav(); }
function prevQ() { if(state.currentQ>0){state.currentQ--;renderCurrentQ();updateNav()} }
function nextQ() { if(state.currentQ<state.questions.length-1){state.currentQ++;renderCurrentQ();updateNav()} }

function startTimer() {
  if(timerInterval) clearInterval(timerInterval);
  let sec = 60*60;
  timerInterval = setInterval(() => {
    sec--;
    if(sec<=0){clearInterval(timerInterval);confirmSubmit();return}
    let m=Math.floor(sec/60),s=sec%60;
    let el=document.getElementById("timer");
    if(el) el.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  }, 1000);
}

function confirmSubmit() {
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  let unanswered=state.questions.filter(q=>!state.answers[q.id]).length;
  let html=`<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="reopenSubmitModal()">×</button>
      <h3>确认提交试卷？</h3>
      ${unanswered>0?`<p>你还有 <strong>${unanswered} 道题</strong>未作答，提交后将无法修改答案。</p>`:`<p>你已完成全部题目，确认提交吗？</p>`}
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="reopenSubmitModal()">继续答题</button>
        <button class="btn btn-accent" onclick="doSubmit()">确认提交 ✓</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}

function reopenSubmitModal() {
  document.querySelector(".modal-overlay")?.remove();
  if(!timerInterval) startTimer();
}

function closeModal(e) {
  if(e&&e.target!==e.currentTarget) return;
  document.querySelector(".modal-overlay")?.remove();
  if(!timerInterval) startTimer();
}

function doSubmit() {
  document.querySelector(".modal-overlay")?.remove();
  let result = calcScore(state.questions, state.answers);
  state.score = result;
  state.passed = state.score >= 80;
  state.submitted = true;
  state.view = "result";
  saveRecord(state.score, state.passed);
  render();
  scrollTo(0,0);
}

function calcScore(qs, answers) {
  let auto=0;
  qs.forEach(q => {
    if(["single","judge"].includes(q.qtype)) {
      if((answers[q.id]||"")===q.answer) auto+=q.score;
    } else if(q.qtype==="multi") {
      let ca=q.answer.split(",").sort().join(",");
      if((answers[q.id]||"").split(",").sort().join(",")===ca) auto+=q.score;
    }
  });
  return auto;
}

function backHome() {
  if(!confirm("确定退出？考试记录将丢失。")) return;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  state.view="home";
  render();
}

function saveRecord(score, passed) {
  let records = getRecords();
  records.push({time:new Date().toISOString(),name:state.candName,username:currentUser?.username||"",score,passed});
  saveRecords(records);
}

    </div>
    <div class="cert-box">
      <div class="cert-title">湖南绿盾卫士检测技术有限公司</div>
      <div class="cert-company">培训考核合格证书</div>
      <div class="cert-line" style="border-top:1px dashed var(--border);margin:22px 0"></div>
      <div class="cert-name">${esc(state.candName)}</div>
      <div class="cert-score">${state.score} 分</div>
      <div class="cert-status ${state.passed?"pass":"fail"}">${state.passed?"✓ 合格":"✗ 不合格"}</div>
      <div class="cert-date">考核日期：${certDate}</div>
      <div class="cert-id">证书编号：${certId}</div>
    </div>
    <div class="result-detail">
      <div class="result-detail-header">📊 答题详情（共 ${state.questions.length} 题）</div>
      <div class="result-detail-body">
        <div class="detail-stats">

          <div class="detail-stat"><div class="stat-num">80</div><div class="stat-label">合格线</div></div>

        </div>
        <div class="print-preview" id="print-preview">
          <div class="print-area" id="print-area"></div>
        </div>
      </div>
    </div>

    <div id="tab-records" style="display:none">
      <div class="card">
        <div class="card-title">📊 考试记录（${records.length} 条）</div>
        ${recordsHtml}
      </div>
    </div>

    <div id="tab-security" style="display:none">
      <div class="card">
        <div class="card-title">🔐 修改管理员 PIN</div>
        <div class="admin-hint">
          <strong>当前 PIN：</strong>${esc(getAdminConfig().pin)} &nbsp;|&nbsp; 
          <strong>建议：</strong>不要设置过于简单的 PIN（如 123456）
        </div>
        <div class="admin-panel" style="max-width:400px">
          <label>当前 PIN</label>
          <div class="input-wrap">
            <input type="password" id="cur-pin" placeholder="请输入当前 PIN" maxlength="20">
          </div>
          <label>新 PIN（6位数字）</label>
          <div class="input-wrap">
            <input type="password" id="new-pin" placeholder="设置新 PIN" maxlength="6">
          </div>
          <label>确认新 PIN</label>
          <div class="input-wrap">
            <input type="password" id="new-pin2" placeholder="再次输入新 PIN" maxlength="6">
          </div>
          <button class="btn btn-primary" onclick="changeAdminPin()" style="width:200px">保存新 PIN</button>
        </div>
      </div>
      <div class="card" style="margin-top:16px">
        <div class="card-title">📋 考试记录管理</div>
        <div class="admin-hint">以下操作不可逆，请谨慎操作。</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn btn-danger" onclick="if(confirm('确定清空所有考试记录？此操作不可恢复。')){saveRecords([]);showToast('考试记录已清空','info');render()}">🗑 清空考试记录</button>
        </div>
      </div>
    </div>
  </div>`;
}

function showAdminTab(tab) {
  ["questions","print","records","security"].forEach(t => {
    let el = document.getElementById("tab-"+t);
    if (el) el.style.display = t===tab?"":"none";
  });
  if (tab==="print") setTimeout(generatePrint, 50);
}

function changeAdminPin() {
  let cur = $("cur-pin")?.value;
  let npin = $("new-pin")?.value;
  let npin2 = $("new-pin2")?.value;
  let cfg = getAdminConfig();
  if (cur !== cfg.pin) { showToast("当前 PIN 错误", "error"); return; }
  if (!/^\d{6}$/.test(npin)) { showToast("新 PIN 必须为 6 位数字", "error"); return; }
  if (npin !== npin2) { showToast("两次新 PIN 不一致", "error"); return; }
  cfg.pin = npin;
  saveAdminConfig(cfg);
  showToast("PIN 修改成功", "success");
  $("cur-pin").value = "";
  $("new-pin").value = "";
  $("new-pin2").value = "";
}

function importQuestions() {
  let raw = $("import-area")?.value?.trim();
  if (!raw) { showToast("请先粘贴 JSON 数据", "error"); return; }
  try {
    let data = JSON.parse(raw);
    if (!Array.isArray(data)) throw new Error("不是数组");
    data.forEach(q => { if(!q.stem||!q.qtype) throw new Error("缺少 stem 或 qtype"); });
    questions = data;
    saveQuestions(questions);
    showToast(`成功导入 ${questions.length} 道题目`, "success");
    render();
  } catch(e) { showToast("JSON 格式错误：" + e.message, "error"); }
}

function exportQuestions() {
  let blob = new Blob([JSON.stringify(questions, null, 2)], {type:"application/json"});
  let url = URL.createObjectURL(blob);
  let a = document.createElement("a");
  a.href = url; a.download = "题库_" + new Date().toISOString().slice(0,10) + ".json";
  a.click(); URL.revokeObjectURL(url);
  showToast("题库已导出", "success");
}

function resetQuestions() {
  if (!confirm("确定恢复默认题库？当前题库将被覆盖。")) return;
  questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
  saveQuestions(questions);
  showToast("已恢复默认题库", "info");
  render();
}

function deleteQuestion(id) {
  if (!confirm("确定删除第 " + id + " 题？")) return;
  questions = questions.filter(q => q.id !== id);
  saveQuestions(questions);
  showToast("已删除", "info");
  render();
}

// ===== 打印考核卷 =====
function generatePrint() {
  let title = $("print-title")?.value || "培训考核卷";
  let singles = questions.filter(q => q.qtype === "single");
  let multis = questions.filter(q => q.qtype === "multi");
  let judges = questions.filter(q => q.qtype === "judge");
  let shorts = questions.filter(q => q.qtype === "short");
  let scenarios = questions.filter(q => q.qtype === "scenario");

  function buildSection(name, qs) {
    if (!qs.length) return "";
    let rows = qs.map(q => {
      let optHtml = "";
      if (["single","judge","multi"].includes(q.qtype)) {
        optHtml = q.options.map(o => `<td class="opt-col">${o[0]}</td><td>${esc(o.slice(2))}</td>`).join("");
      } else {
        let lines = q.qtype==="scenario" ? "<div class='answer-line'></div><div class='answer-line'></div>" : "<div class='answer-line'></div><div class='answer-line'></div><div class='answer-line'></div>";
        optHtml = `<td colspan="6">${lines}</td>`;
      }
      return `<tr><td class="num">${q.id}</td><td class="q-text" style="width:46%">${esc(q.stem)}</td>${optHtml}<td class="score-col">${q.score}</td></tr>`;
    }).join("");
    return `<div class="section-title">${esc(name)}（${qs.length} 题，${qs.reduce((s,q)=>s+q.score,0)} 分）</div>
    <table><thead><tr><th style="width:22px">题号</th><th>题目</th><th colspan="6">选项 / 答题区</th><th style="width:26px">分值</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  let ansRow = [...Array(33)].map((_,i)=>`${i+1}：____`).join("&nbsp;&nbsp;");

  $("print-area").innerHTML = `
    <div class="print-header">
      <h1>🛡️ 湖南绿盾卫士检测技术有限公司</h1>
      <p style="font-size:15px;font-weight:700;margin-top:4px">${esc(title)}</p>
    </div>
    <div class="info-row">
      <span>姓名：<input class="wide"></span>
      <span>单位/部门：<input class="wide"></span>
      <span>日期：<input class="wide"></span>
      <span>得分：<input></span>
    </div>
    <div style="font-size:12px;color:#555;margin-bottom:12px;background:#f8f8f8;padding:5px 10px;border-radius:6px">
      <strong>注意事项：</strong>单选题、判断题请在选项字母上打"√"；多选题在所有正确答案上打"√"；简答/分析题在答题区书写。
    </div>
    ${buildSection("一、单选题", singles)}
    ${buildSection("二、多选题", multis)}
    ${buildSection("三、判断题", judges)}
    ${buildSection("四、简答题", shorts)}
    ${buildSection("五、场景分析题", scenarios)}
    <div style="margin-top:10px;padding:8px;background:#f8f8f8;border-radius:6px;font-size:12px;line-height:1.8">
      <strong>答题卡：</strong>${ansRow}
    </div>
  `;
}

function renderPrintPage() {
  let total = totalScore(questions);
  return `<div class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:24px">📄</div>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--primary)">打印考核卷</div>
          <div style="font-size:12px;color:var(--text-light)">预览 · 调整 · 打印（建议 Chrome 浏览器 Ctrl+P）</div>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="state.view='admin';render()">← 返回管理</button>
        <button class="btn btn-accent" onclick="window.print()">🖨 打印</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📄 生成打印考核卷</div>
      <div class="print-toolbar">
        <label>考试标题：</label>
        <input type="text" id="print-title" value="GB/T 18204 培训考核卷" style="flex:1;min-width:200px">
        <label>合格线：</label>
        <input type="number" id="print-pass" value="80" style="width:80px">
        <label>总分：</label>
        <input type="number" id="print-total" value="${total}" style="width:80px">
        <button class="btn btn-primary" onclick="generatePrint()">🔄 刷新预览</button>
      </div>
      <div class="print-preview">
        <div class="print-area" id="print-area" style="display:block"></div>
      </div>
    </div>
  </div>`;
}

// ===== 初始化 =====
window.onload = () => {
  // 如果有记住的会话，直接恢复
  if (currentUser) {
    let cfg = getAdminConfig();
    if (cfg.users && cfg.users.find(u=>u.username===currentUser.username)) {
      isAdmin = !!cfg.users.find(u=>u.username===currentUser.username && u.isAdmin);
    }
  }
  state.view = currentUser ? "home" : "auth";
  render();
  // 自动刷新验证码
  setTimeout(() => refreshCaptcha(state.authTab), 100);
};

// 全局函数
window.switchAuthTab = switchAuthTab;
window.refreshCaptcha = refreshCaptcha;
window.onPwStrength = onPwStrength;
window.togglePw = togglePw;
window.showAdminTab = showAdminTab;
window.generatePrint = generatePrint;
</script>
</body>
</html>
