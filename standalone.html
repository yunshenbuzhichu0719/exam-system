<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>湖南绿盾卫士检测技术有限公司 - 在线考试系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a3a6b;--primary-light:#2a5aaa;--primary-dark:#0d2247;
  --accent:#c9a84c;--accent-light:#f0d080;--accent-dark:#a07830;
  --bg:#e8edf4;--card:#fff;--text:#1a1a2e;--text-light:#5a6a7a;
  --border:#d0d8e4;--success:#1a8a4a;--danger:#c0392b;--warn:#e67e22;
}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== 顶部导航 ===== */
.topbar{
  background:linear-gradient(135deg,#1a3a6b 0%,#0d2247 100%);color:#fff;
  padding:0 40px;height:64px;display:flex;align-items:center;
  box-shadow:0 2px 16px rgba(10,30,70,.35);position:sticky;top:0;z-index:100;
}
.topbar-logo{display:flex;align-items:center;gap:12px;flex:1}
.topbar-logo .shield{width:40px;height:40px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.topbar-logo .name{font-size:17px;font-weight:700;letter-spacing:.5px}
.topbar-logo .sub{font-size:11px;opacity:.7;letter-spacing:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-right .user-icon{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer}
.topbar-right .btn-bar{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);color:var(--accent-light);padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:background .2s}
.topbar-right .btn-bar:hover{background:rgba(201,168,76,.35)}

/* ===== 通用 ===== */
.page{padding:40px 20px;max-width:1200px;margin:0 auto;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:16px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:24px}
.card-title{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title::before{content:'';width:4px;height:22px;background:var(--accent);border-radius:2px}

/* ===== 通用组件 ===== */
.btn{border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 3px 12px rgba(26,58,107,.3)}
.btn-accent{background:linear-gradient(135deg,#c9a84c,#e0bc5a);color:#fff;box-shadow:0 3px 12px rgba(201,168,76,.35)}
.btn-ghost{background:#f1f4f8;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:#e8edf4}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
.btn-sm-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-sm-primary{background:#eef2ff;color:var(--primary-light);border:1px solid #c7d2fe}
.btn-sm-accent{background:#fff8e8;color:#b06000;border:1px solid #f0c040}
.footer{text-align:center;padding:28px 20px;font-size:12px;color:var(--text-light)}

/* ===== Toast ===== */
.toast{position:fixed;top:80px;right:20px;background:#fff;border-radius:12px;padding:14px 20px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:300;font-size:14px;display:none;animation:fadeUp .2s ease;min-width:200px}
.toast.show{display:block}
.toast.success{border-left:4px solid var(--success)}
.toast.error{border-left:4px solid var(--danger)}
.toast.info{border-left:4px solid var(--primary)}

/* ===== 模态弹窗 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:20px;padding:40px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;animation:fadeUp .25s ease}
.modal-box h3{font-size:20px;color:var(--primary);margin-bottom:6px}
.modal-box .modal-sub{font-size:13px;color:var(--text-light);margin-bottom:24px;line-height:1.6}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light);line-height:1}
.modal-close:hover{color:var(--text)}
.modal-actions{display:flex;gap:10px;justify-content:center;margin-top:20px}
.modal-row{display:flex;flex-direction:column;gap:16px}

/* ===== 表单字段 ===== */
.field{width:100%}
.field label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:block}
.field input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--primary-light)}
.field .hint{font-size:11px;color:var(--text-light);margin-top:4px}

/* ===== 验证码 ===== */
.captcha-row{display:flex;gap:10px;align-items:flex-end}
.captcha-row .field{flex:1}
.captcha-canvas{border-radius:10px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;height:46px;transition:border-color .2s}
.captcha-canvas:hover{border-color:var(--primary-light)}

/* ===== 登录页 ===== */
/* ===== 认证页（政府事业单位风格） ===== */
.auth-page-wrap{min-height:calc(100vh - 64px);display:flex;flex-direction:column}

/* 顶部机构栏 */
.auth-page-footer{text-align:center;font-size:12px;color:var(--text-light);padding:18px 20px;letter-spacing:.5px;border-top:1px solid var(--border);background:#fff}
/* 主内容 */
.auth-main{display:flex;flex:1;max-width:1200px;width:100%;margin:0 auto;padding:40px;gap:60px;align-items:stretch}

/* 左侧品牌区 */
.auth-brand{flex:1;display:flex;align-items:center;background:linear-gradient(160deg,#1a3a6b 0%,#0d2247 60%,#1a3a8a 100%);border-radius:20px;padding:44px;position:relative;overflow:hidden;min-height:460px}
.auth-brand::before{content:'';position:absolute;right:-40px;bottom:-40px;width:200px;height:200px;background:rgba(201,168,76,.1);border-radius:50%}
.auth-brand::after{content:'';position:absolute;left:-30px;top:-30px;width:160px;height:160px;background:rgba(201,168,76,.07);border-radius:50%}
.auth-brand-inner{position:relative;z-index:1}
.auth-brand-logo{font-size:52px;margin-bottom:20px}
.auth-brand-title{font-size:26px;font-weight:900;color:#fff;line-height:1.35;margin-bottom:16px;letter-spacing:1px}
.auth-brand-desc{font-size:14px;color:rgba(255,255,255,.7);line-height:1.8;margin-bottom:32px}
.auth-brand-features{display:flex;flex-direction:column;gap:14px}
.auth-brand-feat{display:flex;align-items:flex-start;gap:14px;background:rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;border:1px solid rgba(255,255,255,.1)}
.auth-brand-feat-icon{font-size:24px;flex-shrink:0}
.auth-brand-feat-t{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.auth-brand-feat-d{font-size:12px;color:rgba(255,255,255,.6);line-height:1.5}

/* 右侧表单区 */
.auth-form-area{flex:1;max-width:420px;display:flex;flex-direction:column}
.auth-form-tabs{display:flex;margin-bottom:0;align-items:flex-end;padding:0}
.auth-form-tab{position:relative;flex:1;text-align:center;padding:14px 20px;font-size:15px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;letter-spacing:.5px;background:transparent}
.auth-form-tab.active{
  color:#fff;
  font-size:16px;
  font-weight:700;
  letter-spacing:2px;
  padding:16px 28px 18px;
  margin-bottom:-4px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 60%,var(--accent) 100%);
  border-bottom:none;
  clip-path:polygon(0 0, calc(100% - 22px) 0, 100% 100%, 0 100%);
  box-shadow:0 6px 20px rgba(26,58,107,0.4),0 2px 6px rgba(26,58,107,0.2),inset 0 1px 0 rgba(255,255,255,0.25);
  filter:drop-shadow(0 4px 10px rgba(26,58,107,0.35));
  z-index:1;
}
.auth-form-tab.active::before{
  content:"";
  position:absolute;
  bottom:0;left:0;right:22px;height:3px;
  background:linear-gradient(90deg,rgba(255,255,255,0.5),rgba(255,255,255,0.1));
  border-radius:2px 2px 0 0;
}
.auth-form-tab.active::after{
  content:"";
  position:absolute;
  top:2px;right:26px;
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.7);
  box-shadow:0 0 6px rgba(255,255,255,0.8);
}
.auth-form-tab:hover:not(.active){color:var(--text)}
.auth-form-wrap{background:var(--card);border-radius:0 0 20px 20px;padding:30px 34px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.07);flex:1}

.auth-form{display:none;flex-direction:column;gap:14px}
.auth-form.active{display:flex}

/* 表单行 */
.af-row{display:flex;align-items:flex-start;gap:0}
.af-icon{width:36px;height:36px;background:#f0f4ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:26px;border:1px solid #dde4ff}
.af-field{flex:1;padding-left:12px}
.af-label{font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:6px;padding-left:4px;letter-spacing:.5px}
.af-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;background:#fff}
.af-input:focus{border-color:var(--primary-light);background:#f8faff}
.af-pw-wrap{position:relative}
.af-pw-wrap .af-input{padding-right:42px}
.af-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-light);padding:4px}
.af-captcha-row{display:flex;gap:8px;align-items:flex-end}
.af-cap-in{flex:1}
.af-canvas{border-radius:8px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;height:44px;background:#f8faff;transition:border-color .2s}
.af-canvas:hover{border-color:var(--primary-light)}
.af-sms-btn{background:#fff;border:1.5px solid var(--primary);color:var(--primary);padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.af-sms-btn:hover{background:var(--primary);color:#fff}
.af-hint{font-size:11px;color:var(--text-light);margin-top:5px;line-height:1.5}
.af-submit-btn{width:100%;padding:13px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,#1a3a6b,#1a5a9a);border:none;border-radius:10px;cursor:pointer;letter-spacing:2px;margin-top:4px;transition:opacity .2s,transform .15s;box-shadow:0 4px 14px rgba(26,58,107,.3)}
.af-submit-btn:hover{opacity:.88;transform:translateY(-1px)}
.af-reg-btn{background:linear-gradient(135deg,#c9a84c,#e0bc5a);box-shadow:0 4px 14px rgba(201,168,76,.3)}
.af-links{text-align:center;margin-top:10px;display:flex;justify-content:center;gap:8px;align-items:center}
.af-link-sep{color:var(--border);font-size:12px}
.af-link-primary{font-size:13px;color:var(--primary);font-weight:600;text-decoration:none;cursor:pointer}
.af-link-primary:hover{text-decoration:underline}
.af-link-ghost{font-size:13px;color:var(--text-light);text-decoration:none;cursor:pointer}
.af-link-ghost:hover{color:var(--text)}

@media(max-width:900px){
  .auth-brand{display:none}
  .auth-main{padding:20px 16px;gap:0}
  .auth-form-area{max-width:100%;width:100%}
}
@media(max-width:480px){
  .auth-form-wrap{padding:24px 20px}
}

/* ===== 首页 Hero ===== */
.hero{background:linear-gradient(135deg,#1a3a6b 0%,#1a5a9a 50%,#0d2247 100%);border-radius:20px;padding:56px 50px;margin-bottom:36px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;background:rgba(201,168,76,.12);border-radius:50%}
.hero-text{position:relative;z-index:1}
.hero-text h1{font-size:30px;font-weight:700;color:#fff;margin-bottom:10px}
.hero-text p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.7;max-width:480px}
.hero-badge{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);border-radius:16px;padding:16px 24px;text-align:center;color:var(--accent-light);position:relative;z-index:1}
.hero-badge .num{font-size:36px;font-weight:800;display:block;color:#fff}

/* ===== 试卷选择 ===== */
.paper-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.paper-card{border:2px solid var(--border);border-radius:16px;padding:22px;transition:all .2s;cursor:pointer;background:var(--card)}
.paper-card:hover{border-color:var(--primary-light);box-shadow:0 6px 24px rgba(26,58,107,.12);transform:translateY(-2px)}
.paper-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.paper-title{font-size:15px;font-weight:700;line-height:1.4}
.paper-tag{background:#eef2ff;color:var(--primary-light);border-radius:8px;padding:3px 10px;font-size:12px;flex-shrink:0;margin-left:10px}
.paper-desc{font-size:13px;color:var(--text-light);line-height:1.5;margin-bottom:14px}
.paper-meta{display:flex;gap:14px;font-size:12px;color:var(--text-light);margin-bottom:18px;flex-wrap:wrap}
.paper-meta span{display:flex;align-items:center;gap:4px}
.paper-meta .dot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0}
.paper-btn{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:10px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.paper-btn:hover{opacity:.88}

/* ===== 考试页面 ===== */
.page-exam{display:flex;gap:22px;max-width:1280px;margin:0 auto;padding:24px 20px;align-items:flex-start}
.sidebar{width:210px;flex-shrink:0;position:sticky;top:80px}
.sidebar .card{padding:18px}
.sidebar-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:14px}
.q-nav{display:flex;flex-direction:column;gap:14px;margin-bottom:14px}
.q-group-title{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px}
.q-group-title .q-badge{display:inline-block;width:3px;height:13px;border-radius:2px;background:var(--primary-light)}
.q-group-range{margin-left:6px;font-weight:500;font-size:11px;color:#9aa6b4}
.q-group-dots{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.q-dot{width:34px;height:34px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-light);cursor:pointer;transition:all .15s}
.q-dot.answered{border-color:var(--primary-light);background:#eef2ff;color:var(--primary-light)}
.q-dot.current{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,168,76,.4)}
.q-legend{display:flex;flex-direction:column;gap:7px;font-size:11px;color:var(--text-light)}
.timer-box{background:#fff8e8;border:1px solid #e8d090;border-radius:12px;padding:12px;margin-top:14px;text-align:center}
.timer-label{font-size:11px;color:var(--warn);font-weight:600;margin-bottom:3px}
.timer-num{font-size:26px;font-weight:800;color:var(--warn);font-variant-numeric:tabular-nums}
.exam-main{flex:1;min-width:0}
.exam-header{background:var(--card);border-radius:16px;padding:22px 26px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.exam-header h2{font-size:17px;color:var(--primary)}
.exam-info{display:flex;gap:18px;font-size:13px;color:var(--text-light)}
.exam-info strong{color:var(--text)}
.progress-bar{width:100%;height:5px;background:#e8edf4;border-radius:3px;overflow:hidden;margin-top:3px}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary-light));border-radius:3px;transition:width .4s}
.question-card{background:var(--card);border-radius:16px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px}
.q-type{display:inline-block;border-radius:6px;padding:3px 12px;font-size:12px;font-weight:700;margin-bottom:14px;letter-spacing:.5px}
.q-stem{font-size:15px;line-height:1.7;font-weight:600;margin-bottom:18px}
.options{list-style:none;display:flex;flex-direction:column;gap:9px}
.option-item{display:flex;align-items:center;gap:13px;padding:12px 16px;border:2px solid var(--border);border-radius:11px;cursor:pointer;transition:border-color .15s,background .15s}
.option-item:hover{border-color:var(--primary-light);background:#f5f7ff}
.option-item.selected{border-color:var(--primary);background:#eef2ff}
.opt-letter{width:30px;height:30px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s}
.opt-text{flex:1;font-size:14px;line-height:1.4}
.short-area textarea{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:11px;font-size:14px;line-height:1.6;resize:vertical;min-height:110px;font-family:inherit;outline:none;transition:border-color .2s}
.short-area textarea:focus{border-color:var(--primary-light)}
.q-nav-bottom{display:flex;gap:10px;flex-wrap:wrap}
.unanswered-alert{background:#fef3cd;border:1px solid #f0c040;color:#7a5000;border-radius:11px;padding:14px 18px;margin-bottom:16px;font-size:13px}

/* ===== 结果页 ===== */
.page-result{max-width:960px;margin:0 auto;padding:40px 20px}
.result-hero{text-align:center;padding:56px 40px;background:linear-gradient(135deg,#1a3a6b,#0d2247);border-radius:24px;margin-bottom:36px;position:relative;overflow:hidden}
.result-hero::before{content:'✓';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:200px;color:rgba(201,168,76,.08);line-height:1}
.result-icon{width:76px;height:76px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px;position:relative}
.result-hero h1{font-size:34px;color:#fff;margin-bottom:10px;position:relative}
.result-score{font-size:68px;font-weight:900;color:var(--accent-light);margin-bottom:6px;position:relative}
.result-sub{font-size:15px;color:rgba(255,255,255,.65);position:relative}
.cert-box{background:var(--card);border-radius:20px;border:2px solid var(--accent);padding:44px 56px;text-align:center;margin-bottom:30px;position:relative}
.cert-box::before,.cert-box::after{content:'★';position:absolute;top:18px;font-size:18px;color:var(--accent)}
.cert-box::before{left:28px}.cert-box::after{right:28px}
.cert-title{font-size:12px;letter-spacing:7px;color:var(--text-light);margin-bottom:6px}
.cert-company{font-size:22px;font-weight:900;color:var(--primary);margin-bottom:22px;letter-spacing:2px}
.cert-line{border-top:1px dashed var(--border);margin:22px 0}
.cert-name{font-size:20px;font-weight:700;margin:14px 0;letter-spacing:4px}
.cert-score{font-size:44px;font-weight:900;color:var(--accent);margin:14px 0}
.cert-status{display:inline-block;font-size:18px;font-weight:800;padding:7px 28px;border-radius:30px;margin-top:10px}
.cert-status.pass{background:#f0fdf4;color:var(--success);border:2px solid var(--success)}
.cert-status.fail{background:#fef2f2;color:var(--danger);border:2px solid var(--danger)}
.cert-date{font-size:13px;color:var(--text-light);margin-top:18px}
.cert-id{font-size:12px;color:#b0bec5;margin-top:5px;font-family:monospace}
.result-detail{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:30px}
.result-detail-header{background:#f5f7ff;padding:18px 26px;font-size:15px;font-weight:700;color:var(--primary);border-bottom:1px solid var(--border)}
.result-detail-body{padding:22px 26px}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}

.print-area .page-break{page-break-after:always}

  .auth-container{padding:32px 24px}
}

  {id:572,qtype:'multi',stem:'下列哪些属于室内空气物理因素参数的检测指标？（ ）',options:['A. 空气温度', 'B. 相对湿度', 'C. 风速', 'D. 细菌总数'],answer:'ABC',keyword:'物理因素参数',explanation:'温度、湿度、风速属物理因素；细菌总数属微生物指标。',score:3,category:'物理因素参数'},
  {id:573,qtype:'multi',stem:'使用玻璃液体温度计时，正确的操作包括（ ）。',options:['A. 水银柱读数取凸月面最高点', 'B. 酒精柱读数取凹月面最低点', 'C. 需进行零点位移校正', 'D. 读数估读到分度值1/2'],answer:'ABCD',keyword:'玻璃液体温度计',explanation:'玻璃液体温度计水银取凸面最高、酒精取凹面最低，并做零点校正、估读半分度。',score:3,category:'物理因素参数'},
  {id:574,qtype:'multi',stem:'干湿球法测定相对湿度时，应满足的条件包括（ ）。',options:['A. 通风器风速≥2.5 m/s', 'B. 通风时间5 min', 'C. 湿球用脱脂纱布与蒸馏水包裹', 'D. 直接使用自来水', 'E. 系数A=0.000667/℃'],answer:'ABCE',keyword:'干湿球法',explanation:'湿球须用脱脂纱布与蒸馏水，不可用自来水；风速≥2.5m/s、通风5min、A=0.000667/℃。',score:3,category:'物理因素参数'},
  {id:575,qtype:'multi',stem:'电风速计使用正确的是（ ）。',options:['A. 红点应对准来风方向', 'B. 测量范围0.1~10 m/s', 'C. 0.1~2 m/s段偏差±10%', 'D. 可测量水温'],answer:'ABC',keyword:'电风速计',explanation:'电风速计红点对来风、量程0.1~10m/s、低风速段偏差±10%。',score:3,category:'物理因素参数'},
  {id:576,qtype:'multi',stem:'示踪气体法测定新风量，正确做法有（ ）。',options:['A. 先测CO₂本底', 'B. 搅动3~5 min使浓度均匀', 'C. 至少取5点回归', 'D. 可直接读数不必回归'],answer:'ABC',keyword:'示踪气体法',explanation:'示踪气体法需测本底、搅动均匀、≥5点回归求新风量。',score:3,category:'物理因素参数'},
  {id:577,qtype:'multi',stem:'风管法测定风量，正确的布点原则有（ ）。',options:['A. 断面选直管段', 'B. 圆形风管≤1m分1~2环', 'C. 圆形风管≤1m测4~8点', 'D. 矩形风管分块等面积布点'],answer:'ABCD',keyword:'风管法',explanation:'风管法断面选直管段，圆管≤1m分1~2环测4~8点，矩形分块等面积。',score:3,category:'物理因素参数'},
  {id:578,qtype:'multi',stem:'噪声测量正确的是（ ）。',options:['A. 采用A计权', 'B. 用声校准器校准', 'C. 脉冲声读峰值', 'D. 非稳态噪声每5 s读瞬时值'],answer:'ABCD',keyword:'噪声测量',explanation:'噪声用A计权、声校准器校准，脉冲读峰值，非稳态每5s读瞬时值。',score:3,category:'物理因素参数'},
  {id:579,qtype:'multi',stem:'照度计使用正确的是（ ）。',options:['A. 量程1~5000 lx', 'B. 误差±8%', 'C. 受光器水平放置', 'D. 受光器竖直放置'],answer:'ABC',keyword:'照度计',explanation:'照度计量程1~5000lx、误差±8%、受光器水平放置。',score:3,category:'物理因素参数'},
  {id:580,qtype:'multi',stem:'辐射热测量可用（ ）。',options:['A. 辐射热计(0~2 kW/m²)', 'B. 黑球温度计', 'C. 干湿球温度计', 'D. 照度计'],answer:'AB',keyword:'辐射热',explanation:'辐射热计(0~2kW/m²,分辨率0.001)与黑球温度计用于辐射热测定。',score:3,category:'物理因素参数'},
  {id:581,qtype:'multi',stem:'热舒适评价相关的有（ ）。',options:['A. PMV指标', 'B. PPD指标', 'C. 7级热感觉标尺(+3~-3)', 'D. 仅温度一项决定'],answer:'ABC',keyword:'热舒适',explanation:'热舒适用PMV/PPD及7级热感觉标尺综合温度、湿度、风速等评价。',score:3,category:'物理因素参数'},
  {id:582,qtype:'multi',stem:'空盒气压表正确读数步骤包括（ ）。',options:['A. 先读附温', 'B. 轻敲盒面', 'C. 垂直读数', 'D. 无需读温度'],answer:'ABC',keyword:'空盒气压表',explanation:'空盒气压表先读附温、轻敲盒面、垂直读数。',score:3,category:'物理因素参数'},
  {id:583,qtype:'multi',stem:'自然采光系数相关的正确表述有（ ）。',options:['A. 为室内外照度之比', 'B. 窗地比公式含0.8系数', 'C. 仅与照度计有关', 'D. 反映天然采光能力'],answer:'ABD',keyword:'自然采光系数',explanation:'自然采光系数为室内外照度比，窗地比含0.8系数，反映天然采光。',score:3,category:'物理因素参数'},
  {id:584,qtype:'multi',stem:'电磁辐射测量正确的是（ ）。',options:['A. 每点连续测5次', 'B. 每次≥15 s', 'C. 取平均值', 'D. 仅测1次即可'],answer:'ABC',keyword:'电磁辐射',explanation:'电磁辐射每点连续5次、每次≥15s取均值。',score:3,category:'物理因素参数'},
  {id:585,qtype:'multi',stem:'室内空气物理参数检测中，单位对应正确的是（ ）。',options:['A. 风速 m/s', 'B. 照度 lx', 'C. 噪声 dB(A)', 'D. 大气压 hPa'],answer:'ABCD',keyword:'单位',explanation:'风速m/s、照度lx、噪声dB(A)、大气压hPa均为正确单位。',score:3,category:'物理因素参数'},

  {id:587,qtype:'multi',stem:'数显式温度计正确的是（ ）。',options:['A. 分辨率0.1℃', 'B. 准确度±0.5℃', 'C. 需期间核查', 'D. 最小分度1℃'],answer:'ABC',keyword:'数显式温度计',explanation:'数显式温度计分辨率0.1℃、准确度±0.5℃、需期间核查。',score:3,category:'物理因素参数'},
  {id:588,qtype:'multi',stem:'下列哪些属于物理因素参数采样布点需考虑的因素？（ ）',options:['A. 附录A布点要求', 'B. 代表性断面', 'C. 呼吸带高度', 'D. 仅中心一点'],answer:'ABC',keyword:'布点',explanation:'物理因素布点依附录A，选代表性位置（如呼吸带），非单点。',score:3,category:'物理因素参数'},

  {id:591,qtype:'multi',stem:'关于池水温度与透明度的正确表述有（ ）。',options:['A. 池水温度用温度计测定', 'B. 池水透明度用透明度盘测定', 'C. 温度与透明度无关', 'D. 透明度反映水的清澈程度'],answer:'ABD',keyword:'池水温度,池水透明度',explanation:'池水温度用温度计、透明度用透明度盘，透明度反映清澈度。',score:3,category:'物理因素参数'},

  {id:593,qtype:'multi',stem:'空气温度测量方法包括（ ）。',options:['A. 玻璃液体温度计法', 'B. 数显式温度计法', 'C. 干湿球法', 'D. 辐射热计法'],answer:'AB',keyword:'空气温度',explanation:'空气温度用玻璃液体温度计、数显温度计；干湿球测湿度、辐射热计测辐射。',score:3,category:'物理因素参数'},
  {id:594,qtype:'multi',stem:'相对湿度测量方法包括（ ）。',options:['A. 电阻电容法', 'B. 干湿球法', 'C. 氯化锂露点法', 'D. 风量罩法'],answer:'ABC',keyword:'相对湿度',explanation:'相对湿度可用电阻电容法、干湿球法、氯化锂露点法。',score:3,category:'物理因素参数'},
  {id:595,qtype:'multi',stem:'下列哪些做法会影响风速测量结果？（ ）',options:['A. 红点未对来风方向', 'B. 探头遮挡', 'C. 按规定方向放置', 'D. 在湍流处测量'],answer:'ABD',keyword:'风速',explanation:'红点方向、遮挡、湍流均影响风速测量；按规定放置正确。',score:3,category:'物理因素参数'},
  {id:596,qtype:'multi',stem:'室内物理环境检测报告应包含（ ）。',options:['A. 检测参数与结果', 'B. 仪器与条件', 'C. 布点示意图', 'D. 仅结论即可'],answer:'ABC',keyword:'报告',explanation:'报告应含参数结果、仪器条件、布点等信息。',score:3,category:'物理因素参数'},
  {id:597,qtype:'multi',stem:'CO检测的正确表述有（ ）。',options:['A. 不分光红外法范围0.125~62.5 mg/m³', 'B. 不分光红外法t90%<45 s', 'C. 不分光红外法用霍加拉特除CO干扰', 'D. 气相色谱法用FID检测'],answer:'ABCD',keyword:'CO',explanation:'CO不分光红外范围0.125~62.5、t90%<45s、霍加拉特除干扰；气相色谱用FID。',score:3,category:'化学污染物参数'},
  {id:598,qtype:'multi',stem:'CO气相色谱法正确的是（ ）。',options:['A. 用FID检测器', 'B. 镍触媒加氢使CO生成甲烷', 'C. 转化温度360℃', 'D. 直接进样不需转化'],answer:'ABC',keyword:'CO气相色谱',explanation:'CO经镍触媒360℃加氢生成甲烷由FID检测。',score:3,category:'化学污染物参数'},
  {id:599,qtype:'multi',stem:'CO₂不分光红外法正确的是（ ）。',options:['A. 范围0%~0.5%', 'B. t90%<15 s', 'C. 烧碱石棉除CO₂干扰', 'D. 特征波长4260 nm'],answer:'ABCD',keyword:'CO₂',explanation:'CO₂不分光红外范围0%~0.5%、t90%<15s、烧碱石棉除干扰、波长4260nm。',score:3,category:'化学污染物参数'},
  {id:600,qtype:'multi',stem:'PM10滤膜称重法正确的是（ ）。',options:['A. 平衡24 h', 'B. 温度15~30℃', 'C. 相对湿度45%~55%', 'D. 采样≥20 h'],answer:'ABCD',keyword:'PM10滤膜称重',explanation:'PM10滤膜称重需平衡24h、温15~30℃、RH45~55%、采样≥20h。',score:3,category:'化学污染物参数'},
  {id:601,qtype:'multi',stem:'PM10光散射法正确的是（ ）。',options:['A. 结果=CPM×转换系数K', 'B. 每点测5次', 'C. 相对湿度<90%', 'D. 无需转换系数'],answer:'ABC',keyword:'PM10光散射',explanation:'光散射法以CPM×K换算质量浓度，每点5次，RH<90%。',score:3,category:'化学污染物参数'},
  {id:602,qtype:'multi',stem:'PM2.5正确的是（ ）。',options:['A. 切割器Da50=2.5 μm±0.2 μm', 'B. 测量范围0.001~0.5 mg/m³', 'C. 为细颗粒物', 'D. Da50=10 μm'],answer:'ABC',keyword:'PM2.5',explanation:'PM2.5切割Da50=2.5±0.2μm、范围0.001~0.5mg/m³，为细颗粒物。',score:3,category:'化学污染物参数'},
  {id:603,qtype:'multi',stem:'甲醛酚试剂分光光度法正确的是（ ）。',options:['A. 流量0.5 L/min采10 L', 'B. 630 nm测定', 'C. 硫酸铁铵显色', 'D. 25~35℃显色15 min'],answer:'ABCD',keyword:'甲醛酚试剂',explanation:'酚试剂法0.5L/min采10L、630nm、硫酸铁铵显色、25~35℃15min。',score:3,category:'化学污染物参数'},
  {id:604,qtype:'multi',stem:'甲醛HPLC法正确的是（ ）。',options:['A. DNPH采样管', 'B. 1.0 L/min采50 L', 'C. 设臭氧去除柱', 'D. 用硫酸铁铵显色'],answer:'ABC',keyword:'甲醛HPLC',explanation:'HPLC法用DNPH管、1.0L/min采50L、臭氧去除柱；酚试剂才用硫酸铁铵。',score:3,category:'化学污染物参数'},
  {id:605,qtype:'multi',stem:'甲醛光电光度法正确的是（ ）。',options:['A. 分辨率0.01 mg/m³', 'B. t95%≤15 min', 'C. 现场快速', 'D. 需实验室显色'],answer:'ABC',keyword:'甲醛光电光度',explanation:'光电光度法分辨0.01、t95%≤15min、可现场快速。',score:3,category:'化学污染物参数'},
  {id:606,qtype:'multi',stem:'室内空气化学污染物检测方法包括（ ）。',options:['A. 不分光红外法(CO/CO₂)', 'B. 气相色谱法(TVOC/苯)', 'C. 分光光度法(甲醛/氨)', 'D. 撞击法'],answer:'ABC',keyword:'化学污染物',explanation:'CO/CO₂用红外，TVOC/苯用GC，甲醛/氨用分光光度；撞击法为微生物。',score:3,category:'化学污染物参数'},
  {id:607,qtype:'multi',stem:'标准状态的正确表述有（ ）。',options:['A. 0℃', 'B. 101.325 kPa', 'C. 用于体积换算', 'D. 25℃ 101.3 kPa'],answer:'ABC',keyword:'标准状态',explanation:'标准状态0℃、101.325kPa，用于气体体积修正。',score:3,category:'化学污染物参数'},
  {id:608,qtype:'multi',stem:'下列哪些属室内空气常见化学污染物？（ ）',options:['A. 甲醛', 'B. 苯系物', 'C. TVOC', 'D. 细菌总数'],answer:'ABC',keyword:'污染物',explanation:'甲醛、苯、TVOC为化学污染物；细菌总数属微生物。',score:3,category:'化学污染物参数'},
  {id:609,qtype:'multi',stem:'氨的检测方法是（ ）。',options:['A. 靛酚蓝分光光度法', 'B. 气相色谱法', 'C. 撞击法', 'D. 酚试剂法'],answer:'AB',keyword:'氨',explanation:'氨常用靛酚蓝分光光度法，亦可用气相色谱法。',score:3,category:'化学污染物参数'},

  {id:611,qtype:'multi',stem:'尿素检测方法为（ ）。',options:['A. 二乙酰一肟法', 'B. 分光光度法', 'C. 气相色谱法', 'D. 滤膜法'],answer:'AB',keyword:'尿素',explanation:'尿素用二乙酰一肟分光光度法。',score:3,category:'化学污染物参数'},
  {id:612,qtype:'multi',stem:'样品采集的质量控制包括（ ）。',options:['A. 采样前流量校准', 'B. 设空白试验', 'C. 样品避光低温保存', 'D. 无需校准'],answer:'ABC',keyword:'质控',explanation:'采集需流量校准、空白试验、避光低温保存。',score:3,category:'化学污染物参数'},

  {id:776,qtype:'short',stem:'干湿球法测定相对湿度的关键条件有哪些？',options:[],answer:'通风器风速≥2.5 m/s，通风5 min后读数；湿球用脱脂纱布与蒸馏水包裹；采用系数A=0.000667/℃计算相对湿度。',keyword:'干湿球法,相对湿度',explanation:'通风器风速≥2.5 m/s，通风5 min后读数；湿球用脱脂纱布与蒸馏水包裹；采用系数A=0.000667/℃计算相对湿度。',score:5,category:'物理因素参数'},
  {id:777,qtype:'short',stem:'示踪气体法测定新风量的基本步骤是什么？',options:[],answer:'先测室内CO₂本底浓度；通入示踪气体后搅动3~5 min使浓度均匀；连续记录浓度-时间数据，至少取5点进行回归计算新风量。',keyword:'示踪气体法,新风量',explanation:'先测室内CO₂本底浓度；通入示踪气体后搅动3~5 min使浓度均匀；连续记录浓度-时间数据，至少取5点进行回归计算新风量。',score:5,category:'物理因素参数'},
  {id:778,qtype:'short',stem:'噪声测量中A计权、校准与读数有哪些规定？',options:[],answer:'采用A计权；测量前后用声校准器校准；脉冲噪声读峰值声压级；非稳态噪声每5 s读一次瞬时值求等效声级。',keyword:'噪声测量,A计权',explanation:'采用A计权；测量前后用声校准器校准；脉冲噪声读峰值声压级；非稳态噪声每5 s读一次瞬时值求等效声级。',score:5,category:'物理因素参数'},
  {id:779,qtype:'short',stem:'照度计使用应注意哪些事项？',options:[],answer:'量程1~5000 lx，误差±8%；受光器应水平放置、感光面朝向光源；仪器需计量检定合格并在有效期内。',keyword:'照度计,照度',explanation:'量程1~5000 lx，误差±8%；受光器应水平放置、感光面朝向光源；仪器需计量检定合格并在有效期内。',score:5,category:'物理因素参数'},
  {id:780,qtype:'short',stem:'简述空气温度、相对湿度、风速、新风量的常用检测方法。',options:[],answer:'空气温度用玻璃液体温度计或数显温度计；相对湿度用电阻电容法、干湿球法或氯化锂露点法；风速用电风速计；新风量用示踪气体法、风管法或风量罩法。',keyword:'物理因素,检测方法',explanation:'空气温度用玻璃液体温度计或数显温度计；相对湿度用电阻电容法、干湿球法或氯化锂露点法；风速用电风速计；新风量用示踪气体法、风管法或风量罩法。',score:5,category:'物理因素参数'},
  {id:781,qtype:'short',stem:'空盒气压表的正确读数步骤是什么？',options:[],answer:'先读取附属温度；轻敲盒面消除摩擦；垂直读数并记录，必要时作温度修正。',keyword:'空盒气压表,大气压',explanation:'先读取附属温度；轻敲盒面消除摩擦；垂直读数并记录，必要时作温度修正。',score:5,category:'物理因素参数'},
  {id:782,qtype:'short',stem:'辐射热与热舒适评价涉及哪些参数与方法？',options:[],answer:'辐射热用辐射热计(0~2kW/m²,分辨率0.001)或黑球温度计测定；热舒适采用PMV/PPD指标与7级热感觉标尺(+3热~-3冷)综合评价温度、湿度、风速。',keyword:'辐射热,热舒适',explanation:'辐射热用辐射热计(0~2kW/m²,分辨率0.001)或黑球温度计测定；热舒适采用PMV/PPD指标与7级热感觉标尺(+3热~-3冷)综合评价温度、湿度、风速。',score:5,category:'物理因素参数'},
  {id:783,qtype:'short',stem:'CO与CO₂不分光红外法的主要技术参数有何不同？',options:[],answer:'CO范围0.125~62.5mg/m³、t90%<45s、用霍加拉特除CO干扰；CO₂范围0%~0.5%、t90%<15s、用烧碱石棉除CO₂干扰、特征波长4260nm。',keyword:'不分光红外,CO,CO₂',explanation:'CO范围0.125~62.5mg/m³、t90%<45s、用霍加拉特除CO干扰；CO₂范围0%~0.5%、t90%<15s、用烧碱石棉除CO₂干扰、特征波长4260nm。',score:5,category:'化学污染物参数'},
  {id:784,qtype:'short',stem:'简述PM10滤膜称重法的平衡与采样条件。',options:[],answer:'滤膜在温度15~30℃、相对湿度45%~55%环境中平衡24 h后称重；采样时间≥20 h，采样前后同样条件平衡称重，差值即颗粒物质量。',keyword:'PM10,滤膜称重',explanation:'滤膜在温度15~30℃、相对湿度45%~55%环境中平衡24 h后称重；采样时间≥20 h，采样前后同样条件平衡称重，差值即颗粒物质量。',score:5,category:'化学污染物参数'},
  {id:785,qtype:'short',stem:'甲醛酚试剂分光光度法与HPLC法的主要区别是什么？',options:[],answer:'酚试剂法：0.5L/min采10L，630nm测定，硫酸铁铵显色，25~35℃显色15min；HPLC法：DNPH采样管，1.0L/min采50L，设臭氧去除柱，实验室衍生分析。',keyword:'甲醛,酚试剂,HPLC',explanation:'酚试剂法：0.5L/min采10L，630nm测定，硫酸铁铵显色，25~35℃显色15min；HPLC法：DNPH采样管，1.0L/min采50L，设臭氧去除柱，实验室衍生分析。',score:5,category:'化学污染物参数'},
  {id:786,qtype:'short',stem:'什么是标准状态？气体体积为何要换算？',options:[],answer:'标准状态为0℃、101.325kPa；气体污染物浓度以标准状态下体积计算，可消除温度压力影响，保证结果可比。',keyword:'标准状态,体积换算',explanation:'标准状态为0℃、101.325kPa；气体污染物浓度以标准状态下体积计算，可消除温度压力影响，保证结果可比。',score:5,category:'化学污染物参数'},
  {id:787,qtype:'short',stem:'简述TVOC与苯系物的检测思路。',options:[],answer:'用Tenax采样管富集空气中VOC，热解吸后经毛细管柱分离，以FID或质谱检测；依据保留时间定性、峰面积定量。',keyword:'TVOC,苯系物,气相色谱',explanation:'用Tenax采样管富集空气中VOC，热解吸后经毛细管柱分离，以FID或质谱检测；依据保留时间定性、峰面积定量。',score:5,category:'化学污染物参数'},
  {id:788,qtype:'short',stem:'甲醛光电光度法的特点是什么？',options:[],answer:'分辨率0.01mg/m³，响应时间t95%≤15min，可现场快速测定，适合即时评价。',keyword:'甲醛,光电光度',explanation:'分辨率0.01mg/m³，响应时间t95%≤15min，可现场快速测定，适合即时评价。',score:5,category:'化学污染物参数'},
  {id:789,qtype:'short',stem:'空气化学污染物采样质量控制有哪些要点？',options:[],answer:'采样前流量校准；设置空白试验；样品避光低温保存运输；按标准方法操作并做方法检出限与不确定度评定。',keyword:'化学污染物,质控',explanation:'采样前流量校准；设置空白试验；样品避光低温保存运输；按标准方法操作并做方法检出限与不确定度评定。',score:5,category:'化学污染物参数'},
  {id:790,qtype:'short',stem:'简述撞击法与自然沉降法的原理及结果报告方式。',options:[],answer:'撞击法用六级筛孔采样器(28.3L/min)将带菌空气撞击于平皿，结果按最大浓度皿以CFU/m³报告；沉降法平皿暴露5min靠重力沉降，结果按平均值CFU/皿报告。',keyword:'撞击法,沉降法,结果报告',explanation:'撞击法用六级筛孔采样器(28.3L/min)将带菌空气撞击于平皿，结果按最大浓度皿以CFU/m³报告；沉降法平皿暴露5min靠重力沉降，结果按平均值CFU/皿报告。',score:5,category:'空气微生物指标'},
  {id:791,qtype:'short',stem:'营养琼脂与沙氏琼脂的配方和培养条件有何不同？',options:[],answer:'营养琼脂：蛋白胨10g+牛肉膏3g+NaCl5g+琼脂20g，pH7.4±0.2，121℃15min，36℃±1℃48h(细菌)；沙氏琼脂：蛋白胨10g+葡萄糖40g+琼脂20g，pH5.6±0.2，115℃15min，28℃±1℃3~5d(真菌)。',keyword:'营养琼脂,沙氏琼脂,培养基',explanation:'营养琼脂：蛋白胨10g+牛肉膏3g+NaCl5g+琼脂20g，pH7.4±0.2，121℃15min，36℃±1℃48h(细菌)；沙氏琼脂：蛋白胨10g+葡萄糖40g+琼脂20g，pH5.6±0.2，115℃15min，28℃±1℃3~5d(真菌)。',score:5,category:'空气微生物指标'},
  {id:792,qtype:'short',stem:'嗜肺军团菌培养鉴定的要点是什么？',options:[],answer:'液体冲击采样2m³；接种GVPC(BCYE)培养基；在BCYE上生长而在BCYE-Cys上不生长为其特征；36℃±1℃、5%CO₂培养10d；亦可用mip基因PCR(Ct≤36阳性)快速检测。',keyword:'军团菌,培养,PCR',explanation:'液体冲击采样2m³；接种GVPC(BCYE)培养基；在BCYE上生长而在BCYE-Cys上不生长为其特征；36℃±1℃、5%CO₂培养10d；亦可用mip基因PCR(Ct≤36阳性)快速检测。',score:5,category:'空气微生物指标'},
  {id:793,qtype:'short',stem:'空气微生物检测的质控措施有哪些？',options:[],answer:'设空白对照；培养基做无菌检查；设阳性与阴性对照；样品4℃保存4h内送检；全程无菌操作。',keyword:'空气微生物,质控',explanation:'设空白对照；培养基做无菌检查；设阳性与阴性对照；样品4℃保存4h内送检；全程无菌操作。',score:5,category:'空气微生物指标'},
  {id:794,qtype:'short',stem:'β-溶血性链球菌的鉴定特征是什么？',options:[],answer:'在血琼脂平板上36℃±1℃培养18~24h，产生β溶血环；触酶阴性(-)；革兰染色阳性(+)呈链状排列。',keyword:'β溶血链球菌,鉴定',explanation:'在血琼脂平板上36℃±1℃培养18~24h，产生β溶血环；触酶阴性(-)；革兰染色阳性(+)呈链状排列。',score:5,category:'空气微生物指标'},
  {id:795,qtype:'short',stem:'样品保存运输为何要求4℃、4h内？',options:[],answer:'微生物在常温下易繁殖或死亡，4℃抑制生长、4h内送检可最大限度保持样品原始菌相，保证检测结果真实可靠。',keyword:'保存运输,微生物',explanation:'微生物在常温下易繁殖或死亡，4℃抑制生长、4h内送检可最大限度保持样品原始菌相，保证检测结果真实可靠。',score:5,category:'空气微生物指标'},
  {id:796,qtype:'short',stem:'空气微生物采样高度为何取呼吸带？',options:[],answer:'人群实际吸入的空气位于呼吸带(约距地1.2~1.5m)，取此高度采样最能代表人体暴露水平，使监测结果具有卫生学意义。',keyword:'采样高度,呼吸带',explanation:'人群实际吸入的空气位于呼吸带(约距地1.2~1.5m)，取此高度采样最能代表人体暴露水平，使监测结果具有卫生学意义。',score:5,category:'空气微生物指标'},
  {id:797,qtype:'short',stem:'公共用品用具微生物采样的面积与报告方式如何规定？',options:[],answer:'常用涂抹法或擦拭法采样，采样面积通常为25cm²或100cm²；结果以CFU/cm²或CFU/件报告。',keyword:'公共用品,采样面积,报告',explanation:'常用涂抹法或擦拭法采样，采样面积通常为25cm²或100cm²；结果以CFU/cm²或CFU/件报告。',score:5,category:'公共用品用具微生物指标'},
  {id:798,qtype:'short',stem:'大肠菌群与金黄色葡萄球菌的检验要点是什么？',options:[],answer:'大肠菌群用乳糖胆盐发酵(36℃±1℃24h)产酸产气为阳性；金葡用Baird-Parker平板分离，典型菌落黑色周围晕圈，再做凝固酶试验确认。',keyword:'大肠菌群,金葡菌,检验',explanation:'大肠菌群用乳糖胆盐发酵(36℃±1℃24h)产酸产气为阳性；金葡用Baird-Parker平板分离，典型菌落黑色周围晕圈，再做凝固酶试验确认。',score:5,category:'公共用品用具微生物指标'},
  {id:799,qtype:'short',stem:'真菌总数检测为何常用沙氏琼脂？',options:[],answer:'沙氏琼脂含葡萄糖40g、pH5.6±0.2，酸性环境抑制细菌生长而利于真菌；115℃15min灭菌避免糖焦化，28℃±1℃培养3~5d。',keyword:'真菌,沙氏琼脂',explanation:'沙氏琼脂含葡萄糖40g、pH5.6±0.2，酸性环境抑制细菌生长而利于真菌；115℃15min灭菌避免糖焦化，28℃±1℃培养3~5d。',score:5,category:'公共用品用具微生物指标'},
  {id:800,qtype:'short',stem:'公共用品微生物检测的质量控制有哪些？',options:[],answer:'无菌采样操作；设空白对照；采样液用生理盐水或缓冲液；检样旋涡振荡洗脱；平行样与规范记录。',keyword:'公共用品,质控',explanation:'无菌采样操作；设空白对照；采样液用生理盐水或缓冲液；检样旋涡振荡洗脱；平行样与规范记录。',score:5,category:'公共用品用具微生物指标'},
  {id:801,qtype:'short',stem:'简述公共用品用具卫生监测的意义与对象。',options:[],answer:'对象包括茶具、毛巾、床上用品、理发工具等顾客重复使用物品；通过细菌总数、大肠菌群、金葡菌等指标评价卫生状况，预防交叉感染。',keyword:'公共用品,卫生监测',explanation:'对象包括茶具、毛巾、床上用品、理发工具等顾客重复使用物品；通过细菌总数、大肠菌群、金葡菌等指标评价卫生状况，预防交叉感染。',score:5,category:'公共用品用具微生物指标'},
  {id:802,qtype:'short',stem:'公共用品采样为何要规定面积并均匀涂抹？',options:[],answer:'规定面积(25或100cm²)使结果可比；均匀涂抹保证采样代表性，避免局部遗漏造成结果偏差。',keyword:'采样面积,涂抹',explanation:'规定面积(25或100cm²)使结果可比；均匀涂抹保证采样代表性，避免局部遗漏造成结果偏差。',score:5,category:'公共用品用具微生物指标'},
  {id:803,qtype:'short',stem:'集中空调通风系统的主要检测指标有哪些？',options:[],answer:'包括新风量(风管法)、送风PM10、送风细菌总数、真菌总数、β-溶血性链球菌、风管积尘量，以及冷却水/冷凝水嗜肺军团菌。',keyword:'集中空调,检测指标',explanation:'包括新风量(风管法)、送风PM10、送风细菌总数、真菌总数、β-溶血性链球菌、风管积尘量，以及冷却水/冷凝水嗜肺军团菌。',score:5,category:'集中空调通风系统'},
  {id:804,qtype:'short',stem:'风管检测断面与布点应如何选择？',options:[],answer:'断面应选在直管段，避开弯头、阀门，上游≥3D、下游≥1.5D；圆形风管按直径分环(≤1m分1~2环测4~8点)，矩形风管分块等面积布点。',keyword:'风管,断面,布点',explanation:'断面应选在直管段，避开弯头、阀门，上游≥3D、下游≥1.5D；圆形风管按直径分环(≤1m分1~2环测4~8点)，矩形风管分块等面积布点。',score:5,category:'集中空调通风系统'},
  {id:805,qtype:'short',stem:'新风比如何计算？其卫生意义是什么？',options:[],answer:'新风比=新风量/总送风量；反映系统引入新鲜空气的比例，比值过低会导致室内污染物累积、空气质量下降。',keyword:'新风比,集中空调',explanation:'新风比=新风量/总送风量；反映系统引入新鲜空气的比例，比值过低会导致室内污染物累积、空气质量下降。',score:5,category:'集中空调通风系统'},
  {id:806,qtype:'short',stem:'冷却水与冷凝水为何要监测嗜肺军团菌？',options:[],answer:'空调冷却塔、冷凝水温暖湿润易滋生军团菌，可经气溶胶传播引起军团菌病；标准规定不得检出，需重点定期监测。',keyword:'军团菌,冷却水,冷凝水',explanation:'空调冷却塔、冷凝水温暖湿润易滋生军团菌，可经气溶胶传播引起军团菌病；标准规定不得检出，需重点定期监测。',score:5,category:'集中空调通风系统'},
  {id:807,qtype:'short',stem:'风管积尘量如何检测及限值？',options:[],answer:'用擦拭法对规定面积风管内壁定量擦拭收集积尘，烘干称重；卫生限值为≤20g/m²，超标需清洗。',keyword:'积尘量,擦拭法',explanation:'用擦拭法对规定面积风管内壁定量擦拭收集积尘，烘干称重；卫生限值为≤20g/m²，超标需清洗。',score:5,category:'集中空调通风系统'},
  {id:808,qtype:'short',stem:'集中空调送风微生物的限值是多少？',options:[],answer:'送风细菌总数≤500CFU/m³，真菌总数≤500CFU/m³，并不得检出β-溶血性链球菌。',keyword:'送风微生物,限值',explanation:'送风细菌总数≤500CFU/m³，真菌总数≤500CFU/m³，并不得检出β-溶血性链球菌。',score:5,category:'集中空调通风系统'},
  {id:809,qtype:'short',stem:'通风系统检测的评价依据有哪些标准？',options:[],answer:'主要依据WS 394、GB 37488、GB/T 18204等，结合新风量、颗粒物与微生物指标综合判定卫生状况。',keyword:'集中空调,评价依据',explanation:'主要依据WS 394、GB 37488、GB/T 18204等，结合新风量、颗粒物与微生物指标综合判定卫生状况。',score:5,category:'集中空调通风系统'},
  {id:810,qtype:'short',stem:'医院环境分类及平板暴露法限值如何规定？',options:[],answer:'分Ⅰ~Ⅳ类；Ⅱ类环境(手术室、ICU等)空气≤4CFU/皿(暴露15min)，Ⅲ类环境(普通病房等)≤4CFU/皿(暴露5min)。',keyword:'医院消毒,平板暴露,环境分类',explanation:'分Ⅰ~Ⅳ类；Ⅱ类环境(手术室、ICU等)空气≤4CFU/皿(暴露15min)，Ⅲ类环境(普通病房等)≤4CFU/皿(暴露5min)。',score:5,category:'医院消毒卫生标准'},
  {id:811,qtype:'short',stem:'医务人员手卫生与使用中消毒液的微生物限值是多少？',options:[],answer:'卫生手≤10CFU/cm²(外科手更严)；使用中消毒液染菌量≤100CFU/mL且不得检出致病菌。',keyword:'手卫生,消毒液,限值',explanation:'卫生手≤10CFU/cm²(外科手更严)；使用中消毒液染菌量≤100CFU/mL且不得检出致病菌。',score:5,category:'医院消毒卫生标准'},
  {id:812,qtype:'short',stem:'紫外线灯辐照强度要求及监测方法是什么？',options:[],answer:'使用中紫外线灯辐照强度≥70μW/cm²(新灯≥90μW/cm²)；用紫外线强度仪定期监测，强度不足及时更换。',keyword:'紫外线灯,辐照强度',explanation:'使用中紫外线灯辐照强度≥70μW/cm²(新灯≥90μW/cm²)；用紫外线强度仪定期监测，强度不足及时更换。',score:5,category:'医院消毒卫生标准'},
  {id:813,qtype:'short',stem:'压力蒸汽灭菌的生物指示剂是什么？如何判定？',options:[],answer:'用嗜热脂肪杆菌芽孢作为生物指示剂，56℃培养7d，若指示剂无菌生长判灭菌合格。',keyword:'压力蒸汽灭菌,生物指示剂',explanation:'用嗜热脂肪杆菌芽孢作为生物指示剂，56℃培养7d，若指示剂无菌生长判灭菌合格。',score:5,category:'医院消毒卫生标准'},
  {id:814,qtype:'short',stem:'医院消毒效果监测主要包括哪些方面？',options:[],answer:'空气微生物(平板暴露/浮游菌)、物体表面、医务人员手、使用中消毒液染菌量、紫外线灯强度、消毒灭菌器材等。',keyword:'医院消毒,监测内容',explanation:'空气微生物(平板暴露/浮游菌)、物体表面、医务人员手、使用中消毒液染菌量、紫外线灯强度、消毒灭菌器材等。',score:5,category:'医院消毒卫生标准'},
  {id:815,qtype:'short',stem:'物体表面微生物监测如何操作？',options:[],answer:'用规格板确定采样面积，以无菌棉拭涂抹采样，洗脱后倾注培养，Ⅱ类环境物体表面≤5CFU/cm²。',keyword:'物体表面,监测',explanation:'用规格板确定采样面积，以无菌棉拭涂抹采样，洗脱后倾注培养，Ⅱ类环境物体表面≤5CFU/cm²。',score:5,category:'医院消毒卫生标准'},
  {id:816,qtype:'short',stem:'无菌检验为何要设阴性、阳性对照？',options:[],answer:'阴性对照验证操作与培养基无污染；阳性对照验证培养系统可支持目标菌生长，确保检验结果可信。',keyword:'无菌检验,对照',explanation:'阴性对照验证操作与培养基无污染；阳性对照验证培养系统可支持目标菌生长，确保检验结果可信。',score:5,category:'医院消毒卫生标准'},
  {id:817,qtype:'short',stem:'生活饮用水感官指标包括哪些？各自方法是什么？',options:[],answer:'色度(铂钴标准比色法，单位\'度\')、浑浊度(散射法，单位NTU)、臭和味(嗅气尝味感官法)、肉眼可见物(直接观察)。',keyword:'感官指标,方法',explanation:'色度(铂钴标准比色法，单位\'度\')、浑浊度(散射法，单位NTU)、臭和味(嗅气尝味感官法)、肉眼可见物(直接观察)。',score:5,category:'生活饮用水'},
  {id:818,qtype:'short',stem:'游离氯与总氯的检测方法及意义是什么？',options:[],answer:'均用DPD法(N,N-二乙基对苯二胺显色)；游离氯反映消毒有效余量，管网末梢≥0.05mg/L保障持续消毒。',keyword:'游离氯,总氯,DPD',explanation:'均用DPD法(N,N-二乙基对苯二胺显色)；游离氯反映消毒有效余量，管网末梢≥0.05mg/L保障持续消毒。',score:5,category:'生活饮用水'},
  {id:819,qtype:'short',stem:'总大肠菌群与菌落总数的检测方法及限值？',options:[],answer:'总大肠菌群用多管发酵法或滤膜法，要求不得检出；菌落总数用PCA培养基36℃±1℃48h培养，限值≤100CFU/mL。',keyword:'总大肠菌群,菌落总数',explanation:'总大肠菌群用多管发酵法或滤膜法，要求不得检出；菌落总数用PCA培养基36℃±1℃48h培养，限值≤100CFU/mL。',score:5,category:'生活饮用水'},
  {id:820,qtype:'short',stem:'生活饮用水采样与保存应注意什么？',options:[],answer:'用洁净玻璃瓶采集，从水源到末梢布点具代表性；样品冷藏避光、尽快检测，防止微生物变化与污染。',keyword:'采样保存,饮用水',explanation:'用洁净玻璃瓶采集，从水源到末梢布点具代表性；样品冷藏避光、尽快检测，防止微生物变化与污染。',score:5,category:'生活饮用水'},
  {id:821,qtype:'short',stem:'浑浊度的定义与限值是什么？',options:[],answer:'浑浊度表示水的清澈程度，用散射法测定，单位NTU；生活饮用水限值≤1NTU。',keyword:'浑浊度,NTU',explanation:'浑浊度表示水的清澈程度，用散射法测定，单位NTU；生活饮用水限值≤1NTU。',score:5,category:'生活饮用水'},
  {id:822,qtype:'short',stem:'滤膜法与多管发酵法检测总大肠菌群的原理？',options:[],answer:'滤膜法用0.45μm滤膜截留细菌，培养计数；多管发酵法利用乳糖发酵产酸产气，以MPN统计最可能数。',keyword:'总大肠菌群,滤膜法,多管发酵',explanation:'滤膜法用0.45μm滤膜截留细菌，培养计数；多管发酵法利用乳糖发酵产酸产气，以MPN统计最可能数。',score:5,category:'生活饮用水'},
  {id:823,qtype:'short',stem:'生活饮用水监测的目的与指标分类？',options:[],answer:'目的为保障饮水安全与监督执法；指标分微生物、毒理、感官性状和一般化学、放射性等。',keyword:'监测目的,指标分类',explanation:'目的为保障饮水安全与监督执法；指标分微生物、毒理、感官性状和一般化学、放射性等。',score:5,category:'生活饮用水'},
  {id:824,qtype:'short',stem:'游泳池水游离性余氯与氧化还原电位的限值及意义？',options:[],answer:'游离性余氯0.3~1.0mg/L，保证消毒效果又不过量刺激；氧化还原电位(ORP)≥650mV，反映水体氧化消毒能力。',keyword:'游离余氯,氧化还原电位',explanation:'游离性余氯0.3~1.0mg/L，保证消毒效果又不过量刺激；氧化还原电位(ORP)≥650mV，反映水体氧化消毒能力。',score:5,category:'游泳池水'},
  {id:825,qtype:'short',stem:'泳池水尿素、pH、浑浊度、细菌总数的限值？',options:[],answer:'尿素≤3.5mg/L，pH7.0~7.8，浑浊度≤1NTU，细菌总数≤200CFU/mL，大肠菌群不得检出。',keyword:'尿素,pH,浑浊度,细菌总数',explanation:'尿素≤3.5mg/L，pH7.0~7.8，浑浊度≤1NTU，细菌总数≤200CFU/mL，大肠菌群不得检出。',score:5,category:'游泳池水'},
  {id:826,qtype:'short',stem:'氰尿酸与化合性余氯在泳池水中有何作用与限值？',options:[],answer:'氰尿酸为氯稳定剂，限值≤100mg/L；化合性余氯为氯与氨氮结合物，过高增加刺激，应控制。',keyword:'氰尿酸,化合性余氯',explanation:'氰尿酸为氯稳定剂，限值≤100mg/L；化合性余氯为氯与氨氮结合物，过高增加刺激，应控制。',score:5,category:'游泳池水'},
  {id:827,qtype:'short',stem:'浸脚消毒池的设置与余氯要求？',options:[],answer:'泳池入口强制设置浸脚消毒池与强制淋浴；浸脚池游离余氯5~10mg/L，防止脚带菌入池。',keyword:'浸脚池,余氯',explanation:'泳池入口强制设置浸脚消毒池与强制淋浴；浸脚池游离余氯5~10mg/L，防止脚带菌入池。',score:5,category:'游泳池水'},
  {id:828,qtype:'short',stem:'泳池水微生物监测对象与军团菌风险？',options:[],answer:'监测细菌总数、大肠菌群、嗜肺军团菌；冷却塔与池水温暖易滋生军团菌，需重点防控。',keyword:'泳池微生物,军团菌',explanation:'监测细菌总数、大肠菌群、嗜肺军团菌；冷却塔与池水温暖易滋生军团菌，需重点防控。',score:5,category:'游泳池水'},
  {id:829,qtype:'short',stem:'池水温度与透明度如何检测？',options:[],answer:'池水温度用温度计测定，控制在适宜范围；透明度用透明度盘测定可见深度，反映水的清澈程度。',keyword:'池水温度,池水透明度',explanation:'池水温度用温度计测定，控制在适宜范围；透明度用透明度盘测定可见深度，反映水的清澈程度。',score:5,category:'游泳池水'},
  {id:830,qtype:'short',stem:'泳池水检测频次与水质公示要求？',options:[],answer:'开放期间持续监测关键指标(余氯、pH、ORP等)，现场可用DPD试纸快速检测；水质结果应公示保障公众知情。',keyword:'检测频次,水质公示',explanation:'开放期间持续监测关键指标(余氯、pH、ORP等)，现场可用DPD试纸快速检测；水质结果应公示保障公众知情。',score:5,category:'游泳池水'},
  {id:831,qtype:'scenario',stem:'某办公室检测显示：玻璃液体温度计读数为26.8℃，但未做零点校正；照度计受光器竖直放置测得300lx；噪声用C计权读数。请分析可能的错误并给出正确做法。',options:[],answer:'错误：(1)玻璃液体温度计未做零点位移校正，读数可能偏差；(2)照度计受光器应水平放置而非竖直，方向错误导致读数偏低；(3)噪声应使用A计权而非C计权。正确做法：温度计先校正零点、估读半分度；照度计受光器水平朝向光源；噪声采用A计权并用声校准器校准。',keyword:'玻璃液体温度计,照度计,噪声',explanation:'错误：(1)玻璃液体温度计未做零点位移校正，读数可能偏差；(2)照度计受光器应水平放置而非竖直，方向错误导致读数偏低；(3)噪声应使用A计权而非C计权。正确做法：温度计先校正零点、估读半分度；照度计受光器水平朝向光源；噪声采用A计权并用声校准器校准。',score:10,category:'物理因素参数'},
  {id:832,qtype:'scenario',stem:'某实验室用干湿球法测湿度，通风器风速仅1.0m/s，湿球用自来水浸湿纱布，通风2min后读数。结果可信吗？',options:[],answer:'不可信。干湿球法要求通风风速≥2.5m/s使湿球充分蒸发，且湿球须用脱脂纱布与蒸馏水，不能用自来水；通风时间应5min。风速不足、用水不当、时间不够均使相对湿度读数失真。',keyword:'干湿球法,相对湿度',explanation:'不可信。干湿球法要求通风风速≥2.5m/s使湿球充分蒸发，且湿球须用脱脂纱布与蒸馏水，不能用自来水；通风时间应5min。风速不足、用水不当、时间不够均使相对湿度读数失真。',score:10,category:'物理因素参数'},
  {id:833,qtype:'scenario',stem:'新风量示踪气体法检测中，检测员直接通入CO₂后立刻开始记录，未测本底，仅取2个数据点回归。存在哪些问题？',options:[],answer:'问题：(1)未测室内CO₂本底，无法扣除背景影响；(2)未搅动3~5min使浓度均匀；(3)仅2点不足以回归，标准至少取5点进行浓度-时间回归计算才可靠。',keyword:'示踪气体法,新风量',explanation:'问题：(1)未测室内CO₂本底，无法扣除背景影响；(2)未搅动3~5min使浓度均匀；(3)仅2点不足以回归，标准至少取5点进行浓度-时间回归计算才可靠。',score:10,category:'物理因素参数'},
  {id:834,qtype:'scenario',stem:'集中空调风管检测断面选在弯头后0.5D处，圆形风管直径0.8m仅布1点。请评价布点合理性。',options:[],answer:'不合理。风管断面应选直管段、避开弯头阀门，上游≥3D下游≥1.5D；直径≤1m的圆管应分1~2环、测4~8点，仅1点不能代表断面流速分布，风量计算结果偏差大。',keyword:'风管,断面,布点',explanation:'不合理。风管断面应选直管段、避开弯头阀门，上游≥3D下游≥1.5D；直径≤1m的圆管应分1~2环、测4~8点，仅1点不能代表断面流速分布，风量计算结果偏差大。',score:10,category:'物理因素参数'},
  {id:835,qtype:'scenario',stem:'甲醛检测中，检测员用酚试剂法以1.0L/min流量采5L，显色在15℃放置30min后630nm测定。结果是否可靠？',options:[],answer:'不可靠。酚试剂法应0.5L/min采10L，显色温度25~35℃、时间15min；本例流量过大、采样体积不足、温度偏低且显色超时，均影响630nm吸光度，结果偏低且不可比。',keyword:'甲醛,酚试剂',explanation:'不可靠。酚试剂法应0.5L/min采10L，显色温度25~35℃、时间15min；本例流量过大、采样体积不足、温度偏低且显色超时，均影响630nm吸光度，结果偏低且不可比。',score:10,category:'化学污染物参数'},
  {id:836,qtype:'scenario',stem:'某室内CO₂不分光红外仪读数持续偏高，检查见仪器内烧碱石棉已潮解结块。分析影响并说明正确维护。',options:[],answer:'烧碱石棉用于吸收CO₂干扰，潮解结块后失效，无法排除本底CO₂，导致读数偏高、响应变慢(标准t90%应<15s)。应更换干燥有效的烧碱石棉，定期检定，保证特征波长4260nm通道正常。',keyword:'CO₂,不分光红外,烧碱石棉',explanation:'烧碱石棉用于吸收CO₂干扰，潮解结块后失效，无法排除本底CO₂，导致读数偏高、响应变慢(标准t90%应<15s)。应更换干燥有效的烧碱石棉，定期检定，保证特征波长4260nm通道正常。',score:10,category:'化学污染物参数'},
  {id:837,qtype:'scenario',stem:'PM10滤膜称重法结果异常偏低，滤膜平衡仅在室温下放置2h即称重。问题在哪？',options:[],answer:'问题在于未满足平衡条件：滤膜应在温度15~30℃、相对湿度45%~55%环境中平衡24h，使滤膜吸湿达到稳定；仅2h远不足，称重误差大。同时采样应≥20h，否则代表性差。',keyword:'PM10,滤膜称重,平衡',explanation:'问题在于未满足平衡条件：滤膜应在温度15~30℃、相对湿度45%~55%环境中平衡24h，使滤膜吸湿达到稳定；仅2h远不足，称重误差大。同时采样应≥20h，否则代表性差。',score:10,category:'化学污染物参数'},
  {id:838,qtype:'scenario',stem:'空气中TVOC检测用Tenax管采样后，样品在常温袋中放置一周才分析。结果可信吗？',options:[],answer:'不可靠。TVOC样品采集后须避光、低温(如4℃)尽快热解吸-气相色谱分析；常温放置一周挥发性组分易损失或变化，且应设空白，导致结果失真。',keyword:'TVOC,气相色谱,样品保存',explanation:'不可靠。TVOC样品采集后须避光、低温(如4℃)尽快热解吸-气相色谱分析；常温放置一周挥发性组分易损失或变化，且应设空白，导致结果失真。',score:10,category:'化学污染物参数'},
  {id:839,qtype:'scenario',stem:'某医院用撞击法测空气细菌，六级筛孔采样器流量调至100L/min，采样20min。结果如何评价？',options:[],answer:'不合理。撞击法标准流量28.3L/min、采样5~15min；100L/min远超且20min过长会导致平皿菌落过载(有效计数30~300CFU)，无法准确计数，应调回标准流量并控制时间。',keyword:'撞击法,流量,采样时间',explanation:'不合理。撞击法标准流量28.3L/min、采样5~15min；100L/min远超且20min过长会导致平皿菌落过载(有效计数30~300CFU)，无法准确计数，应调回标准流量并控制时间。',score:10,category:'空气微生物指标'},
  {id:840,qtype:'scenario',stem:'营养琼脂灭菌误用115℃ 30min，培养细菌48h后菌落很少。分析原因。',options:[],answer:'营养琼脂标准灭菌121℃ 15min；115℃ 30min可能灭菌不彻底致杂菌竞争或成分变化影响细菌生长，菌落少且结果不可靠。真菌用的沙氏琼脂才用115℃ 15min。应严格按配方灭菌条件操作。',keyword:'营养琼脂,灭菌',explanation:'营养琼脂标准灭菌121℃ 15min；115℃ 30min可能灭菌不彻底致杂菌竞争或成分变化影响细菌生长，菌落少且结果不可靠。真菌用的沙氏琼脂才用115℃ 15min。应严格按配方灭菌条件操作。',score:10,category:'空气微生物指标'},
  {id:841,qtype:'scenario',stem:'自然沉降法测真菌，平皿暴露30min后28℃培养5d计数。方法是否规范？',options:[],answer:'不规范。沉降法标准暴露5min；暴露30min过长使沉降过多、菌落重叠，且真菌用沙氏琼脂28℃±1℃培养3~5d，结果应以平均值CFU/皿报告。超时导致计数失真。',keyword:'沉降法,真菌,暴露时间',explanation:'不规范。沉降法标准暴露5min；暴露30min过长使沉降过多、菌落重叠，且真菌用沙氏琼脂28℃±1℃培养3~5d，结果应以平均值CFU/皿报告。超时导致计数失真。',score:10,category:'空气微生物指标'},
  {id:842,qtype:'scenario',stem:'冷却塔水军团菌培养：接种BCYE平板36℃培养3d未见生长即报阴性。是否正确？',options:[],answer:'不正确。军团菌生长缓慢，应在BCYE和BCYE-Cys上36℃±1℃、5%CO₂培养10d；仅在BCYE生长、BCYE-Cys不生长为阳性特征，3d太短易漏检。亦可用mip基因PCR(Ct≤36阳性)辅助。',keyword:'军团菌,培养,BCYE',explanation:'不正确。军团菌生长缓慢，应在BCYE和BCYE-Cys上36℃±1℃、5%CO₂培养10d；仅在BCYE生长、BCYE-Cys不生长为阳性特征，3d太短易漏检。亦可用mip基因PCR(Ct≤36阳性)辅助。',score:10,category:'空气微生物指标'},
  {id:843,qtype:'scenario',stem:'对某宾馆毛巾涂抹采样，采样面积随意取约50cm²，结果以CFU/mL报告。有何错误？',options:[],answer:'错误：(1)公共用品采样面积应规范为25cm²或100cm²，50cm²非标准；(2)结果应以CFU/cm²或CFU/件报告，不能用CFU/mL(那是液体单位)。应规范面积并用对应单位。',keyword:'公共用品,采样面积,报告单位',explanation:'错误：(1)公共用品采样面积应规范为25cm²或100cm²，50cm²非标准；(2)结果应以CFU/cm²或CFU/件报告，不能用CFU/mL(那是液体单位)。应规范面积并用对应单位。',score:10,category:'公共用品用具微生物指标'},
  {id:844,qtype:'scenario',stem:'茶具大肠菌群检测：直接用未灭菌棉拭涂抹后接种营养琼脂，36℃培养看菌落。能否判定？',options:[],answer:'不能。大肠菌群初筛应用乳糖胆盐发酵管(36℃±1℃ 24h)产酸产气，再分离确证；营养琼脂用于细菌总数非大肠菌群。且棉拭须无菌，否则交叉污染。方法错误无法判定。',keyword:'大肠菌群,乳糖胆盐,公共用品',explanation:'不能。大肠菌群初筛应用乳糖胆盐发酵管(36℃±1℃ 24h)产酸产气，再分离确证；营养琼脂用于细菌总数非大肠菌群。且棉拭须无菌，否则交叉污染。方法错误无法判定。',score:10,category:'公共用品用具微生物指标'},
  {id:845,qtype:'scenario',stem:'理发工具金葡菌检测见Baird-Parker平板上黑色菌落但无周围晕圈，做凝固酶试验阴性。如何报告？',options:[],answer:'Baird-Parker典型金葡菌落为黑色、周围有浑浊晕圈(卵磷脂酶)；无晕圈且凝固酶阴性，不符合金黄色葡萄球菌特征，应报告未检出金黄色葡萄球菌，避免误判。',keyword:'金葡菌,Baird-Parker,凝固酶',explanation:'Baird-Parker典型金葡菌落为黑色、周围有浑浊晕圈(卵磷脂酶)；无晕圈且凝固酶阴性，不符合金黄色葡萄球菌特征，应报告未检出金黄色葡萄球菌，避免误判。',score:10,category:'公共用品用具微生物指标'},
  {id:846,qtype:'scenario',stem:'公共用品采样后棉拭在室温放置过夜再洗脱培养，细菌总数结果很高。结果可信吗？',options:[],answer:'不可信。样品应无菌操作、冷藏(4℃)并尽快(一般4h内)送检洗脱；室温过夜使微生物大量繁殖或杂菌污染，导致细菌总数虚高，不能反映真实卫生状况。',keyword:'公共用品,保存运输,细菌总数',explanation:'不可信。样品应无菌操作、冷藏(4℃)并尽快(一般4h内)送检洗脱；室温过夜使微生物大量繁殖或杂菌污染，导致细菌总数虚高，不能反映真实卫生状况。',score:10,category:'公共用品用具微生物指标'},
  {id:847,qtype:'scenario',stem:'某商场集中空调新风量检测仅在回风管用风管法测一点，计算得到新风量达标。评价是否合理？',options:[],answer:'不合理。新风量应在新风管测定，不能在回风管；且单点不能代表断面，圆管应分环布4~8点、矩形分块。回风含循环风，以此算新风量严重失真，无法评价真实新风供给。',keyword:'集中空调,新风量,风管法',explanation:'不合理。新风量应在新风管测定，不能在回风管；且单点不能代表断面，圆管应分环布4~8点、矩形分块。回风含循环风，以此算新风量严重失真，无法评价真实新风供给。',score:10,category:'集中空调通风系统'},
  {id:848,qtype:'scenario',stem:'冷却塔水检测未检出军团菌，但冷凝水未采样。卫生学评价是否完整？',options:[],answer:'不完整。标准规定冷却水与冷凝水均应监测嗜肺军团菌，且要求不得检出；仅查冷却水遗漏冷凝水这一潜在污染源，评价不全面，存在健康风险隐患。',keyword:'军团菌,冷却水,冷凝水',explanation:'不完整。标准规定冷却水与冷凝水均应监测嗜肺军团菌，且要求不得检出；仅查冷却水遗漏冷凝水这一潜在污染源，评价不全面，存在健康风险隐患。',score:10,category:'集中空调通风系统'},
  {id:849,qtype:'scenario',stem:'风管积尘量检测：用擦拭法收集某段风管内壁积尘，烘干后称重得25g/m²。是否合格？',options:[],answer:'不合格。集中空调风管积尘量卫生限值为≤20g/m²；25g/m²超标，提示风管污染较重，应按规范进行清洗，并复测合格后方可继续使用。',keyword:'积尘量,擦拭法,限值',explanation:'不合格。集中空调风管积尘量卫生限值为≤20g/m²；25g/m²超标，提示风管污染较重，应按规范进行清洗，并复测合格后方可继续使用。',score:10,category:'集中空调通风系统'},
  {id:850,qtype:'scenario',stem:'送风口细菌总数检测布点选在机房内而非各楼层送风口，结果≤500CFU/m³判合格。合理吗？',options:[],answer:'不合理。送风微生物应在各代表楼层靠近送风口采样测送风质量；仅在机房测不能反映末端送风实际污染，布点不具代表性，结论不可靠。',keyword:'送风微生物,布点,限值',explanation:'不合理。送风微生物应在各代表楼层靠近送风口采样测送风质量；仅在机房测不能反映末端送风实际污染，布点不具代表性，结论不可靠。',score:10,category:'集中空调通风系统'},
  {id:851,qtype:'scenario',stem:'Ⅱ类手术室平板暴露法检测：平皿暴露5min，结果3CFU/皿，判合格。是否正确？',options:[],answer:'不正确。Ⅱ类环境平板暴露法应暴露15min，限值≤4CFU/皿；本例仅暴露5min(属Ⅲ类时间)，菌落数偏低，不能据此判合格。应按对应环境类别的时间与限值评价。',keyword:'医院消毒,平板暴露,Ⅱ类',explanation:'不正确。Ⅱ类环境平板暴露法应暴露15min，限值≤4CFU/皿；本例仅暴露5min(属Ⅲ类时间)，菌落数偏低，不能据此判合格。应按对应环境类别的时间与限值评价。',score:10,category:'医院消毒卫生标准'},
  {id:852,qtype:'scenario',stem:'使用中消毒液染菌量检测：稀释后直接倾注PCA培养，计数得80CFU/mL，报合格。有无问题？',options:[],answer:'有问题。使用中消毒液含消毒剂，须先加中和剂消除残留后再培养，否则消毒剂抑制细菌使计数偏低；且限值为≤100CFU/mL且不得检出致病菌。应做中和剂试验并查致病菌后方可判定。',keyword:'消毒液,中和剂,染菌量',explanation:'有问题。使用中消毒液含消毒剂，须先加中和剂消除残留后再培养，否则消毒剂抑制细菌使计数偏低；且限值为≤100CFU/mL且不得检出致病菌。应做中和剂试验并查致病菌后方可判定。',score:10,category:'医院消毒卫生标准'},
  {id:853,qtype:'scenario',stem:'新装紫外线灯强度仪测得75μW/cm²即投入使用。是否合规？',options:[],answer:'不合规。新紫外线灯辐照强度应≥90μW/cm²，使用中灯才要求≥70μW/cm²；新灯仅75μW/cm²说明灯管质量或老化，不应作为新灯使用，须更换合格灯管并定期监测。',keyword:'紫外线灯,辐照强度',explanation:'不合规。新紫外线灯辐照强度应≥90μW/cm²，使用中灯才要求≥70μW/cm²；新灯仅75μW/cm²说明灯管质量或老化，不应作为新灯使用，须更换合格灯管并定期监测。',score:10,category:'医院消毒卫生标准'},
  {id:854,qtype:'scenario',stem:'压力蒸汽灭菌生物监测：嗜热脂肪杆菌芽孢指示剂56℃培养7d见浑浊生长。如何判定？',options:[],answer:'培养7d后有菌生长(浑浊)表明灭菌失败，指示剂未被杀灭，该批次灭菌物品判为不合格，须重新处理并查找灭菌参数(温度、时间、蒸汽质量)问题，不得发放使用。',keyword:'压力蒸汽灭菌,生物指示剂',explanation:'培养7d后有菌生长(浑浊)表明灭菌失败，指示剂未被杀灭，该批次灭菌物品判为不合格，须重新处理并查找灭菌参数(温度、时间、蒸汽质量)问题，不得发放使用。',score:10,category:'医院消毒卫生标准'},
  {id:855,qtype:'scenario',stem:'某水厂浑浊度用透射法测得2NTU即判合格。是否正确？',options:[],answer:'不正确。生活饮用水浑浊度标准方法为散射法、单位NTU，限值≤1NTU；透射法原理不同且结果不可比，2NTU也超限值。应改用散射法复测并达标(≤1NTU)。',keyword:'浑浊度,散射法,NTU',explanation:'不正确。生活饮用水浑浊度标准方法为散射法、单位NTU，限值≤1NTU；透射法原理不同且结果不可比，2NTU也超限值。应改用散射法复测并达标(≤1NTU)。',score:10,category:'生活饮用水'},
  {id:856,qtype:'scenario',stem:'管网末梢水游离氯仅0.02mg/L，但细菌总数合格。能否认为消毒有保障？',options:[],answer:'不能。管网末梢游离氯应≥0.05mg/L以维持持续消毒能力；0.02mg/L过低，虽本次细菌合格，但余氯不足时管网易受二次污染，存在安全风险，应查找加氯量或管网问题。',keyword:'游离氯,末梢水,消毒',explanation:'不能。管网末梢游离氯应≥0.05mg/L以维持持续消毒能力；0.02mg/L过低，虽本次细菌合格，但余氯不足时管网易受二次污染，存在安全风险，应查找加氯量或管网问题。',score:10,category:'生活饮用水'},
  {id:857,qtype:'scenario',stem:'总大肠菌群滤膜法检测：用0.45μm滤膜过滤100mL，36℃培养24h计数典型菌落。方法是否规范？',options:[],answer:'基本规范但培养时间偏短：滤膜法用0.45μm滤膜截留细菌，总大肠菌群典型菌落一般需36℃±1℃培养48h确认；24h可能漏检慢生长菌株，应延长并做确证。',keyword:'总大肠菌群,滤膜法',explanation:'基本规范但培养时间偏短：滤膜法用0.45μm滤膜截留细菌，总大肠菌群典型菌落一般需36℃±1℃培养48h确认；24h可能漏检慢生长菌株，应延长并做确证。',score:10,category:'生活饮用水'},
  {id:858,qtype:'scenario',stem:'水质色度检测人员用蒸馏水作空白、铂钴标准系列比色得5度，报合格。操作要点还有哪些？',options:[],answer:'方法正确(铂钴标准比色法、单位度)。还应注意：样品采集用洁净玻璃瓶、避免污染与色度变化；结果与限值比较；臭和味、肉眼可见物等感官指标需同步评价。',keyword:'色度,铂钴标准,感官指标',explanation:'方法正确(铂钴标准比色法、单位度)。还应注意：样品采集用洁净玻璃瓶、避免污染与色度变化；结果与限值比较；臭和味、肉眼可见物等感官指标需同步评价。',score:10,category:'生活饮用水'},
  {id:859,qtype:'scenario',stem:'泳池游离性余氯实测0.15mg/L，ORP仅580mV，但细菌总数合格。能否开放？',options:[],answer:'不能。泳池游离性余氯应0.3~1.0mg/L、ORP≥650mV；0.15mg/L与580mV均不达标，消毒氧化能力不足，虽本次细菌合格仍存在致病微生物风险，须加氯至达标并复测后方可开放。',keyword:'游离余氯,氧化还原电位,泳池',explanation:'不能。泳池游离性余氯应0.3~1.0mg/L、ORP≥650mV；0.15mg/L与580mV均不达标，消毒氧化能力不足，虽本次细菌合格仍存在致病微生物风险，须加氯至达标并复测后方可开放。',score:10,category:'游泳池水'},

// ===== 验证码系统 =====
const CAPTCHA_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

function generateCaptcha() {
  let ops = [], code = "";
  for (let i = 0; i < 4; i++) {
    let n = Math.floor(Math.random() * 10);
    ops.push({ label: `${n} + ? = ${n + Math.floor(Math.random()*5+1)}`, answer: Math.floor(Math.random()*5+1) });
    code += n;
  }
  currentCaptcha = { code, ops, index: 0, answer: null };
  return ops;
}

function getCaptchaQ() {
  if (!currentCaptcha.ops.length) generateCaptcha();
  return currentCaptcha.ops[currentCaptcha.index % currentCaptcha.ops.length];
}

function renderCaptchaCanvas(canvas) {
  if (!canvas) return;
  let ctx = canvas.getContext("2d");
  let W = canvas.width = 140;
  let H = canvas.height = 46;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "#eef2ff";
  ctx.fillRect(0, 0, W, H);
  // 干扰线
  for (let i = 0; i < 4; i++) {
    ctx.strokeStyle = "rgba(26,58,107," + (0.1 + Math.random()*0.15) + ")";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(Math.random()*W, Math.random()*H);
    ctx.lineTo(Math.random()*W, Math.random()*H);
    ctx.stroke();
  }
  // 噪点
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = "rgba(26,58,107,0.15)";
    ctx.fillRect(Math.random()*W, Math.random()*H, 2, 2);
  }
  let q = getCaptchaQ();
  ctx.fillStyle = "#1a3a6b";
  ctx.font = "bold 13px PingFang SC, Microsoft YaHei";
  ctx.textAlign = "center";
  ctx.fillText(q.label, W/2, H/2 + 5);
  // 重绘按钮
  let bx = W - 30, by = H/2 - 12;
  ctx.fillStyle = "transparent";
  ctx.strokeStyle = "#1a3a6b";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx, by, 24, 24);
  ctx.fillStyle = "#1a3a6b";
  ctx.font = "10px sans-serif";
  ctx.fillText("↻", bx+12, by+15);
}

// ===== 密码工具 =====
function hashPin(pin) {
  // 简单哈希，用于存储（本地存储，非高安全场景）
  let h = 5381;
  for (let i = 0; i < pin.length; i++) h = ((h << 5) + h) + pin.charCodeAt(i);
  return h.toString(36);
}

function checkPinStrength(pin) {
  let score = 0;
  if (pin.length >= 6) score++;
  if (/\d/.test(pin)) score++;
  if (/[A-Za-z]/.test(pin)) score++;
  if (/[^A-Za-z0-9]/.test(pin)) score++;
  if (pin.length >= 10) score++;
  return score;
}

function onPwStrength(val, id) {
  let bar = document.getElementById(id);
  let lbl = document.getElementById(id.replace("strength","strength-label"));
  if (!bar) return;
  let s = checkPinStrength(val);
  let colors = ["#e8edf4","#f0f0f0","#f0f0f0","#f0f0f0","#f0f0f0","#f0f0f0"];
  let labels = ["","弱","中","中强","强","非常强"];
  let color = ["#e8edf4","#c0392b","#e67e22","#e67e22","#1a8a4a","#1a8a4a"][s];
  let pct = (s / 5) * 100;
  bar.innerHTML = `<span style="width:${pct}%;background:${color};display:block;height:100%"></span>`;
  if (lbl) lbl.textContent = val ? labels[s] : "";
}

  if (!username || !pw) { showToast("请填写用户名和密码", "error"); return; }

  let users = getUsers();
  let user = users.find(u => u.username === username && u.pwHash === hashPin(pw));
  if (!user) {
    showToast("用户名或密码错误", "error");

function startPractice() {
  if (!currentUser) { showToast("请先登录", "error"); return; }
  // 刷题模式：随机抽题，即时反馈
  state.questions = shuffleArray(questions.slice()).slice(0, 10); // 先随机抽10题
  state.answers = {};
  state.currentQ = 0;
  state.practiceMode = true;
  state.view = "exam";
  render();

function shuffleArray(arr) {
  let a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 考试 =====
function startExam() {
  if (!currentUser) { showToast("请先登录", "error"); switchAuthTab("login"); return; }
  state.candName = currentUser.name;
  state.taskId = 1;
  // 百分制：从题库随机抽题，每题2分，共50题=100分
  var pool = questions.slice();
  shuffleArray(pool);
  var picked = [];
  var totalScore = 0;
  var targetScore = 100;
  var perScore = 2;
  var needCount = targetScore / perScore; // 50题
  // 优先覆盖各分类
  var byCat = {};
  pool.forEach(function(q) {
    var c = q.category || "其他";
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(q);
  });
  var cats = Object.keys(byCat);
  // 每类按比例抽取
  var perCat = Math.max(1, Math.floor(needCount / cats.length));
  cats.forEach(function(c) {
    shuffleArray(byCat[c]);
    byCat[c].slice(0, perCat).forEach(function(q) { picked.push(q); });
  });
  // 不足补足
  shuffleArray(pool);
  while (picked.length < needCount && pool.length > 0) {
    var q = pool.shift();
    if (picked.indexOf(q) === -1) picked.push(q);
  }
  picked = picked.slice(0, needCount);
  // 按题型排序：单选→多选→判断→简答→场景，保证题号连续
  var typeOrder = {single:1, multi:2, judge:3, short:4, scenario:5};
  picked.sort(function(a, b) {
    return (typeOrder[a.qtype] || 99) - (typeOrder[b.qtype] || 99);
  });
  // 确保每题2分
  picked.forEach(function(q) { q.score = perScore; });
  state.questions = picked;
  state.totalScore = targetScore;
  state.answers = {};
  state.currentQ = 0;
  state.submitted = false;
  state.view = "exam";
  render();
  scrollTo(0, 0);
  showToast("本次考核共 " + picked.length + " 题，总分 " + targetScore + " 分", "info");
}

function renderCurrentQ() {
  let q = state.questions[state.currentQ];
  let card = $("q-card");
  if (!card) return;
  let typeLabel = {single:"单选题",multi:"多选题",judge:"判断题",short:"简答题",scenario:"场景分析题"}[q.qtype]||"问答题";
  let typeColor = {single:"#1a5a9a",multi:"#6b3fa0",judge:"#1a8a4a",short:"#c05a20",scenario:"#8a1a4a"}[q.qtype]||"#1a3a6b";
  let optsHtml = "";

  if (q.qtype === "single" || q.qtype === "judge") {
    optsHtml = q.options.map(o => {
      let sel = (state.answers[q.id]||"") === o[0];
      let clr = sel ? typeColor : "";
      let bg = sel ? typeColor : "transparent";
      return `<div class="option-item${sel?" selected":""}" onclick="selectOption(this,'${o[0]}','${typeColor}')">
        <span class="opt-letter" style="color:${clr};border-color:${sel?typeColor:"currentColor"};background:${bg}">${o[0]}</span>
        <span class="opt-text">${esc(o.slice(2))}</span>
      </div>`;
    }).join("");
  } else if (q.qtype === "multi") {
    let selArr = (state.answers[q.id]||"").split(",").filter(x=>x);
    optsHtml = q.options.map(o => {
      let sel = selArr.includes(o[0]);
      let clr = sel ? "#fff" : "#6b3fa0";
      let bg = sel ? "#6b3fa0" : "transparent";
      return `<div class="option-item${sel?" selected":""}" onclick="toggleMulti(this,'${o[0]}')">
        <span class="opt-letter" style="color:${clr};border-color:${sel?"#6b3fa0":"currentColor"};background:${bg}">${o[0]}</span>
        <span class="opt-text">${esc(o.slice(2))}</span>
      </div>`;
    }).join("");
  } else {
    optsHtml = `<div class="short-area">
      <textarea id="short-answer" placeholder="请在此输入你的答案..." onchange="setShort(this.value)">${esc(state.answers[q.id]||"")}</textarea>
    </div>`;
  }

  card.innerHTML = `
    <span class="q-type" style="background:${typeColor}20;color:${typeColor}">${typeLabel} · ${q.score}分</span>
    <div class="q-stem">${esc(q.stem)}</div>
    <ul class="options">${optsHtml}</ul>
  `;
}

function selectOption(el, val, color) {
  let q = state.questions[state.currentQ];
  state.answers[q.id] = val;
  el.parentElement.querySelectorAll(".option-item").forEach(e => {
    e.classList.remove("selected");
    let l = e.querySelector(".opt-letter");
    l.style.background = "transparent"; l.style.color = ""; l.style.borderColor = "currentColor";
  });
  el.classList.add("selected");
  let l = el.querySelector(".opt-letter");
  l.style.background = color; l.style.color = "#fff"; l.style.borderColor = color;
  updateNav();
}

function toggleMulti(el, val) {
  let q = state.questions[state.currentQ];
  let arr = (state.answers[q.id]||"").split(",").filter(x=>x);
  if (arr.includes(val)) {
    arr = arr.filter(x=>x!==val);
    el.classList.remove("selected");
    let l = el.querySelector(".opt-letter");
    l.style.background = "transparent"; l.style.color = "#6b3fa0"; l.style.borderColor = "currentColor";
  } else {
    arr.push(val);
    el.classList.add("selected");
    let l = el.querySelector(".opt-letter");
    l.style.background = "#6b3fa0"; l.style.color = "#fff"; l.style.borderColor = "#6b3fa0";

  state.answers[q.id] = arr.sort().join(",");
  updateNav();
}

function updateNav() {

// 主观题（简答/场景）按关键词覆盖率自动评分
function gradeSubjective(q, ua) {
  let ua2 = (ua||"").toLowerCase();
  let keys = (q.keyword||"").split(/[；;]/).map(k=>k.trim()).filter(Boolean);
  if (keys.length === 0) return { matched:0, total:0, ratio:0, score:0, auto:false };
  let matched = keys.filter(k => ua2.indexOf(k.toLowerCase()) >= 0).length;
  let ratio = matched / keys.length;
  let score = Math.round((q.score||0) * ratio);
  return { matched, total:keys.length, ratio, score, auto:true };
}

// 单题评判结果：返回 {isObj,isSubj,ok,g}
function questionResult(q, ua) {
  let isObj = ["single","multi","judge"].includes(q.qtype);
  let isSubj = q.qtype === "short" || q.qtype === "scenario";
  if (isObj) {
    let ok;
    if (q.qtype === "multi") ok = (ua||"").split(",").sort().join(",") === q.answer.split(",").sort().join(",");
    else ok = (ua||"") === q.answer;
    return { isObj, isSubj, ok, g:null };
  }
  if (isSubj) {
    let g = gradeSubjective(q, ua);
    return { isObj, isSubj, ok: g.total>0 && g.ratio>=0.5, g };
  }
  return { isObj, isSubj, ok:false, g:null };
}

function calcScore(qs, answers) {
  let auto=0;
  qs.forEach(q => {
    if(["single","judge"].includes(q.qtype)) {
      if((answers[q.id]||"")===q.answer) auto+=q.score;
    } else if(q.qtype==="multi") {
      let ca=q.answer.split(",").sort().join(",");
      if((answers[q.id]||"").split(",").sort().join(",")===ca) auto+=q.score;
    } else if(q.qtype==="short"||q.qtype==="scenario") {
      auto += gradeSubjective(q, answers[q.id]).score;
    }
  });
  return auto;
}

function backHome() {
  if(!confirm("确定退出？考试记录将丢失。")) return;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  state.view="home";
  render();
}

function saveRecord(score, passed) {
  let records = getRecords();
  records.push({
    time:new Date().toISOString(),
    name:state.candName,
    username:currentUser?.username||"",
    score, passed,
    answers: JSON.parse(JSON.stringify(state.answers)),
    questions: JSON.parse(JSON.stringify(state.questions))
  });
  saveRecords(records);
}

// ===== 结果页 =====
function renderResult() {
  let total=totalScore(state.questions);
  let rightCount=state.questions.filter(q=>{
    let r=questionResult(q, state.answers[q.id]);
    return r.ok;
  }).length;

  let subjCount=state.questions.filter(q=>q.qtype==="short"||q.qtype==="scenario").length;
  let subjScore=state.questions.filter(q=>q.qtype==="short"||q.qtype==="scenario").reduce((s,q)=>s+gradeSubjective(q, state.answers[q.id]).score, 0);

  let qList=state.questions.map((q,i)=>{
    let ua=state.answers[q.id]||"";
    let r=questionResult(q, ua);
    let tagCls, tagText, extraMeta="";
    if(r.isObj){
      tagCls=r.ok?"tag-right":"tag-wrong";
      tagText=r.ok?"✓ 正确":"✗ 错误";
    } else if(r.isSubj){
      if(r.g.total===0){ tagCls="tag-manual"; tagText="待人工阅卷"; }

function importWordQuestions() {
  var fi = document.getElementById('word-questions-file');
  if (!fi || !fi.files.length) { showToast('请选择 WORD 文件', 'error'); return; }
  var file = fi.files[0];
  var ext = (file.name.split('.').pop() || '').toLowerCase();
  if (ext !== 'doc' && ext !== 'docx') { showToast('仅支持 .doc / .docx 文件', 'error'); return; }

  var btn = document.getElementById('word-import-btn');
  if (btn) { btn.disabled = true; btn.textContent = '解析中...'; }

  var reader = new FileReader();
  reader.onload = function(e) {
    var arrayBuffer = e.target.result;
    // Use mammoth.js to extract text from DOCX
    if (typeof mammoth === 'undefined') {
      showToast('正在加载文档解析库...', 'info');
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js';
      script.onload = function() { parseWordContent(arrayBuffer, file.name); };
      script.onerror = function() {
        showToast('文档解析库加载失败', 'error');
        if (btn) { btn.disabled = false; btn.textContent = '📥 导入题库'; }
      };
      document.head.appendChild(script);
    } else {
      parseWordContent(arrayBuffer, file.name);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseWordContent(arrayBuffer, fileName) {
  var btn = document.getElementById('word-import-btn');
  mammoth.extractRawText({ arrayBuffer: arrayBuffer }).then(function(result) {
    var text = result.value;
    var category = (document.getElementById('word-questions-category') || {value:''}).value.trim() || '未分类';
    var parsed = parseQuestionsFromText(text, category);
    if (!parsed.length) {
      showToast('未识别到有效题目，请检查文档格式', 'error');
      if (btn) { btn.disabled = false; btn.textContent = '📥 导入题库'; }
      return;
    }
    // Generate new IDs starting after existing questions
    var maxId = 0;
    for (var i = 0; i < questions.length; i++) { if (questions[i].id > maxId) maxId = questions[i].id; }
    for (var j = 0; j < parsed.length; j++) {
      parsed[j].id = ++maxId;
      questions.push(parsed[j]);
    }
    saveQuestions();
    showToast('成功导入 ' + parsed.length + ' 道题目', 'success');
    if (btn) { btn.disabled = false; btn.textContent = '📥 导入题库'; }
    render();
  }).catch(function(err) {
    showToast('文档解析失败: ' + err, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '📥 导入题库'; }
  });
}

function parseQuestionsFromText(text, category) {
  var result = [];
  // Split by question number pattern: 1. 2. 3. etc
  var lines = text.split(/\r?\n/);
  var currentQ = null;
  var currentType = 'single';
  var currentStem = '';
  var currentOptions = [];
  var currentAnswer = '';

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;

    // Detect question start: number followed by . or 、
    var qMatch = line.match(/^(\d+)[\.、．]\s*(.*)/);
    if (qMatch) {
      // Save previous question
      if (currentStem) {
        result.push(finalizeQuestion(currentStem, currentOptions, currentAnswer, category));
      }
      // Start new question
      currentStem = qMatch[2];
      currentOptions = [];
      currentAnswer = '';
      currentType = 'single';
      continue;
    }

    // Detect option line: A. B. C. D. or A、B、 etc
    var optMatch = line.match(/^([A-Da-d])[\.、．]\s*(.*)/);
    if (optMatch) {
      currentOptions.push(optMatch[1].toUpperCase() + '. ' + optMatch[2]);
      continue;
    }

    // Detect answer line
    var ansMatch = line.match(/^(?:答案|正确答案)[：:]*\s*(.*)/i);
    if (ansMatch) {
      var ans = ansMatch[1].trim();
      // Determine question type
      if (ans === '正确' || ans === '错误' || ans === '对' || ans === '错') {
        currentType = 'judge';
        currentAnswer = (ans === '正确' || ans === '对') ? '正确' : '错误';
        currentOptions = ['正确', '错误'];
      } else if (/^[A-Da-d]+$/.test(ans)) {
        // Multiple choice (single or multi)
        currentAnswer = ans.toUpperCase();
        if (currentAnswer.length > 1) currentType = 'multi';
      } else {
        // Short answer
        currentType = 'short';
        currentAnswer = ans;
        currentOptions = [];
      }
      continue;
    }

    // If no pattern matched and we have a stem, it's part of stem
    if (currentStem && !currentAnswer) {
      currentStem += ' ' + line;
    }
  }

  // Save last question
  if (currentStem) {
    result.push(finalizeQuestion(currentStem, currentOptions, currentAnswer, category));
  }

  return result;
}

function finalizeQuestion(stem, options, answer, category) {
  var type = 'single';
  if (!options || !options.length) {
    type = 'short';
  } else if (options.length === 2 && (options[0] === '正确' || options[0] === '错误')) {
    type = 'judge';
  } else if (answer && answer.length > 1) {
    type = 'multi';
  }
  return {
    qtype: type,
    stem: stem,
    options: options,
    answer: answer || '',
    keyword: '',
    explanation: '',
    score: type === 'short' ? 5 : 2,
    category: category
  };
}

function deleteRecord(idx) {
  if (!confirm("确定删除这条考试记录？此操作不可恢复。")) return;
  let records = getRecords();
  if (idx < 0 || idx >= records.length) { showToast("记录不存在", "error"); return; }
  records.splice(idx, 1);
  saveRecords(records);
  showToast("记录已删除", "info");
  render();
  setTimeout(() => showAdminTab("records"), 50);
}

function renderRecord() {
  let records = getRecords();
  let rec = records[state.recordIndex];
  if (!rec) { state.view="admin"; render(); return; }
  let qs = rec.questions || [];
  let ans = rec.answers || {};
  if (!qs.length) {
    return `<div class="page">
      <div class="no-print" style="margin-bottom:20px"><button class="btn btn-ghost" onclick="backToRecords()">← 返回记录</button></div>
      <div class="card"><p style="text-align:center;color:var(--text-light);padding:30px">该记录为旧版格式，未保存详细答卷数据，无法查看成绩试卷。<br>（之后的考试记录将自动保存完整答卷，可正常查看与打印。）</p></div>
    </div>`;
  }
  let typeMap = {single:"单项选择题",multi:"多项选择题",judge:"判断题",short:"简答题",scenario:"场景分析题"};
  let typeOrder = ["single","multi","judge","short","scenario"];
  let cnNum = ["一","二","三","四","五","六","七","八","九","十"];
  let sections = [];
  typeOrder.forEach(t => {
    let tqs = qs.filter(q => q.qtype === t);
    if (tqs.length === 0) return;
    let totalScore = tqs.reduce((s,q) => s + q.score, 0);
    let eachScore = tqs[0].score;
    let header = `<div class="paper-section"><div class="paper-section-title">${cnNum[sections.length]} ${typeMap[t]}（每题${eachScore}分，共${totalScore}分）</div></div>`;
    let items = tqs.map((q,i) => {
      let r = questionResult(q, ans[q.id]);
      let ua = ans[q.id] || "";
      let got;
      if (r.isObj) got = r.ok ? q.score : 0;
      else if (r.isSubj) got = (r.g && r.g.total>0) ? r.g.score : (ua ? "待阅" : 0);
      else got = ua ? "待阅" : 0;
      let subjInfo = (r.isSubj && r.g && r.g.total>0) ? `（关键词命中 ${r.g.matched}/${r.g.total}，覆盖率 ${Math.round(r.g.ratio*100)}%）` : "";
      let rightMark = r.ok ? "✓" : "✗";
      let answerMark;
      if (t === "judge") {
        let correctAns = q.answer && q.answer.trim().toUpperCase();
        let isCorrectStatement = correctAns === "A" || correctAns === "正确" || correctAns === "TRUE" || correctAns === "T";
        let displayAns = isCorrectStatement ? "✓" : "×";
        answerMark = `（${displayAns}）${rightMark}`;
      } else if (r.isObj) {
        answerMark = `（${esc(ua)||"未答"}）${r.ok ? "" : rightMark}`;
      } else {
        answerMark = "";
      }
      let optsHtml;
      if (["single","multi"].includes(t) && q.options && q.options.length) {
        let chosenArr = Array.isArray(ua) ? ua : (typeof ua==="string" && ua.indexOf(",")>=0 ? ua.split(",").map(s=>s.trim()) : (ua?[ua]:[]));
        optsHtml = '<div class="paper-opts-inline">' + q.options.map(o => {
          let letter = o[0];
          let isChosen = chosenArr.includes(letter);
          return `<span class="paper-opt-i${isChosen?' chosen':''}">${letter} ${esc(o.slice(2))}</span>`;
        }).join("") + '</div>';
      } else if (t === "judge") {
        optsHtml = "";
      } else if (q.options && q.options.length) {
        optsHtml = "";
      } else {
        optsHtml = `<div class="paper-subj-ans">作答：${ua ? esc(ua) : '（未作答）'}<br>得分：${got} 分 ${subjInfo} ${rightMark}</div>`;
      }
      return `<div class="paper-q">
        <div class="paper-q-head"><span class="paper-num">${i+1}.</span><span class="paper-stem-inline">${esc(q.stem)}${answerMark}</span></div>
        ${optsHtml}
      </div>`;
    }).join("");
    sections.push(header + items);
  });
  let blocks = sections.join("");
  let subjTotal = qs.filter(q=>q.qtype==="short"||q.qtype==="scenario").reduce((s,q)=>{ let g=gradeSubjective(q, ans[q.id]); return s + (g.total>0?g.score:0); }, 0);
  return `<div class="page">
    <div class="no-print" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:24px">📋</div>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--primary)">考生成绩试卷</div>
          <div style="font-size:12px;color:var(--text-light)">${esc(rec.name)} · ${esc(rec.username||"")} · ${new Date(rec.time).toLocaleString("zh-CN")}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="backToRecords()">← 返回记录</button>
        <button class="btn btn-accent" onclick="window.print()">🖨 打印成绩试卷</button>
      </div>
    </div>
    <div class="print-area" id="print-area">
      <div class="print-header">
        <h1>🛡️ 湖南绿盾卫士检测技术有限公司</h1>
        <p style="font-size:15px;font-weight:700;margin-top:4px">GB/T 18204 培训考核卷 · 成绩试卷</p>
      </div>
      <div class="info-row">
        <span>姓名：<input class="wide" value="${esc(rec.name)}" readonly></span>
        <span>用户名：<input class="wide" value="${esc(rec.username||"")}" readonly></span>
        <span>考核日期：<input class="wide" value="${new Date(rec.time).toLocaleDateString("zh-CN")}" readonly></span>
        <span>总分：<input value="${rec.score}" readonly></span>
        <span>结果：<input value="${rec.passed?'合格':'不合格'}" readonly></span>
      </div>
      <div class="paper-list">${blocks}</div>
      <div class="paper-total">合计得分：<strong>${rec.score}</strong> 分 &nbsp;|&nbsp; 结果：<strong>${rec.passed?'合格':'不合格'}</strong></div>
      <div style="margin-top:10px;padding:8px;background:#f8f8f8;border-radius:6px;font-size:12px;line-height:1.8">
        <strong>说明：</strong>客观题自动判分；主观题按关键词覆盖率自动评分（满分 ${subjTotal} 分）。本成绩试卷由系统自动生成。
      </div>
    </div>
  </div>`;
}

function generatePrint() {
  let title = $("print-title")?.value || "培训考核卷";
  let singles = questions.filter(q => q.qtype === "single");
  let multis = questions.filter(q => q.qtype === "multi");
  let judges = questions.filter(q => q.qtype === "judge");
  let shorts = questions.filter(q => q.qtype === "short");
  let scenarios = questions.filter(q => q.qtype === "scenario");

  function buildSection(name, qs) {
    if (!qs.length) return "";
    let rows = qs.map(q => {
      let optHtml = "";
      if (["single","judge","multi"].includes(q.qtype)) {
        optHtml = q.options.map(o => `<td class="opt-col">${o[0]}</td><td>${esc(o.slice(2))}</td>`).join("");
      } else {
        let lines = q.qtype==="scenario" ? "<div class='answer-line'></div><div class='answer-line'></div>" : "<div class='answer-line'></div><div class='answer-line'></div><div class='answer-line'></div>";
        optHtml = `<td colspan="6">${lines}</td>`;
      }
      return `<tr><td class="num">${q.id}</td><td class="q-text" style="width:46%">${esc(q.stem)}</td>${optHtml}<td class="score-col">${q.score}</td></tr>`;
    }).join("");
    return `<div class="section-title">${esc(name)}（${qs.length} 题，${qs.reduce((s,q)=>s+q.score,0)} 分）</div>
    <table><thead><tr><th style="width:22px">题号</th><th>题目</th><th colspan="6">选项 / 答题区</th><th style="width:26px">分值</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  let ansRow = [...Array(33)].map((_,i)=>`${i+1}：____`).join("&nbsp;&nbsp;");

  $("print-area").innerHTML = `
    <div class="print-header">
      <h1>🛡️ 湖南绿盾卫士检测技术有限公司</h1>
      <p style="font-size:15px;font-weight:700;margin-top:4px">${esc(title)}</p>
    </div>
    <div class="info-row">
      <span>姓名：<input class="wide"></span>
      <span>单位/部门：<input class="wide"></span>
      <span>日期：<input class="wide"></span>
      <span>得分：<input></span>
    </div>
    <div style="font-size:12px;color:#555;margin-bottom:12px;background:#f8f8f8;padding:5px 10px;border-radius:6px">
      <strong>注意事项：</strong>单选题、判断题请在选项字母上打"√"；多选题在所有正确答案上打"√"；简答/分析题在答题区书写。
    </div>
    ${buildSection("一、单选题", singles)}
    ${buildSection("二、多选题", multis)}
    ${buildSection("三、判断题", judges)}
    ${buildSection("四、简答题", shorts)}
    ${buildSection("五、场景分析题", scenarios)}
    <div style="margin-top:10px;padding:8px;background:#f8f8f8;border-radius:6px;font-size:12px;line-height:1.8">
      <strong>答题卡：</strong>${ansRow}
    </div>
  `;
}
